<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>VELTRIX — Admin Purchase Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0c; --surface: #111915; --surface-2: #1a241e; --surface-3: #243028;
    --primary: #22c55e; --primary-dark: #16a34a; --primary-glow: rgba(34,197,94,0.25);
    --gold: #f59e0b; --text: #f0fdf4; --text-bright: #ffffff; --muted: #9ca3a0;
    --success: #22c55e; --warning: #f59e0b; --error: #ef4444;
    --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
    --shadow-lg: 0 30px 60px rgba(0,0,0,0.6); --shadow-md: 0 15px 35px rgba(0,0,0,0.4);
    --radius: 18px; --radius-sm: 13px; --nav-height: 72px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;position:relative;padding-bottom:40px;overflow-x:hidden;background-image:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,0.04) 0%,transparent 50%);}
  a{text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent;}
  .floating-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);opacity:0.2;}
  .floating-orb.orb-1{width:240px;height:240px;background:rgba(34,197,94,0.07);top:-60px;right:-50px;animation:float1 14s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-20px,15px) scale(1.05);}}
  .container{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:20px 18px 60px;animation:fadeUp 0.5s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;justify-content:space-between;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .back-btn{width:38px;height:38px;border-radius:11px;flex:none;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all 0.25s;}
  .back-btn:hover{background:var(--surface-2);border-color:var(--border-hover);color:var(--text-bright);}
  .back-btn svg{width:17px;height:17px;}
  .topbar h1{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:var(--text-bright);}

  /* Search */
  .search-wrap{position:relative;margin-bottom:16px;}
  .search-wrap input{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px 14px 48px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:all 0.3s;}
  .search-wrap input::placeholder{color:#4a524d;}
  .search-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-glow);}
  .search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--muted);}
  .search-results{display:none;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);margin-top:-8px;overflow:hidden;max-height:250px;overflow-y:auto;}
  .search-results.show{display:block;}
  .search-item{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:all 0.2s;display:flex;align-items:center;gap:10px;}
  .search-item:hover{background:var(--surface-2);}
  .search-item:last-child{border-bottom:none;}
  .search-item .user-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--gold));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:14px;flex:none;}
  .search-item .user-info{flex:1;min-width:0;}
  .search-item .user-name{font-size:14px;font-weight:600;color:var(--text-bright);}
  .search-item .user-email{font-size:11px;color:var(--muted);margin-top:2px;}
  .search-item .user-balance{font-size:13px;font-weight:700;color:var(--primary);flex:none;}
  .no-results{padding:20px;text-align:center;color:var(--muted);font-size:13px;}

  /* Selected User Card */
  .selected-user-card{background:var(--surface);border:2px solid var(--primary);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:none;}
  .selected-user-card.show{display:block;}
  .selected-user-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .selected-user-header .s-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--gold));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:18px;flex:none;}
  .selected-user-header .s-info{flex:1;}
  .selected-user-header .s-name{font-size:15px;font-weight:700;color:var(--text-bright);}
  .selected-user-header .s-uid{font-size:11px;color:var(--muted);margin-top:2px;}
  .selected-user-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .s-stat{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
  .s-stat .s-label{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px;}
  .s-stat .s-value{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--text-bright);}
  .clear-user-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;font-size:12px;color:var(--error);cursor:pointer;background:none;border:none;font-weight:600;}

  /* Plan Tabs */
  .plan-tabs{display:flex;gap:5px;margin-bottom:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px;}
  .plan-tab{flex:1;text-align:center;padding:11px 6px;border-radius:10px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.3s;}
  .plan-tab:hover{color:var(--text);}
  .plan-tab.active{background:linear-gradient(135deg,var(--primary),#16a34a);color:#fff;box-shadow:0 4px 12px var(--primary-glow);}

  /* Plan Cards */
  .plan-grid{display:flex;flex-direction:column;gap:10px;}
  .plan-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:16px;transition:all 0.3s;cursor:pointer;}
  .plan-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow-md);}
  .plan-card.selected{border-color:var(--primary);background:rgba(34,197,94,0.05);}
  .plan-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
  .plan-amount{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:800;color:var(--text-bright);}
  .plan-tag{font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;}
  .plan-tag.company{background:rgba(34,197,94,0.12);color:var(--primary);}
  .plan-tag.premium{background:rgba(245,158,11,0.12);color:var(--gold);}
  .plan-detail-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);}
  .plan-detail-row:last-of-type{border-bottom:none;}
  .plan-detail-row span.k{color:var(--muted);}
  .plan-detail-row span.v{font-weight:600;color:var(--text-bright);}

  /* Purchase Button */
  .purchase-btn{width:100%;margin-top:16px;background:linear-gradient(135deg,var(--primary),#16a34a);border:none;border-radius:var(--radius-sm);padding:15px;font-size:15px;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 25px var(--primary-glow);}
  .purchase-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 35px var(--primary-glow);}
  .purchase-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .no-user-msg{text-align:center;padding:30px;color:var(--muted);font-size:14px;}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;z-index:150;padding:20px;}
  .modal-overlay.show{display:flex;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;max-width:400px;width:100%;box-shadow:var(--shadow-lg);animation:popIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);}
  @keyframes popIn{from{opacity:0;transform:scale(0.88) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .modal-box h2{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:800;margin-bottom:14px;color:var(--text-bright);}
  .modal-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
  .modal-row:last-of-type{border-bottom:none;}
  .modal-row span.k{color:var(--muted);}
  .modal-row span.v{font-weight:700;color:var(--text-bright);}
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .modal-actions button{flex:1;padding:12px;border-radius:11px;border:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13.5px;cursor:pointer;transition:all 0.2s;}
  .modal-actions .m-cancel{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .modal-actions .m-confirm{background:linear-gradient(135deg,var(--primary),#16a34a);color:#fff;}
  .modal-actions .m-confirm:disabled{opacity:0.5;cursor:not-allowed;}
  .spinner-sm{width:15px;height:15px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:spin 0.7s linear infinite;display:none;}
  .m-confirm.loading .spinner-sm{display:inline-block;}
  .m-confirm.loading .btn-text{display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .toast-container{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:380px;}
  .toast{background:var(--surface-3);border:1px solid var(--border);padding:13px 15px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-lg);animation:slideIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);display:flex;align-items:center;gap:9px;}
  .toast.error{border-left:4px solid var(--error);}
  .toast.success{border-left:4px solid var(--success);}
  @keyframes slideIn{from{opacity:0;transform:translateX(80px);}to{opacity:1;transform:translateX(0);}}
  @media(max-width:480px){.container{padding:16px 12px 60px;}}
</style>
</head>
<body>

<div class="floating-orb orb-1"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="admin-dashboard.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg></a>
      <h1>Purchase Plan for User</h1>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search user by name, email or username..." autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Selected User -->
  <div class="selected-user-card" id="selectedUserCard">
    <div class="selected-user-header">
      <div class="s-avatar" id="sAvatar">U</div>
      <div class="s-info">
        <div class="s-name" id="sName">—</div>
        <div class="s-uid" id="sUid">—</div>
      </div>
    </div>
    <div class="selected-user-stats">
      <div class="s-stat"><div class="s-label">Balance</div><div class="s-value" id="sBalance">₦0</div></div>
      <div class="s-stat"><div class="s-label">Total Invested</div><div class="s-value" id="sInvested">₦0</div></div>
      <div class="s-stat"><div class="s-label">Active Plans</div><div class="s-value" id="sActivePlans">0</div></div>
    </div>
    <button class="clear-user-btn" id="clearUserBtn">✕ Clear Selection</button>
  </div>

  <!-- Plan Tabs -->
  <div class="plan-tabs" id="planTabs">
    <div class="plan-tab active" data-tab="company">🏢 Company</div>
    <div class="plan-tab" data-tab="premium">⭐ Premium</div>
  </div>

  <!-- Plan Grid -->
  <div id="companyPlans" class="plan-grid"></div>
  <div id="premiumPlans" class="plan-grid" style="display:none;"></div>

  <!-- Purchase Button -->
  <button class="purchase-btn" id="purchaseBtn" disabled>Select a User & Plan First</button>
  <div class="no-user-msg" id="noUserMsg">👆 Search and select a user above to get started</div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box">
    <h2 id="modalTitle">Confirm Purchase</h2>
    <div class="modal-row"><span class="k">User</span><span class="v" id="modalUser">—</span></div>
    <div class="modal-row"><span class="k">Plan</span><span class="v" id="modalPlanName">—</span></div>
    <div class="modal-row"><span class="k">Amount</span><span class="v" id="modalAmount">₦0</span></div>
    <div class="modal-row"><span class="k">Duration</span><span class="v" id="modalDuration">—</span></div>
    <div class="modal-row"><span class="k">Total Return</span><span class="v" id="modalReturn">₦0</span></div>
    <div class="modal-actions">
      <button class="m-cancel" id="modalCancel">Cancel</button>
      <button class="m-confirm" id="modalConfirmBtn"><span class="btn-text">Confirm Purchase</span><span class="spinner-sm"></span></button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs, writeBatch, increment, serverTimestamp, Timestamp, runTransaction, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const COMPANY_PLANS = [4000,8000,10000,15000,20000,25000,30000,50000,70000,100000].map(a=>({amount:a,dailyROI:Math.round(a*0.10),days:25,total:Math.round(a*0.10)*25}));
  const PREMIUM_PLANS = [{tier:1,amount:2000,days:3,total:3500},{tier:2,amount:5000,days:3,total:6500},{tier:3,amount:10000,days:3,total:13000},{tier:4,amount:20000,days:3,total:23000},{tier:5,amount:30000,days:3,total:33000},{tier:6,amount:50000,days:3,total:55000}];

  let selectedUser = null;
  let selectedPlan = null;
  let selectedPlanCategory = null;
  let activePlanTab = "company";
  let searchTimeout = null;

  function showToast(m, t = "info", d = 4000) {
    const c = document.getElementById("toastContainer");
    const el = document.createElement("div");
    el.className = `toast ${t}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    el.innerHTML = `<span>${icons[t]||icons.info}</span>${m}`;
    if (c.children.length >= 3) c.removeChild(c.firstChild);
    c.appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transform = "translateX(80px)"; el.style.transition = "all 0.3s"; setTimeout(() => { if (el.parentNode) el.remove(); }, 300); }, d);
  }

  function formatNaira(v) { return "₦" + (Number(v) || 0).toLocaleString("en-NG"); }

  // ✅ AUTH GUARD
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "admin-login.html"; return; }
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      if (!snap.exists() || snap.data().role !== "admin") {
        await signOut(auth);
        window.location.href = "admin-login.html";
        return;
      }
      renderCompanyPlans();
      renderPremiumPlans();
      updatePurchaseButton();
    } catch(e) {
      window.location.href = "admin-login.html";
    }
  });

  // ✅ SEARCH USERS
  const searchInput = document.getElementById("searchInput");
  const searchResults = document.getElementById("searchResults");

  searchInput.addEventListener("input", () => {
    clearTimeout(searchTimeout);
    const term = searchInput.value.trim();
    if (term.length < 2) {
      searchResults.classList.remove("show");
      searchResults.innerHTML = "";
      return;
    }
    searchTimeout = setTimeout(() => searchUsers(term), 400);
  });

  async function searchUsers(term) {
    searchResults.innerHTML = '<div class="no-results">Searching...</div>';
    searchResults.classList.add("show");
    
    try {
      const termLower = term.toLowerCase();
      // Search by username, email, or name
      const [byUsername, byEmail, byName] = await Promise.all([
        getDocs(query(collection(db, "users"), where("username", ">=", termLower), where("username", "<=", termLower + "\uf8ff"), limit(10))),
        getDocs(query(collection(db, "users"), where("email", ">=", termLower), where("email", "<=", termLower + "\uf8ff"), limit(10))),
        getDocs(query(collection(db, "users"), where("nameLower", ">=", termLower), where("nameLower", "<=", termLower + "\uf8ff"), limit(10)))
      ]);

      // Combine and deduplicate
      const allUsers = new Map();
      [...byUsername.docs, ...byEmail.docs, ...byName.docs].forEach(doc => {
        if (!allUsers.has(doc.id)) allUsers.set(doc.id, { id: doc.id, ...doc.data() });
      });

      const users = Array.from(allUsers.values()).filter(u => u.role !== "admin").slice(0, 10);

      if (users.length === 0) {
        searchResults.innerHTML = '<div class="no-results">No users found. Try a different search.</div>';
        return;
      }

      searchResults.innerHTML = users.map(u => `
        <div class="search-item" data-uid="${u.id}">
          <div class="user-avatar">${(u.name||"U").charAt(0).toUpperCase()}</div>
          <div class="user-info">
            <div class="user-name">${escapeHtml(u.name||"Unknown")}</div>
            <div class="user-email">@${escapeHtml(u.username||"—")} · ${escapeHtml(u.email||"—")}</div>
          </div>
          <div class="user-balance">${formatNaira(u.balance||0)}</div>
        </div>
      `).join("");

      // Click handler
      searchResults.querySelectorAll(".search-item").forEach(item => {
        item.addEventListener("click", () => selectUser(item.dataset.uid));
      });

    } catch(e) {
      console.error("Search error:", e);
      searchResults.innerHTML = '<div class="no-results">Search failed. Try again.</div>';
    }
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ✅ SELECT USER
  async function selectUser(uid) {
    try {
      const snap = await getDoc(doc(db, "users", uid));
      if (!snap.exists()) { showToast("User not found.", "error"); return; }
      
      selectedUser = { id: uid, ...snap.data() };
      
      // Update UI
      document.getElementById("selectedUserCard").classList.add("show");
      document.getElementById("sAvatar").textContent = (selectedUser.name||"U").charAt(0).toUpperCase();
      document.getElementById("sName").textContent = selectedUser.name || "Unknown";
      document.getElementById("sUid").textContent = `@${selectedUser.username||"—"} · ${selectedUser.email||"—"}`;
      document.getElementById("sBalance").textContent = formatNaira(selectedUser.balance||0);
      document.getElementById("sInvested").textContent = formatNaira(selectedUser.totalInvested||0);

      // Get active plans count
      const invSnap = await getDocs(query(collection(db, "investments"), where("uid", "==", uid), where("status", "==", "active")));
      document.getElementById("sActivePlans").textContent = invSnap.size;

      // Hide search results
      searchResults.classList.remove("show");
      searchInput.value = selectedUser.name || selectedUser.username || "";
      
      updatePurchaseButton();
      renderCompanyPlans();
      renderPremiumPlans();
    } catch(e) {
      showToast("Couldn't load user data.", "error");
    }
  }

  // ✅ CLEAR USER
  document.getElementById("clearUserBtn").addEventListener("click", () => {
    selectedUser = null;
    selectedPlan = null;
    document.getElementById("selectedUserCard").classList.remove("show");
    document.getElementById("noUserMsg").style.display = "block";
    searchInput.value = "";
    updatePurchaseButton();
    renderCompanyPlans();
    renderPremiumPlans();
  });

  // ✅ PLAN TABS
  document.querySelectorAll(".plan-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".plan-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activePlanTab = tab.dataset.tab;
      document.getElementById("companyPlans").style.display = activePlanTab === "company" ? "flex" : "none";
      document.getElementById("premiumPlans").style.display = activePlanTab === "premium" ? "flex" : "none";
      selectedPlan = null;
      updatePurchaseButton();
      if (activePlanTab === "company") renderCompanyPlans();
      else renderPremiumPlans();
    });
  });

  // ✅ RENDER COMPANY PLANS
  function renderCompanyPlans() {
    const container = document.getElementById("companyPlans");
    container.innerHTML = COMPANY_PLANS.map(p => {
      const isSelected = selectedPlan && selectedPlanCategory === "company" && selectedPlan.amount === p.amount;
      return `
        <div class="plan-card company-card ${isSelected ? 'selected' : ''}" data-plan='${JSON.stringify({category:"company",...p})}'>
          <div class="plan-card-top">
            <span class="plan-amount">${formatNaira(p.amount)}</span>
            <span class="plan-tag company">Company</span>
          </div>
          <div class="plan-detail-row"><span class="k">Daily ROI</span><span class="v">${formatNaira(p.dailyROI)}</span></div>
          <div class="plan-detail-row"><span class="k">Duration</span><span class="v">${p.days} days</span></div>
          <div class="plan-detail-row"><span class="k">Total Return</span><span class="v" style="color:var(--success);">${formatNaira(p.total)}</span></div>
        </div>
      `;
    }).join("");

    container.querySelectorAll(".plan-card").forEach(card => {
      card.addEventListener("click", () => {
        container.querySelectorAll(".plan-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        selectedPlan = JSON.parse(card.dataset.plan);
        selectedPlanCategory = "company";
        document.getElementById("premiumPlans").querySelectorAll(".plan-card").forEach(c => c.classList.remove("selected"));
        updatePurchaseButton();
      });
    });
  }

  // ✅ RENDER PREMIUM PLANS
  function renderPremiumPlans() {
    const container = document.getElementById("premiumPlans");
    const counts = selectedUser?.premiumPurchaseCount || {};
    const totalInvested = selectedUser?.totalInvested || 0;

    container.innerHTML = PREMIUM_PLANS.map(p => {
      const tc = counts[p.tier] || 0;
      const unlocked = totalInvested >= p.amount;
      const maxed = tc >= 2;
      const locked = !unlocked || maxed;
      const isSelected = selectedPlan && selectedPlanCategory === "premium" && selectedPlan.tier === p.tier;
      
      let note = "";
      if (maxed) note = `<div style="font-size:10px;color:var(--error);margin-top:6px;">⚠ Max 2 purchases (${tc}/2)</div>`;
      else if (!unlocked) note = `<div style="font-size:10px;color:var(--warning);margin-top:6px;">🔒 Need ₦${p.amount.toLocaleString()} invested</div>`;
      
      return `
        <div class="plan-card premium-card ${isSelected ? 'selected' : ''} ${locked ? 'locked' : ''}" data-plan='${JSON.stringify({category:"premium",...p})}' style="${locked ? 'opacity:0.5;pointer-events:none;' : ''}">
          <div class="plan-card-top">
            <span class="plan-amount">${formatNaira(p.amount)}</span>
            <span class="plan-tag premium">⭐ Premium</span>
          </div>
          <div class="plan-detail-row"><span class="k">Duration</span><span class="v">${p.days} days</span></div>
          <div class="plan-detail-row"><span class="k">Total Payout</span><span class="v" style="color:var(--gold);">${formatNaira(p.total)}</span></div>
          <div class="plan-detail-row"><span class="k">Profit</span><span class="v" style="color:var(--success);">${formatNaira(p.total-p.amount)}</span></div>
          <div class="plan-detail-row"><span class="k">Purchases</span><span class="v">${tc}/2</span></div>
          ${note}
        </div>
      `;
    }).join("");

    container.querySelectorAll(".plan-card:not(.locked)").forEach(card => {
      card.addEventListener("click", () => {
        container.querySelectorAll(".plan-card").forEach(c => c.classList.remove("selected"));
        card.classList.add("selected");
        selectedPlan = JSON.parse(card.dataset.plan);
        selectedPlanCategory = "premium";
        document.getElementById("companyPlans").querySelectorAll(".plan-card").forEach(c => c.classList.remove("selected"));
        updatePurchaseButton();
      });
    });
  }

  // ✅ UPDATE PURCHASE BUTTON
  function updatePurchaseButton() {
    const btn = document.getElementById("purchaseBtn");
    const msg = document.getElementById("noUserMsg");
    
    if (!selectedUser) {
      btn.disabled = true;
      btn.textContent = "Select a User First";
      msg.style.display = "block";
      return;
    }
    
    msg.style.display = "none";
    
    if (!selectedPlan) {
      btn.disabled = true;
      btn.textContent = "Select a Plan Above";
      return;
    }
    
    btn.disabled = false;
    btn.textContent = `Purchase ${formatNaira(selectedPlan.amount)} Plan for ${selectedUser.name||"User"}`;
  }

  // ✅ PURCHASE BUTTON CLICK
  document.getElementById("purchaseBtn").addEventListener("click", () => {
    if (!selectedUser || !selectedPlan) return;
    openConfirmModal();
  });

  // ✅ CONFIRM MODAL
  const confirmModal = document.getElementById("confirmModal");
  
  function openConfirmModal() {
    document.getElementById("modalUser").textContent = selectedUser.name || selectedUser.username;
    document.getElementById("modalPlanName").textContent = selectedPlanCategory === "company" 
      ? `Company · ${formatNaira(selectedPlan.amount)}` 
      : `Premium Tier ${selectedPlan.tier} · ${formatNaira(selectedPlan.amount)}`;
    document.getElementById("modalAmount").textContent = formatNaira(selectedPlan.amount);
    document.getElementById("modalDuration").textContent = selectedPlanCategory === "company" 
      ? `${selectedPlan.days} days (12AM drops)` 
      : `${selectedPlan.days} days (auto payout)`;
    document.getElementById("modalReturn").textContent = formatNaira(selectedPlan.total);
    confirmModal.classList.add("show");
  }

  document.getElementById("modalCancel").addEventListener("click", () => confirmModal.classList.remove("show"));
  confirmModal.addEventListener("click", e => { if (e.target === confirmModal) confirmModal.classList.remove("show"); });

  // ✅ CONFIRM PURCHASE
  document.getElementById("modalConfirmBtn").addEventListener("click", async () => {
    if (!selectedUser || !selectedPlan) return;
    
    const btn = document.getElementById("modalConfirmBtn");
    btn.disabled = true;
    btn.classList.add("loading");

    try {
      const userRef = doc(db, "users", selectedUser.id);
      const now = new Date();

      await runTransaction(db, async (transaction) => {
        // Re-check user exists
        const userDoc = await transaction.get(userRef);
        if (!userDoc.exists()) throw new Error("User not found");

        const userData = userDoc.data();
        
        // Check premium restrictions
        if (selectedPlanCategory === "premium") {
          const counts = userData.premiumPurchaseCount || {};
          if ((counts[selectedPlan.tier] || 0) >= 2) throw new Error("Max 2 premium purchases reached");
        }

        // Create investment document
        const invRef = doc(collection(db, "investments"));
        const invData = selectedPlanCategory === "company" ? {
          uid: selectedUser.id,
          username: userData.username || null,
          planCategory: "company",
          amount: selectedPlan.amount,
          dailyROI: selectedPlan.dailyROI,
          days: selectedPlan.days,
          daysPaid: 0,
          startDate: Timestamp.fromDate(now),
          lastDropDate: Timestamp.fromDate(now),
          status: "active",
          createdBy: auth.currentUser.uid,
          createdByRole: "admin",
          createdAt: serverTimestamp()
        } : {
          uid: selectedUser.id,
          username: userData.username || null,
          planCategory: "premium",
          amount: selectedPlan.amount,
          vipTier: selectedPlan.tier,
          days: selectedPlan.days,
          total: selectedPlan.total,
          startDate: Timestamp.fromDate(now),
          creditedAt: null,
          status: "active",
          createdBy: auth.currentUser.uid,
          createdByRole: "admin",
          createdAt: serverTimestamp()
        };

        transaction.set(invRef, invData);

        // Update user
        const updates = {
          totalInvested: increment(selectedPlan.amount)
        };

        if (selectedPlanCategory === "company") {
          const tier = PREMIUM_PLANS.find(p => p.amount === selectedPlan.amount)?.tier || 0;
          updates.unlockedVipTier = Math.max(userData.unlockedVipTier || 0, tier);
        }

        if (selectedPlanCategory === "premium") {
          updates[`premiumPurchaseCount.${selectedPlan.tier}`] = increment(1);
          updates.hasPremiumPlan = true;
        }

        transaction.update(userRef, updates);
      });

      // Log admin action
      await (async () => {
        const batch = writeBatch(db);
        batch.set(doc(collection(db, "adminActions")), {
          adminUid: auth.currentUser.uid,
          targetUid: selectedUser.id,
          action: "purchase_plan",
          planCategory: selectedPlanCategory,
          amount: selectedPlan.amount,
          planDetails: selectedPlanCategory === "company" 
            ? `Company ${formatNaira(selectedPlan.amount)} · ${selectedPlan.days}d` 
            : `Premium T${selectedPlan.tier} ${formatNaira(selectedPlan.amount)} · ${selectedPlan.days}d`,
          createdAt: serverTimestamp()
        });
        await batch.commit();
      })();

      confirmModal.classList.remove("show");
      showToast(`✅ Purchased ${formatNaira(selectedPlan.amount)} plan for ${selectedUser.name||selectedUser.username}!`, "success", 5000);

      // Refresh user data
      await selectUser(selectedUser.id);
      selectedPlan = null;
      renderCompanyPlans();
      renderPremiumPlans();
      updatePurchaseButton();

    } catch(e) {
      console.error("Purchase error:", e);
      showToast(e.message || "Couldn't complete purchase.", "error");
    } finally {
      btn.disabled = false;
      btn.classList.remove("loading");
    }
  });

  // Click outside search to close
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-wrap")) {
      searchResults.classList.remove("show");
    }
  });

  console.log("🚀 Veltrix Admin Purchase Plan - Ready");
</script>
</body>
</html>
