<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Investment Plans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0a0e27;
    --surface: #131837;
    --surface-2: #1a1f42;
    --surface-3: #1f2550;
    --cyan: #00d4ff;
    --cyan-dark: #0099cc;
    --violet: #7c3aed;
    --violet-light: #a78bfa;
    --text: #e8ecf7;
    --text-bright: #ffffff;
    --muted: #8892b0;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --gold: #fbbf24;
    --gold-dark: #f59e0b;
    --border: rgba(232, 236, 247, 0.1);
    --border-hover: rgba(232, 236, 247, 0.2);
    --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.2);
    --nav-height: 72px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    scroll-behavior: smooth;
  }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    position: relative;
    padding-bottom: calc(var(--nav-height) + 20px);
    overflow-x: hidden;
  }

  a {
    text-decoration: none;
    color: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  /* Background Effects */
  .bg-glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(600px circle at 20% 10%, rgba(0, 212, 255, 0.08), transparent 55%),
      radial-gradient(700px circle at 80% 50%, rgba(124, 58, 237, 0.09), transparent 55%);
    animation: bgPulse 8s ease-in-out infinite;
  }

  @keyframes bgPulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.6; }
  }

  /* Main Container */
  .container {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 20px 8px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Top Bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    justify-content: space-between;
    animation: slideDown 0.5s ease;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .back-btn, .icon-btn-round {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    flex: none;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s ease;
  }

  .back-btn:hover, .icon-btn-round:hover {
    background: var(--surface-2);
    border-color: var(--border-hover);
    color: var(--text-bright);
  }

  .back-btn svg, .icon-btn-round svg {
    width: 20px;
    height: 20px;
  }

  .icon-btn-round.spinning {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .topbar h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-bright);
  }

  /* Balance Card */
  .balance-strip {
    background: linear-gradient(135deg, #0f1a3a, #1a1140);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-md);
    animation: slideUp 0.5s ease 0.1s both;
  }

  .balance-strip::before {
    content: "";
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 212, 255, 0.12), transparent 70%);
    top: -50px;
    right: -50px;
  }

  .balance-strip p.k {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }

  .balance-strip p.v {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-bright);
    position: relative;
    z-index: 1;
  }

  .balance-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: rgba(0, 212, 255, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    flex: none;
  }

  .balance-icon svg {
    width: 24px;
    height: 24px;
    color: var(--cyan);
  }

  /* Active Investments */
  .active-inv-section {
    animation: slideUp 0.5s ease 0.2s both;
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin: 20px 0 14px;
    color: var(--text-bright);
  }

  .active-inv {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    transition: all 0.3s ease;
  }

  .active-inv:hover {
    border-color: var(--border-hover);
    box-shadow: var(--shadow-md);
  }

  .active-inv-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .active-inv-top p.title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-bright);
  }

  .active-inv-top span.badge {
    font-size: 10.5px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
    letter-spacing: 0.3px;
  }

  .progress-track {
    background: var(--surface-2);
    border-radius: 8px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--violet));
    border-radius: 8px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
  }

  .active-inv p.meta {
    font-size: 12px;
    color: var(--muted);
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px;
    animation: slideUp 0.5s ease 0.3s both;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 12px 10px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: 'Space Grotesk', sans-serif;
  }

  .tab:hover {
    color: var(--text);
  }

  .tab.active {
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    color: #ffffff;
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
  }

  /* Plan Grid */
  .plan-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: slideUp 0.5s ease 0.4s both;
  }

  .plan-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .plan-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }

  .plan-card.company-card {
    border-color: rgba(0, 212, 255, 0.15);
  }

  .plan-card.company-card:hover {
    border-color: rgba(0, 212, 255, 0.3);
  }

  .plan-card.premium-card {
    border-color: rgba(251, 191, 36, 0.2);
  }

  .plan-card.premium-card:hover {
    border-color: rgba(251, 191, 36, 0.4);
  }

  .plan-card.locked {
    opacity: 0.55;
    pointer-events: none;
  }

  .plan-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .plan-amount {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text-bright);
  }

  .plan-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 8px;
    letter-spacing: 0.3px;
  }

  .plan-tag.company {
    background: rgba(0, 212, 255, 0.15);
    color: var(--cyan);
  }

  .plan-tag.premium {
    background: rgba(251, 191, 36, 0.15);
    color: var(--gold);
  }

  .plan-detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }

  .plan-detail-row:last-of-type {
    border-bottom: none;
    margin-bottom: 14px;
  }

  .plan-detail-row span.k {
    color: var(--muted);
  }

  .plan-detail-row span.v {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    color: var(--text-bright);
  }

  .plan-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14.5px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .plan-btn.company-btn {
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    color: #ffffff;
    box-shadow: 0 6px 20px rgba(0, 212, 255, 0.25);
  }

  .plan-btn.company-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
  }

  .plan-btn.premium-btn {
    background: linear-gradient(135deg, var(--gold), #f59e0b);
    color: #1a1a1a;
    box-shadow: 0 6px 20px rgba(251, 191, 36, 0.25);
  }

  .plan-btn.premium-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(251, 191, 36, 0.4);
  }

  .plan-btn:disabled {
    background: var(--surface-2);
    color: var(--muted);
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .plan-btn:active:not(:disabled) {
    transform: scale(0.98);
  }

  .lock-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
    text-align: center;
    line-height: 1.5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .lock-note svg {
    flex: none;
  }

  /* Empty State */
  .empty-note {
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    padding: 30px 20px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2, 3, 10, 0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 80;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.3s ease;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px 22px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: modalSlideIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  @keyframes modalSlideIn {
    from {
      opacity: 0;
      transform: scale(0.9) translateY(20px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  .modal h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    margin-bottom: 16px;
    color: var(--text-bright);
  }

  .modal .row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    align-items: center;
  }

  .modal .row:last-of-type {
    border-bottom: none;
    padding-bottom: 0;
  }

  .modal .row span.k {
    color: var(--muted);
  }

  .modal .row span.v {
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-bright);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .modal-actions button {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    cursor: pointer;
    font-size: 14.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s ease;
  }

  .modal-actions .cancel {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .modal-actions .cancel:hover {
    background: var(--surface-3);
    border-color: var(--border-hover);
  }

  .modal-actions .confirm {
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    color: #ffffff;
    box-shadow: 0 6px 20px rgba(0, 212, 255, 0.25);
  }

  .modal-actions .confirm:hover {
    box-shadow: 0 10px 25px rgba(0, 212, 255, 0.4);
  }

  .modal-actions .confirm:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    box-shadow: none;
  }

  .spinner-sm {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2.5px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .confirm.loading .spinner-sm {
    display: inline-block;
  }

  .confirm.loading .btn-text {
    display: none;
  }

  /* Bottom Navigation */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: rgba(13, 18, 39, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    height: var(--nav-height);
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    flex: 1;
    padding: 6px 4px;
    border-radius: 14px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    cursor: pointer;
  }

  .nav-item svg {
    width: 22px;
    height: 22px;
    transition: all 0.3s ease;
  }

  .nav-item span {
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .nav-item.active {
    color: var(--cyan);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 3px;
    background: var(--cyan);
    border-radius: 0 0 3px 3px;
  }

  .nav-item:active {
    transform: scale(0.95);
  }

  .nav-item .nav-indicator {
    position: absolute;
    bottom: -2px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--cyan);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .nav-item.active .nav-indicator {
    opacity: 1;
  }

  /* Toast Notifications */
  #toast-stack {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: calc(100% - 40px);
    max-width: 400px;
  }

  .toast {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-left: 4px solid var(--cyan);
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    box-shadow: var(--shadow-lg);
    animation: toastSlideIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    backdrop-filter: blur(10px);
  }

  .toast.error {
    border-left-color: var(--error);
    background: rgba(239, 68, 68, 0.1);
  }

  .toast.success {
    border-left-color: var(--success);
    background: rgba(16, 185, 129, 0.1);
  }

  @keyframes toastSlideIn {
    from {
      opacity: 0;
      transform: translateX(100px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .container {
      padding: 16px 14px 8px;
    }

    .plan-amount {
      font-size: 20px;
    }
  }

  @media (min-width: 768px) {
    .container {
      padding: 32px 24px 8px;
    }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="container">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12,19 5,12 12,5"/>
        </svg>
      </a>
      <h1>Investment Plans</h1>
    </div>
    <button class="icon-btn-round" id="refreshBtn" title="Refresh plans">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23,4 23,10 17,10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>

  <!-- Balance Card -->
  <div class="balance-strip">
    <div>
      <p class="k">Available Balance</p>
      <p class="v" id="availableBalance">₦0.00</p>
    </div>
    <div class="balance-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="1" x2="12" y2="23"/>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
      </svg>
    </div>
  </div>

  <!-- Active Investments -->
  <div id="activeInvSection" class="active-inv-section"></div>

  <!-- Plan Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="company">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
        <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
      </svg>
      Company Plan
    </div>
    <div class="tab" data-tab="premium">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 6px;">
        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
      </svg>
      Premium Plan
    </div>
  </div>

  <!-- Plan Grids -->
  <div id="companyTab" class="plan-grid"></div>
  <div id="premiumTab" class="plan-grid" style="display:none;"></div>
</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9,22 9,12 15,12 15,22"/>
    </svg>
    <span>Home</span>
    <span class="nav-indicator"></span>
  </a>
  <a href="plans.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
    </svg>
    <span>Plans</span>
    <span class="nav-indicator"></span>
  </a>
  <a href="history.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12,6 12,12 16,14"/>
    </svg>
    <span>History</span>
    <span class="nav-indicator"></span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Profile</span>
    <span class="nav-indicator"></span>
  </a>
</nav>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h2 id="modalTitle">Confirm Investment</h2>
    <div class="row"><span class="k">Plan</span><span class="v" id="modalPlanName">—</span></div>
    <div class="row"><span class="k">Amount</span><span class="v" id="modalAmount">₦0</span></div>
    <div class="row"><span class="k">Duration</span><span class="v" id="modalDuration">—</span></div>
    <div class="row"><span class="k">Total Return</span><span class="v" id="modalReturn">₦0</span></div>
    <div class="modal-actions">
      <button class="cancel" id="modalCancel" type="button">Cancel</button>
      <button class="confirm" id="modalConfirm" type="button">
        <span class="btn-text">Confirm & Invest</span>
        <span class="spinner-sm"></span>
      </button>
    </div>
  </div>
</div>

<script type="module">
  // ==================== FIREBASE INIT ====================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, updateDoc, addDoc, collection,
    writeBatch, increment, serverTimestamp, Timestamp, query, where, getDocs
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ==================== CONSTANTS ====================
  const DASHBOARD_CACHE_KEY = "quantum_dashboard_cache";
  const INVESTMENTS_CACHE_KEY = "quantum_investments_cache";

  // Company Plans: 10% daily ROI, 25 weekdays
  const COMPANY_PLANS = [4000, 8000, 10000, 15000, 20000, 25000, 30000, 50000, 70000, 100000]
    .map(amount => ({
      amount,
      dailyROI: Math.round(amount * 0.10),
      days: 25,
      total: Math.round(amount * 0.10) * 25
    }));

  // Premium VIP Plans: 3-day lump sum payout (3× amount + ₦2,000)
  const PREMIUM_PLANS = [5000, 10000, 15000, 20000, 30000, 50000].map((amount, i) => ({
    tier: i + 1,
    amount,
    days: 3,
    total: 3 * amount + 2000
  }));

  // Referral bonus rates (Level 1: 10%, Level 2: 5%, Level 3: 2%)
  const REFERRAL_RATES = { 1: 0.10, 2: 0.05, 3: 0.02 };

  // ==================== STATE ====================
  let currentUser = null;
  let userData = null;
  let investments = [];

  // ==================== HELPERS ====================
  function formatNaira(v) {
    return "₦" + (Number(v) || 0).toLocaleString("en-NG");
  }

  function showToast(message, type = "info", duration = 4000) {
    const stack = document.getElementById("toast-stack");
    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
    toast.innerHTML = `<span style="margin-right:8px;font-weight:bold;">${icons[type] || icons.info}</span>${message}`;
    if (stack.children.length >= 3) stack.removeChild(stack.firstChild);
    stack.appendChild(toast);
    setTimeout(() => {
      toast.style.transition = "all 0.3s ease";
      toast.style.opacity = "0";
      toast.style.transform = "translateX(100px)";
      setTimeout(() => { if (toast.parentNode) toast.remove(); }, 300);
    }, duration);
  }

  function unlockedTierFor(companyAmount) {
    const match = PREMIUM_PLANS.find(p => p.amount >= companyAmount);
    return match ? match.tier : PREMIUM_PLANS[PREMIUM_PLANS.length - 1].tier;
  }

  function minCompanyAmountForTier(tier) {
    const candidates = COMPANY_PLANS.filter(c => unlockedTierFor(c.amount) >= tier);
    return candidates.length ? Math.min(...candidates.map(c => c.amount)) : null;
  }

  function isWeekday(date) {
    const day = date.getDay();
    return day >= 1 && day <= 5;
  }

  function startOfDay(date) {
    const d = new Date(date);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function countWeekdaysBetween(fromExclusive, toInclusive) {
    let count = 0;
    const cursor = new Date(fromExclusive);
    cursor.setDate(cursor.getDate() + 1);
    while (cursor <= toInclusive) {
      if (isWeekday(cursor)) count++;
      cursor.setDate(cursor.getDate() + 1);
    }
    return count;
  }

  // ==================== DATA LOADING ====================
  async function loadUser(uid, force = false) {
    if (!force) {
      const cached = sessionStorage.getItem(DASHBOARD_CACHE_KEY);
      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          if (parsed.uid === uid) { userData = parsed.data; return; }
        } catch (e) { /* ignore */ }
      }
    }
    const snap = await getDoc(doc(db, "users", uid));
    userData = snap.exists() ? snap.data() : {};
    sessionStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify({ uid, data: userData, fetchedAt: Date.now() }));
  }

  async function loadInvestments(uid, force = false) {
    if (!force) {
      const cached = sessionStorage.getItem(INVESTMENTS_CACHE_KEY);
      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          if (parsed.uid === uid) { investments = parsed.investments; return; }
        } catch (e) { /* ignore */ }
      }
    }
    const q = query(collection(db, "investments"), where("uid", "==", uid), where("status", "==", "active"));
    const snap = await getDocs(q);
    investments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    sessionStorage.setItem(INVESTMENTS_CACHE_KEY, JSON.stringify({ uid, investments, fetchedAt: Date.now() }));
  }

  // ==================== ROI CREDITING ENGINE ====================
  async function creditPendingROI() {
    if (!investments.length) return;
    const today = startOfDay(new Date());
    let totalCredited = 0;
    let anyUpdated = false;

    for (const inv of investments) {
      if (inv.status !== "active") continue;
      const invRef = doc(db, "investments", inv.id);

      if (inv.planCategory === "company") {
        const lastDrop = inv.lastDropDate
          ? startOfDay(inv.lastDropDate.toDate ? inv.lastDropDate.toDate() : new Date(inv.lastDropDate))
          : startOfDay(inv.startDate.toDate ? inv.startDate.toDate() : new Date(inv.startDate));
        const remainingDays = inv.days - (inv.daysPaid || 0);
        if (remainingDays <= 0) continue;

        let dueDays = countWeekdaysBetween(lastDrop, today);
        if (dueDays <= 0) continue;
        dueDays = Math.min(dueDays, remainingDays);

        const amountCredited = dueDays * inv.dailyROI;
        const newDaysPaid = (inv.daysPaid || 0) + dueDays;
        const isCompleted = newDaysPaid >= inv.days;

        await updateDoc(invRef, {
          daysPaid: newDaysPaid,
          lastDropDate: Timestamp.fromDate(today),
          status: isCompleted ? "completed" : "active"
        });
        await updateDoc(doc(db, "users", currentUser.uid), {
          balance: increment(amountCredited),
          totalEarnings: increment(amountCredited)
        });
        totalCredited += amountCredited;
        anyUpdated = true;

      } else if (inv.planCategory === "premium") {
        if (inv.creditedAt) continue;
        const start = startOfDay(inv.startDate.toDate ? inv.startDate.toDate() : new Date(inv.startDate));
        let target = new Date(start);
        target.setDate(target.getDate() + inv.days);
        while (!isWeekday(target)) target.setDate(target.getDate() + 1);

        if (today >= startOfDay(target)) {
          await updateDoc(invRef, {
            status: "completed",
            creditedAt: Timestamp.fromDate(today)
          });
          await updateDoc(doc(db, "users", currentUser.uid), {
            balance: increment(inv.total),
            totalEarnings: increment(inv.total)
          });
          totalCredited += inv.total;
          anyUpdated = true;
        }
      }
    }

    if (anyUpdated) {
      sessionStorage.removeItem(DASHBOARD_CACHE_KEY);
      sessionStorage.removeItem(INVESTMENTS_CACHE_KEY);
      await loadUser(currentUser.uid, true);
      await loadInvestments(currentUser.uid, true);
      if (totalCredited > 0) showToast(`💰 ${formatNaira(totalCredited)} credited from your investments!`, "success", 5000);
    }
  }

  // ==================== REFERRAL DISTRIBUTION ====================
  async function distributeReferralBonus(batch, purchaserUid, purchaseAmount) {
    if (userData.firstPurchaseDone) return { distributed: false, levels: 0 };

    let levelsCredited = 0;
    let uplinerUid = userData.referredBy || null;

    for (let level = 1; level <= 3 && uplinerUid; level++) {
      const uplinerSnap = await getDoc(doc(db, "users", uplinerUid));
      if (!uplinerSnap.exists()) break;
      const uplinerData = uplinerSnap.data();
      const bonus = Math.round(purchaseAmount * REFERRAL_RATES[level]);

      batch.update(doc(db, "users", uplinerUid), {
        balance: increment(bonus),
        referralEarnings: increment(bonus)
      });
      levelsCredited++;
      uplinerUid = uplinerData.referredBy || null;
    }

    batch.update(doc(db, "users", purchaserUid), { firstPurchaseDone: true });
    return { distributed: levelsCredited > 0, levels: levelsCredited };
  }

  // ==================== RENDER FUNCTIONS ====================
  function renderActiveInvestments() {
    const section = document.getElementById("activeInvSection");
    if (!investments.length) { section.innerHTML = ""; return; }

    section.innerHTML = `<div class="section-title">Active Investments</div>` + investments.map(inv => {
      const isCompany = inv.planCategory === "company";
      const progress = isCompany
        ? Math.min(100, Math.round(((inv.daysPaid || 0) / inv.days) * 100))
        : (inv.creditedAt ? 100 : 33);
      const label = isCompany
        ? `Company Plan · ${formatNaira(inv.amount)}`
        : `Premium VIP${inv.vipTier} · ${formatNaira(inv.amount)}`;
      const meta = isCompany
        ? `Day ${inv.daysPaid || 0} of ${inv.days} · ${formatNaira(inv.dailyROI)}/weekday`
        : `Day ${inv.creditedAt ? 3 : "in progress"} of 3 · Payout ${formatNaira(inv.total)}`;

      return `
        <div class="active-inv">
          <div class="active-inv-top">
            <p class="title">${label}</p>
            <span class="badge">Active</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${progress}%;"></div>
          </div>
          <p class="meta">${meta}</p>
        </div>`;
    }).join("");
  }

  function renderCompanyPlans() {
    const el = document.getElementById("companyTab");
    el.innerHTML = COMPANY_PLANS.map(p => `
      <div class="plan-card company-card">
        <div class="plan-card-top">
          <span class="plan-amount">${formatNaira(p.amount)}</span>
          <span class="plan-tag company">Company</span>
        </div>
        <div class="plan-detail-row">
          <span class="k">Daily ROI (Weekdays)</span>
          <span class="v">${formatNaira(p.dailyROI)}</span>
        </div>
        <div class="plan-detail-row">
          <span class="k">Duration</span>
          <span class="v">${p.days} weekdays</span>
        </div>
        <div class="plan-detail-row">
          <span class="k">Total Return</span>
          <span class="v" style="color: var(--success);">${formatNaira(p.total)}</span>
        </div>
        <button class="plan-btn company-btn" data-category="company" data-amount="${p.amount}">
          Invest Now
        </button>
      </div>
    `).join("");
  }

  function renderPremiumPlans() {
    const el = document.getElementById("premiumTab");
    const unlockedTier = userData.unlockedVipTier || 0;
    const alreadyHasPremium = !!userData.hasPremiumPlan;

    el.innerHTML = PREMIUM_PLANS.map(p => {
      const isUnlocked = unlockedTier >= p.tier;
      const locked = !isUnlocked || alreadyHasPremium;
      const requiredAmount = minCompanyAmountForTier(p.tier);

      let noteHtml = "";
      if (alreadyHasPremium) {
        noteHtml = `<p class="lock-note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          You've already purchased a premium plan — only one is allowed per account.
        </p>`;
      } else if (!isUnlocked) {
        noteHtml = `<p class="lock-note">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Purchase a Company Plan of ${formatNaira(requiredAmount)}+ to unlock VIP${p.tier}.
        </p>`;
      }

      return `
        <div class="plan-card premium-card ${locked ? "locked" : ""}">
          <div class="plan-card-top">
            <span class="plan-amount">VIP ${p.tier}</span>
            <span class="plan-tag premium">★ Premium</span>
          </div>
          <div class="plan-detail-row">
            <span class="k">Min Investment</span>
            <span class="v">${formatNaira(p.amount)}</span>
          </div>
          <div class="plan-detail-row">
            <span class="k">Duration</span>
            <span class="v">${p.days} days</span>
          </div>
          <div class="plan-detail-row">
            <span class="k">Total Payout</span>
            <span class="v" style="color: var(--gold);">${formatNaira(p.total)}</span>
          </div>
          <div class="plan-detail-row">
            <span class="k">Profit</span>
            <span class="v" style="color: var(--success);">${formatNaira(p.total - p.amount)}</span>
          </div>
          <button class="plan-btn premium-btn" data-category="premium" data-tier="${p.tier}" ${locked ? "disabled" : ""}>
            ${alreadyHasPremium ? "Already Purchased" : isUnlocked ? "Invest Now" : "Locked"}
          </button>
          ${noteHtml}
        </div>`;
    }).join("");
  }

  function renderAll() {
    document.getElementById("availableBalance").textContent = formatNaira(userData.balance) + ".00";
    renderActiveInvestments();
    renderCompanyPlans();
    renderPremiumPlans();
    attachPlanButtonHandlers();
  }

  // ==================== TABS ====================
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const target = tab.dataset.tab;
      document.getElementById("companyTab").style.display = target === "company" ? "flex" : "none";
      document.getElementById("premiumTab").style.display = target === "premium" ? "flex" : "none";
    });
  });

  // ==================== PURCHASE FLOW ====================
  const modal = document.getElementById("confirmModal");
  let pendingPurchase = null;

  function attachPlanButtonHandlers() {
    document.querySelectorAll(".plan-btn[data-category]").forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        const category = btn.dataset.category;
        if (category === "company") {
          const amount = Number(btn.dataset.amount);
          const plan = COMPANY_PLANS.find(p => p.amount === amount);
          openConfirmModal({
            category: "company",
            amount: plan.amount,
            dailyROI: plan.dailyROI,
            days: plan.days,
            total: plan.total,
            name: `Company Plan · ${formatNaira(plan.amount)}`,
            durationLabel: `${plan.days} weekdays (Mon–Fri)`
          });
        } else {
          const tier = Number(btn.dataset.tier);
          const plan = PREMIUM_PLANS.find(p => p.tier === tier);
          openConfirmModal({
            category: "premium",
            amount: plan.amount,
            vipTier: plan.tier,
            days: plan.days,
            total: plan.total,
            name: `Premium VIP${plan.tier}`,
            durationLabel: `${plan.days} days (one-time payout)`
          });
        }
      });
    });
  }

  function openConfirmModal(plan) {
    pendingPurchase = plan;
    document.getElementById("modalPlanName").textContent = plan.name;
    document.getElementById("modalAmount").textContent = formatNaira(plan.amount);
    document.getElementById("modalDuration").textContent = plan.durationLabel;
    document.getElementById("modalReturn").textContent = formatNaira(plan.total);
    modal.classList.add("open");
  }

  document.getElementById("modalCancel").addEventListener("click", () => modal.classList.remove("open"));
  modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.remove("open"); });

  document.getElementById("modalConfirm").addEventListener("click", async () => {
    if (!pendingPurchase || !currentUser) return;
    const plan = pendingPurchase;
    const balance = Number(userData.balance) || 0;

    if (balance < plan.amount) {
      showToast("Insufficient balance. Please make a deposit first.", "error");
      modal.classList.remove("open");
      return;
    }
    if (plan.category === "premium" && userData.hasPremiumPlan) {
      showToast("You've already purchased a premium plan.", "error");
      modal.classList.remove("open");
      return;
    }

    const btn = document.getElementById("modalConfirm");
    btn.disabled = true;
    btn.classList.add("loading");

    try {
      const batch = writeBatch(db);
      const investmentRef = doc(collection(db, "investments"));
      const now = new Date();

      const investmentDoc = plan.category === "company"
        ? {
            uid: currentUser.uid, planCategory: "company", amount: plan.amount,
            dailyROI: plan.dailyROI, days: plan.days, daysPaid: 0,
            startDate: Timestamp.fromDate(now), lastDropDate: Timestamp.fromDate(now),
            status: "active", createdAt: serverTimestamp()
          }
        : {
            uid: currentUser.uid, planCategory: "premium", amount: plan.amount,
            vipTier: plan.vipTier, days: plan.days, total: plan.total,
            startDate: Timestamp.fromDate(now), creditedAt: null,
            status: "active", createdAt: serverTimestamp()
          };

      batch.set(investmentRef, investmentDoc);
      batch.update(doc(db, "users", currentUser.uid), {
        balance: increment(-plan.amount),
        totalInvested: increment(plan.amount),
        ...(plan.category === "company" ? { unlockedVipTier: Math.max(userData.unlockedVipTier || 0, unlockedTierFor(plan.amount)) } : {}),
        ...(plan.category === "premium" ? { hasPremiumPlan: true } : {})
      });

      const referralResult = await distributeReferralBonus(batch, currentUser.uid, plan.amount);
      await batch.commit();

      sessionStorage.removeItem(DASHBOARD_CACHE_KEY);
      sessionStorage.removeItem(INVESTMENTS_CACHE_KEY);

      showToast(`Investment successful! ${formatNaira(plan.amount)} invested in ${plan.name}.`, "success", 5000);
      if (referralResult.distributed) {
        setTimeout(() => {
          showToast(`🎉 Referral bonus sent to your upliner${referralResult.levels > 1 ? "s" : ""} — Level 1${referralResult.levels >= 2 ? "-" + referralResult.levels : ""} checked.`, "success", 5000);
        }, 1000);
      }

      modal.classList.remove("open");
      await loadUser(currentUser.uid, true);
      await loadInvestments(currentUser.uid, true);
      renderAll();

    } catch (err) {
      console.error("Investment error:", err);
      showToast("Couldn't complete your investment. Please try again.", "error");
    } finally {
      btn.disabled = false;
      btn.classList.remove("loading");
    }
  });

  // ==================== INIT ====================
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    currentUser = user;
    try {
      await loadUser(user.uid);
      await loadInvestments(user.uid);
      renderAll();
      await creditPendingROI();
      renderAll();
    } catch (e) {
      console.error("Init error:", e);
      showToast("Couldn't load plans right now. Please refresh.", "error");
    }
  });

  // ==================== REFRESH ====================
  document.getElementById("refreshBtn").addEventListener("click", async () => {
    if (!currentUser) return;
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");
    try {
      await loadUser(currentUser.uid, true);
      await loadInvestments(currentUser.uid, true);
      await creditPendingROI();
      renderAll();
      showToast("Plans updated", "success", 2500);
    } catch (e) {
      showToast("Couldn't refresh right now", "error");
    } finally {
      setTimeout(() => btn.classList.remove("spinning"), 600);
    }
  });

  console.log("🚀 Quantum Plans - Ready");
</script>

</body>
