<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>VELTRIX — Transaction History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0c; --surface: #111915; --surface-2: #1a241e; --surface-3: #243028;
    --primary: #22c55e; --primary-dark: #16a34a; --primary-glow: rgba(34,197,94,0.25);
    --gold: #f59e0b; --text: #f0fdf4; --text-bright: #ffffff; --muted: #9ca3a0;
    --success: #22c55e; --warning: #f59e0b; --error: #ef4444;
    --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
    --shadow-lg: 0 30px 60px rgba(0,0,0,0.6); --shadow-md: 0 15px 35px rgba(0,0,0,0.4);
    --radius: 18px; --radius-sm: 13px; --nav-height: 72px; --safe-bottom: 120px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;position:relative;padding-bottom:var(--safe-bottom);overflow-x:hidden;background-image:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,0.04) 0%,transparent 50%);}
  a{text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent;}
  .floating-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);opacity:0.2;}
  .floating-orb.orb-1{width:220px;height:220px;background:rgba(245,158,11,0.07);bottom:-60px;right:-60px;animation:float1 15s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-25px,-15px) scale(1.05);}}
  .container{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:20px 18px var(--safe-bottom);animation:fadeUp 0.5s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;justify-content:space-between;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .back-btn,.icon-btn{width:40px;height:40px;border-radius:12px;flex:none;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all 0.25s;}
  .back-btn:hover,.icon-btn:hover{background:var(--surface-2);border-color:var(--border-hover);color:var(--text-bright);}
  .back-btn svg,.icon-btn svg{width:18px;height:18px;}
  .icon-btn.spinning{animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .topbar h1{font-family:'DM Sans',sans-serif;font-size:19px;font-weight:700;color:var(--text-bright);}
  .summary-card{background:linear-gradient(135deg,#0f1a12,#1a2215);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-md);animation:fadeUp 0.5s ease 0.05s both;}
  .summary-item{text-align:center;}
  .summary-item .s-val{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:800;color:var(--text-bright);}
  .summary-item .s-label{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;margin-top:2px;}
  .filter-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding:2px;animation:fadeUp 0.5s ease 0.1s both;}
  .filter-tabs::-webkit-scrollbar{display:none;}
  .filter-tab{flex:none;padding:8px 14px;border-radius:18px;font-size:11.5px;font-weight:700;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.3s;font-family:'DM Sans',sans-serif;}
  .filter-tab:hover{border-color:var(--border-hover);color:var(--text);}
  .filter-tab.active{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 4px 15px var(--primary-glow);}
  .tx-list{display:flex;flex-direction:column;gap:7px;animation:fadeUp 0.5s ease 0.15s both;}
  .tx-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;transition:all 0.3s;display:flex;align-items:center;gap:10px;}
  .tx-item:hover{border-color:var(--border-hover);transform:translateX(2px);box-shadow:var(--shadow-md);}
  .tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none;}
  .tx-icon.deposit{background:rgba(34,197,94,0.12);color:var(--success);}
  .tx-icon.withdrawal{background:rgba(239,68,68,0.1);color:var(--error);}
  .tx-icon.investment{background:rgba(34,197,94,0.1);color:var(--primary);}
  .tx-icon.earning{background:rgba(34,197,94,0.12);color:var(--success);}
  .tx-icon.referral{background:rgba(245,158,11,0.12);color:var(--gold);}
  .tx-icon svg{width:18px;height:18px;}
  .tx-info{flex:1;min-width:0;}
  .tx-info .tx-title{font-size:13px;font-weight:700;color:var(--text-bright);margin-bottom:2px;}
  .tx-info .tx-meta{font-size:10.5px;color:var(--muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
  .tx-info .tx-date-full{font-size:10px;color:var(--muted);margin-top:2px;}
  .tx-status{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:4px;}
  .tx-status.pending{background:rgba(245,158,11,0.15);color:var(--warning);}
  .tx-status.approved,.tx-status.completed{background:rgba(34,197,94,0.15);color:var(--success);}
  .tx-status.rejected{background:rgba(239,68,68,0.12);color:var(--error);}
  .tx-status.active{background:rgba(34,197,94,0.12);color:var(--primary);}
  .tx-amount{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:800;flex:none;text-align:right;min-width:65px;}
  .tx-amount.credit{color:var(--success);}
  .tx-amount.debit{color:var(--error);}
  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);animation:fadeUp 0.5s ease;}
  .empty-state .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-state p{font-size:13.5px;line-height:1.5;}
  .skeleton{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);height:65px;margin-bottom:7px;background-image:linear-gradient(90deg,var(--surface) 0%,var(--surface-2) 50%,var(--surface) 100%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,15,12,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 8px calc(8px + env(safe-area-inset-bottom));height:var(--nav-height);}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;color:var(--muted);flex:1;padding:6px 4px;border-radius:12px;transition:all 0.3s;cursor:pointer;}
  .nav-item svg{width:21px;height:21px;}
  .nav-item span{font-weight:600;}
  .nav-item.active{color:var(--primary);}
  .nav-item.active::before{content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--primary);border-radius:0 0 3px 3px;}
  .toast-container{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:380px;}
  .toast{background:var(--surface-3);border:1px solid var(--border);padding:13px 15px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-lg);animation:slideIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);display:flex;align-items:center;gap:9px;}
  .toast.error{border-left:4px solid var(--error);}
  .toast.success{border-left:4px solid var(--success);}
  @keyframes slideIn{from{opacity:0;transform:translateX(80px);}to{opacity:1;transform:translateX(0);}}
  @media(max-width:480px){.container{padding:16px 12px var(--safe-bottom);}}
  @media(min-width:768px){.container{padding:28px 22px var(--safe-bottom);}}
</style>
</head>
<body>

<div class="floating-orb orb-1"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg></a>
      <h1>History</h1>
    </div>
    <button class="icon-btn" id="refreshBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
  </div>

  <div class="summary-card">
    <div class="summary-item"><div class="s-val" id="totalTx">0</div><div class="s-label">Total</div></div>
    <div class="summary-item"><div class="s-val" style="color:var(--success);" id="totalCredits">₦0</div><div class="s-label">Credits</div></div>
    <div class="summary-item"><div class="s-val" style="color:var(--error);" id="totalDebits">₦0</div><div class="s-label">Debits</div></div>
    <div class="summary-item"><div class="s-val" style="color:var(--primary);" id="pendingCount">0</div><div class="s-label">Pending</div></div>
  </div>

  <div class="filter-tabs">
    <div class="filter-tab active" data-filter="all">All</div>
    <div class="filter-tab" data-filter="deposit">Deposits</div>
    <div class="filter-tab" data-filter="withdrawal">Withdrawals</div>
    <div class="filter-tab" data-filter="investment">Investments</div>
    <div class="filter-tab" data-filter="earning">Earnings</div>
    <div class="filter-tab" data-filter="referral">Referrals</div>
  </div>

  <div class="tx-list" id="txList">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span>Home</span></a>
  <a href="plans.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg><span>Plans</span></a>
  <a href="history.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg><span>History</span></a>
  <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
</nav>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null, allTx = [], activeFilter = "all";

  function showToast(m, t = "info", d = 4000) {
    const c = document.getElementById("toastContainer");
    const el = document.createElement("div");
    el.className = `toast ${t}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    el.innerHTML = `<span>${icons[t]||icons.info}</span>${m}`;
    if (c.children.length >= 3) c.removeChild(c.firstChild);
    c.appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transform = "translateX(80px)"; el.style.transition = "all 0.3s"; setTimeout(() => { if (el.parentNode) el.remove(); }, 300); }, d);
  }

  function formatNaira(v) { return "₦" + (Number(v) || 0).toLocaleString("en-NG"); }
  function formatFullDate(ts) {
    if (!ts) return "—";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString("en-NG", { weekday:"short", day:"numeric", month:"short", year:"numeric" }) + " · " + d.toLocaleTimeString("en-NG", { hour:"2-digit", minute:"2-digit" });
  }
  function formatRelative(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((new Date() - d) / 1000);
    if (diff < 60) return "Just now";
    if (diff < 3600) return Math.floor(diff/60) + "m ago";
    if (diff < 86400) return Math.floor(diff/3600) + "h ago";
    return Math.floor(diff/86400) + "d ago";
  }

  const txIcons = {
    deposit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19,12 12,19 5,12"/></svg>',
    withdrawal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5,12 12,5 19,12"/></svg>',
    investment: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>',
    earning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,6 13.5,15.5 8.5,10.5 1,18"/><polyline points="17,6 23,6 23,12"/></svg>',
    referral: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17,11 19,13 23,9"/></svg>',
  };

  function txTitle(tx) {
    const t = {
      deposit: "Bank Deposit", withdrawal: "Withdrawal",
      investment: tx.planCategory==="premium"?"Premium Plan":"Company Plan",
      earning: "ROI Earnings", referral: "Referral Bonus"
    };
    return t[tx.type] || "Transaction";
  }

  function txDesc(tx) {
    if (tx.type==="withdrawal") return `Fee: ${formatNaira(tx.fee||0)} · Net: ${formatNaira(tx.netAmount||0)}`;
    if (tx.type==="investment") return tx.planCategory==="premium"?`Payout: ${formatNaira(tx.total||0)}`:`${formatNaira(tx.dailyROI||0)}/day × ${tx.days||25}d`;
    if (tx.type==="earning") return "12AM Auto-credit";
    if (tx.type==="referral") return "Commission";
    return "";
  }

  // ✅ NO orderBy - fetches with where() only, sorts client-side
  async function fetchAll(uid) {
    console.log("🔍 Fetching history for:", uid);
    try {
      const [dSnap, wSnap, iSnap, uSnap] = await Promise.all([
        getDocs(query(collection(db,"deposits"), where("uid","==",uid))),
        getDocs(query(collection(db,"withdrawals"), where("uid","==",uid))),
        getDocs(query(collection(db,"investments"), where("uid","==",uid))),
        getDocs(query(collection(db,"users"), where("__name__","==",uid)))
      ]);

      console.log(`📊 Deposits: ${dSnap.size}, Withdrawals: ${wSnap.size}, Investments: ${iSnap.size}`);

      const deposits = dSnap.docs.map(d=>({id:d.id,type:"deposit",...d.data()}));
      const withdrawals = wSnap.docs.map(d=>({id:d.id,type:"withdrawal",...d.data()}));
      const investments = iSnap.docs.map(d=>({id:d.id,type:"investment",...d.data()}));

      // Earnings from company plans
      const earnings = iSnap.docs.filter(d=>d.data().planCategory==="company"&&(d.data().daysPaid||0)>0).map(d=>({id:d.id+"_earn",type:"earning",amount:(d.data().daysPaid||0)*(d.data().dailyROI||0),status:"completed",createdAt:d.data().lastDropDate||d.data().createdAt,description:"ROI Earnings"}));

      // Referral bonus
      let referrals = [];
      if (!uSnap.empty && uSnap.docs[0].data().referralEarnings > 0) {
        referrals = [{ id:"ref_total", type:"referral", amount:uSnap.docs[0].data().referralEarnings, status:"completed", createdAt:uSnap.docs[0].data().createdAt, description:"Referral Earnings" }];
      }

      const all = [...deposits,...withdrawals,...investments,...earnings,...referrals];
      all.sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
      console.log(`✅ Total history items: ${all.length}`);
      return all;
    } catch(e) { console.error("Fetch error:",e); return []; }
  }

  function renderSummary() {
    const credits = allTx.filter(t=>["deposit","earning","referral"].includes(t.type));
    const debits = allTx.filter(t=>["withdrawal","investment"].includes(t.type));
    const pending = allTx.filter(t=>t.status==="pending");
    document.getElementById("totalTx").textContent = allTx.length;
    document.getElementById("totalCredits").textContent = formatNaira(credits.reduce((s,t)=>s+(t.amount||0),0));
    document.getElementById("totalDebits").textContent = formatNaira(debits.reduce((s,t)=>s+(t.amount||0),0));
    document.getElementById("pendingCount").textContent = pending.length;
  }

  function renderList() {
    const filtered = activeFilter==="all"?allTx:allTx.filter(t=>{if(activeFilter==="earning")return t.type==="earning";if(activeFilter==="referral")return t.type==="referral";return t.type===activeFilter;});
    const container = document.getElementById("txList");
    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No transactions yet.</p><p style="margin-top:4px;">Your history will appear here once you start using your account.</p></div>`;
      renderSummary(); return;
    }
    container.innerHTML = filtered.map(tx=>{
      const isCredit = ["deposit","earning","referral"].includes(tx.type);
      const displayAmount = tx.type==="withdrawal"&&tx.netAmount?tx.netAmount:tx.amount;
      return `<div class="tx-item">
        <div class="tx-icon ${tx.type}">${txIcons[tx.type]||txIcons.deposit}</div>
        <div class="tx-info">
          <div class="tx-title">${txTitle(tx)} · ${formatNaira(tx.amount||0)}</div>
          <div class="tx-meta"><span>${formatRelative(tx.createdAt)}</span>${tx.status?`<span class="tx-status ${tx.status}">${tx.status.charAt(0).toUpperCase()+tx.status.slice(1)}</span>`:""}${txDesc(tx)?`<span>· ${txDesc(tx)}</span>`:""}</div>
          <div class="tx-date-full">${formatFullDate(tx.createdAt)}</div>
        </div>
        <div class="tx-amount ${isCredit?'credit':'debit'}">${isCredit?'+':'-'}${formatNaira(displayAmount||0)}</div>
      </div>`;
    }).join("");
    renderSummary();
  }

  document.querySelectorAll(".filter-tab").forEach(t=>t.addEventListener("click",()=>{document.querySelectorAll(".filter-tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");activeFilter=t.dataset.filter;renderList();}));

  document.getElementById("refreshBtn").addEventListener("click",async()=>{if(!currentUser)return;const btn=document.getElementById("refreshBtn");btn.classList.add("spinning");try{allTx=await fetchAll(currentUser.uid);renderList();showToast("History refreshed","success",2500);}catch(e){showToast("Couldn't refresh.","error");}finally{setTimeout(()=>btn.classList.remove("spinning"),600);}});

  onAuthStateChanged(auth,async(user)=>{if(!user){window.location.href="login.html";return;}currentUser=user;document.getElementById("txList").innerHTML='<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';allTx=await fetchAll(user.uid);renderList();});

  console.log("🚀 Veltrix History - Ready");
</script>
</body>
</html>
