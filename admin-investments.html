<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Admin Investments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#060818; --surface:#0d1226; --surface-2:#121834;
    --cyan:#00e5ff; --violet:#a855f7; --text:#e8ecf7; --muted:#8b93b8;
    --success:#22e6a3; --error:#ff5470; --gold:#ffcf5c; --border:rgba(232,236,247,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{ background:var(--void); color:var(--text); font-family:'Inter', sans-serif; min-height:100vh; position:relative; padding-bottom:40px; }
  a{ text-decoration:none; color:inherit; }
  .bg-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(600px circle at 15% 0%, rgba(168,85,247,0.10), transparent 55%),
      radial-gradient(700px circle at 90% 40%, rgba(0,229,255,0.09), transparent 55%);
  }
  .container{ position:relative; z-index:1; max-width:560px; margin:0 auto; padding:20px 18px; }

  .topbar{ display:flex; align-items:center; gap:14px; margin-bottom:16px; justify-content:space-between; }
  .topbar-left{ display:flex; align-items:center; gap:14px; }
  .back-btn, .icon-btn-round{
    width:38px; height:38px; border-radius:50%; flex:none;
    background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer;
  }
  .icon-btn-round.spinning{ animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .topbar h1{ font-family:'Space Grotesk', sans-serif; font-size:18px; font-weight:600; }

  .stats-grid{ display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; margin-bottom:16px; }
  .stat-card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; }
  .stat-card p.label{ font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; margin-bottom:5px; }
  .stat-card p.value{ font-family:'Space Grotesk', sans-serif; font-size:17px; font-weight:700; }
  .skeleton-text{
    display:inline-block; width:60px; height:16px; border-radius:5px;
    background-image:linear-gradient(90deg, var(--surface-2) 0%, var(--surface) 50%, var(--surface-2) 100%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
  }

  .search-row{ display:flex; gap:8px; margin-bottom:14px; }
  .search-row input{
    flex:1; background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:12px 14px; color:var(--text); font-size:14px; font-family:'Inter', sans-serif; outline:none;
  }
  .search-row input:focus{ border-color:var(--cyan); }
  .search-row button{
    background:linear-gradient(120deg, var(--cyan), var(--violet)); border:none; border-radius:12px;
    padding:0 16px; color:#040613; font-weight:600; font-size:13.5px; cursor:pointer; font-family:'Space Grotesk', sans-serif;
  }
  .clear-search{ font-size:12px; color:var(--cyan); cursor:pointer; margin-bottom:12px; display:inline-block; }

  .tabs{ display:flex; gap:8px; margin-bottom:10px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:5px; }
  .tab{ flex:1; text-align:center; padding:9px 6px; border-radius:10px; font-size:12.5px; font-weight:600; color:var(--muted); cursor:pointer; }
  .tab.active{ background:linear-gradient(120deg, var(--cyan), var(--violet)); color:#040613; }

  .status-chips{ display:flex; gap:8px; margin-bottom:16px; }
  .chip{
    padding:6px 13px; border-radius:16px; font-size:12px; font-weight:600; cursor:pointer;
    background:var(--surface); border:1px solid var(--border); color:var(--muted);
  }
  .chip.active{ border-color:var(--cyan); color:var(--cyan); background:rgba(0,229,255,0.08); }

  .inv-card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:15px; margin-bottom:10px; }
  .inv-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .inv-info p.name{ font-size:14px; font-weight:600; }
  .inv-info p.time{ font-size:11px; color:var(--muted); margin-top:2px; }
  .inv-tag{ font-size:10px; font-weight:700; padding:3px 8px; border-radius:7px; background:rgba(0,229,255,0.12); color:var(--cyan); }
  .inv-tag.premium{ background:rgba(255,207,92,0.15); color:var(--gold); }
  .inv-amount{ font-family:'Space Grotesk', sans-serif; font-size:16px; font-weight:700; text-align:right; }

  .inv-detail-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:10px; }
  .inv-detail{ background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:8px 6px; text-align:center; }
  .inv-detail p.k{ font-size:9px; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .inv-detail p.v{ font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:600; }

  .progress-track{ background:var(--surface-2); border-radius:6px; height:6px; overflow:hidden; margin-bottom:10px; }
  .progress-fill{ height:100%; background:linear-gradient(90deg, var(--cyan), var(--violet)); border-radius:6px; }

  .inv-bottom{ display:flex; justify-content:space-between; align-items:center; }
  .status-badge{ font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:8px; background:rgba(34,230,163,0.14); color:var(--success); }
  .status-badge.completed{ background:rgba(139,147,184,0.16); color:var(--muted); }
  .mark-btn{
    background:none; border:1px solid var(--border); color:var(--muted); font-size:11.5px;
    padding:6px 11px; border-radius:8px; cursor:pointer;
  }
  .mark-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .load-more-btn{
    width:100%; padding:12px; border-radius:12px; border:1px solid var(--border);
    background:var(--surface); color:var(--cyan); font-weight:600; font-size:13.5px; cursor:pointer;
    font-family:'Space Grotesk', sans-serif; margin-top:6px;
  }
  .load-more-btn:disabled{ opacity:0.5; cursor:not-allowed; }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--muted); }
  .empty-state .emoji{ font-size:38px; margin-bottom:10px; }
  .skeleton{
    background:var(--surface); border:1px solid var(--border); border-radius:16px; height:150px;
    background-image:linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
    background-size:200% 100%; animation:shimmer 1.4s infinite; margin-bottom:10px;
  }
  @keyframes shimmer{ from{ background-position:200% 0;} to{ background-position:-200% 0;} }

  #toast-stack{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:100; display:flex; flex-direction:column; gap:8px;
    width:calc(100% - 32px); max-width:420px;
  }
  .toast{
    background:var(--surface-2); border:1px solid var(--border); border-left:3px solid var(--cyan);
    padding:12px 14px; border-radius:10px; font-size:13.5px; box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:slideDown .25s ease;
  }
  .toast.error{ border-left-color:var(--error); }
  .toast.success{ border-left-color:var(--success); }
  @keyframes slideDown{ from{ opacity:0; transform:translateY(-10px);} to{ opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="admin-dashboard.html" class="back-btn">←</a>
      <h1>Investments</h1>
    </div>
    <div class="icon-btn-round" id="refreshBtn" title="Refresh">⟳</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><p class="label">Total Investments</p><p class="value" id="statCount"><span class="skeleton-text"></span></p></div>
    <div class="stat-card"><p class="label">Total Invested</p><p class="value" id="statTotal"><span class="skeleton-text"></span></p></div>
    <div class="stat-card"><p class="label">Active</p><p class="value" id="statActive"><span class="skeleton-text"></span></p></div>
    <div class="stat-card"><p class="label">Completed</p><p class="value" id="statCompleted"><span class="skeleton-text"></span></p></div>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search by username">
    <button id="searchBtn">Search</button>
  </div>
  <span class="clear-search" id="clearSearch" style="display:none;">✕ Clear search results</span>

  <div class="tabs">
    <div class="tab active" data-category="all">All Plans</div>
    <div class="tab" data-category="company">Company</div>
    <div class="tab" data-category="premium">Premium</div>
  </div>
  <div class="status-chips">
    <div class="chip active" data-status="all">All Status</div>
    <div class="chip" data-status="active">Active</div>
    <div class="chip" data-status="completed">Completed</div>
  </div>

  <div id="listContainer">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
  <button class="load-more-btn" id="loadMoreBtn" style="display:none;">Load More</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, updateDoc, collection, query, where, orderBy, limit,
    startAfter, getDocs, getCountFromServer, getAggregateFromServer, sum, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const PAGE_SIZE = 30;
  let activeCategory = "all";
  let activeStatus = "all";
  let lastVisibleDoc = null;
  let allLoaded = [];
  let isSearchMode = false;

  function toast(message, type = "info", duration = 4000) {
    const stack = document.getElementById("toast-stack");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = message;
    stack.appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity .25s ease";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 250);
    }, duration);
  }
  function formatNaira(v) { return "₦" + (Number(v) || 0).toLocaleString("en-NG"); }
  function formatTime(ts) {
    if (!ts) return "—";
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    return date.toLocaleDateString("en-NG", { day: "numeric", month: "short", year: "numeric" }) +
      " · " + date.toLocaleTimeString("en-NG", { hour: "2-digit", minute: "2-digit" });
  }
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
  }

  /* ---------------- Auth + role guard ---------------- */
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "admin-login.html"; return; }
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      const role = snap.exists() ? snap.data().role : null;
      if (role !== "admin") { await signOut(auth); window.location.href = "admin-login.html"; return; }
      loadStats();
      loadPage(true);
    } catch (e) { window.location.href = "admin-login.html"; }
  });

  /* ---------------- Aggregate stats (cheap, server-side) ---------------- */
  async function loadStats() {
    try {
      const invRef = collection(db, "investments");
      const [countSnap, totalAgg, activeSnap, completedSnap] = await Promise.all([
        getCountFromServer(invRef),
        getAggregateFromServer(invRef, { total: sum("amount") }),
        getCountFromServer(query(invRef, where("status", "==", "active"))),
        getCountFromServer(query(invRef, where("status", "==", "completed")))
      ]);
      document.getElementById("statCount").textContent = countSnap.data().count.toLocaleString("en-NG");
      document.getElementById("statTotal").textContent = formatNaira(totalAgg.data().total || 0);
      document.getElementById("statActive").textContent = activeSnap.data().count.toLocaleString("en-NG");
      document.getElementById("statCompleted").textContent = completedSnap.data().count.toLocaleString("en-NG");
    } catch (e) {
      toast("Couldn't load summary stats.", "error");
    }
  }

  /* ---------------- Tabs & status chips ---------------- */
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeCategory = tab.dataset.category;
      loadPage(true);
    });
  });
  document.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      activeStatus = chip.dataset.status;
      loadPage(true);
    });
  });

  /* =========================================================
     LOAD PAGE — default listing uses a single orderBy (no
     composite index needed). Category/status filters use a
     single where clause, sorted client-side instead of
     combining where+orderBy (which would need one).
     ========================================================= */
  async function loadPage(reset = true) {
    const container = document.getElementById("listContainer");
    if (reset) {
      container.innerHTML = `<div class="skeleton"></div><div class="skeleton"></div>`;
      allLoaded = [];
      lastVisibleDoc = null;
      isSearchMode = false;
      document.getElementById("clearSearch").style.display = "none";
    }

    try {
      const invRef = collection(db, "investments");
      let snap;

      if (activeCategory === "all" && activeStatus === "all") {
        const constraints = [orderBy("createdAt", "desc"), limit(PAGE_SIZE)];
        if (lastVisibleDoc) constraints.push(startAfter(lastVisibleDoc));
        snap = await getDocs(query(invRef, ...constraints));
      } else {
        // Single-field filter (category OR status) — pick whichever is active; if both set, filter category then refine client-side by status
        const field = activeCategory !== "all" ? "planCategory" : "status";
        const value = activeCategory !== "all" ? activeCategory : activeStatus;
        snap = await getDocs(query(invRef, where(field, "==", value), limit(PAGE_SIZE)));
      }

      let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (activeCategory !== "all" && activeStatus !== "all") {
        items = items.filter(i => i.status === activeStatus);
      }
      items.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));

      lastVisibleDoc = snap.docs[snap.docs.length - 1] || lastVisibleDoc;
      allLoaded = reset ? items : [...allLoaded, ...items];
      renderList(allLoaded);

      const canLoadMore = activeCategory === "all" && activeStatus === "all" && snap.docs.length === PAGE_SIZE;
      document.getElementById("loadMoreBtn").style.display = canLoadMore ? "block" : "none";
    } catch (e) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>Couldn't load investments. Please refresh.</p></div>`;
    }
  }

  document.getElementById("loadMoreBtn").addEventListener("click", async () => {
    const btn = document.getElementById("loadMoreBtn");
    btn.disabled = true; btn.textContent = "Loading…";
    await loadPage(false);
    btn.disabled = false; btn.textContent = "Load More";
  });

  /* ---------------- Search by username ---------------- */
  async function searchByUsername(term) {
    const trimmed = term.trim().toLowerCase();
    const container = document.getElementById("listContainer");
    if (!trimmed) return;

    container.innerHTML = `<div class="skeleton"></div>`;
    isSearchMode = true;
    document.getElementById("clearSearch").style.display = "inline-block";
    document.getElementById("loadMoreBtn").style.display = "none";

    try {
      const unameSnap = await getDoc(doc(db, "usernames", trimmed));
      if (!unameSnap.exists()) { renderList([]); return; }
      const uid = unameSnap.data().uid;
      const snap = await getDocs(query(collection(db, "investments"), where("uid", "==", uid), limit(50)));
      let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      items.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      allLoaded = items;
      renderList(items);
    } catch (e) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><p>Search failed. Please try again.</p></div>`;
    }
  }
  document.getElementById("searchBtn").addEventListener("click", () => searchByUsername(document.getElementById("searchInput").value));
  document.getElementById("searchInput").addEventListener("keydown", (e) => { if (e.key === "Enter") searchByUsername(e.target.value); });
  document.getElementById("clearSearch").addEventListener("click", () => {
    document.getElementById("searchInput").value = "";
    loadPage(true);
  });

  /* ---------------- Render ---------------- */
  function renderList(items) {
    const container = document.getElementById("listContainer");
    if (!items.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">📭</div><p>No investments found.</p></div>`;
      return;
    }

    container.innerHTML = items.map(inv => {
      const isCompany = inv.planCategory === "company";
      const progress = isCompany ? Math.min(100, Math.round(((inv.daysPaid || 0) / inv.days) * 100)) : (inv.creditedAt ? 100 : 33);
      return `
        <div class="inv-card" data-id="${inv.id}">
          <div class="inv-top">
            <div class="inv-info">
              <p class="name">${escapeHtml(inv.username ? "@" + inv.username : (inv.uid ? "UID: " + inv.uid.slice(0, 10) + "…" : "Unknown"))}</p>
              <p class="time">${formatTime(inv.createdAt)}</p>
            </div>
            <div>
              <div class="inv-amount">${formatNaira(inv.amount)}</div>
              <span class="inv-tag ${isCompany ? "" : "premium"}">${isCompany ? "Company" : "VIP" + inv.vipTier}</span>
            </div>
          </div>
          <div class="inv-detail-grid">
            <div class="inv-detail"><p class="k">Daily/Total</p><p class="v">${isCompany ? formatNaira(inv.dailyROI) + "/day" : formatNaira(inv.total)}</p></div>
            <div class="inv-detail"><p class="k">Progress</p><p class="v">${isCompany ? (inv.daysPaid || 0) + "/" + inv.days : (inv.creditedAt ? "3/3" : "Pending")}</p></div>
            <div class="inv-detail"><p class="k">Duration</p><p class="v">${inv.days} ${isCompany ? "wkdays" : "days"}</p></div>
          </div>
          <div class="progress-track"><div class="progress-fill" style="width:${progress}%;"></div></div>
          <div class="inv-bottom">
            <span class="status-badge ${inv.status === "completed" ? "completed" : ""}">${inv.status === "completed" ? "Completed" : "Active"}</span>
            ${inv.status !== "completed" ? `<button class="mark-btn" data-id="${inv.id}">Mark Completed</button>` : ""}
          </div>
        </div>`;
    }).join("");

    container.querySelectorAll(".mark-btn").forEach(btn => {
      btn.addEventListener("click", () => markCompleted(btn.dataset.id, btn));
    });
  }

  /* ---------------- Manual override: mark as completed ---------------- */
  async function markCompleted(investmentId, btn) {
    btn.disabled = true; btn.textContent = "Updating…";
    try {
      await updateDoc(doc(db, "investments", investmentId), {
        status: "completed",
        manuallyClosedAt: serverTimestamp()
      });
      const item = allLoaded.find(i => i.id === investmentId);
      if (item) item.status = "completed";
      renderList(allLoaded);
      toast("Investment marked as completed.", "success");
    } catch (e) {
      toast("Couldn't update this investment.", "error");
      btn.disabled = false; btn.textContent = "Mark Completed";
    }
  }

  /* ---------------- Refresh ---------------- */
  document.getElementById("refreshBtn").addEventListener("click", async () => {
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");
    await loadStats();
    if (isSearchMode) await searchByUsername(document.getElementById("searchInput").value);
    else await loadPage(true);
    btn.classList.remove("spinning");
    toast("List updated", "success", 1800);
  });
</script>
</body>
</html>
