<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>VELTRIX — Admin Investments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0c; --surface: #111915; --surface-2: #1a241e; --surface-3: #243028;
    --primary: #22c55e; --primary-dark: #16a34a; --primary-glow: rgba(34,197,94,0.25);
    --gold: #f59e0b; --text: #f0fdf4; --text-bright: #ffffff; --muted: #9ca3a0;
    --success: #22c55e; --warning: #f59e0b; --error: #ef4444;
    --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
    --shadow-lg: 0 30px 60px rgba(0,0,0,0.6); --shadow-md: 0 15px 35px rgba(0,0,0,0.4);
    --radius: 18px; --radius-sm: 13px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;position:relative;padding-bottom:40px;background-image:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,0.04) 0%,transparent 50%);}
  a{text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent;}

  .floating-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);opacity:0.18;}
  .floating-orb.orb-1{width:240px;height:240px;background:rgba(34,197,94,0.06);top:-60px;right:-50px;animation:float1 14s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-20px,15px) scale(1.05);}}

  .container{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:20px 18px 60px;animation:fadeUp 0.5s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;justify-content:space-between;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .back-btn,.icon-btn{width:38px;height:38px;border-radius:11px;flex:none;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all 0.25s;}
  .back-btn:hover,.icon-btn:hover{background:var(--surface-2);border-color:var(--border-hover);color:var(--text-bright);}
  .back-btn svg,.icon-btn svg{width:17px;height:17px;}
  .icon-btn.spinning{animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .topbar h1{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:var(--text-bright);}

  .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
  .stat-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;transition:all 0.3s;}
  .stat-card:hover{border-color:var(--border-hover);}
  .stat-card p.label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px;font-weight:700;}
  .stat-card p.value{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:800;color:var(--text-bright);}
  .skeleton-line{display:inline-block;width:60px;height:16px;border-radius:4px;background-image:linear-gradient(90deg,var(--surface-2) 0%,var(--surface-3) 50%,var(--surface-2) 100%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
  @keyframes shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}

  .search-row{display:flex;gap:8px;margin-bottom:12px;}
  .search-row input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;color:var(--text);font-size:13.5px;font-family:'Inter',sans-serif;outline:none;transition:all 0.3s;}
  .search-row input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
  .search-row button{background:linear-gradient(135deg,var(--primary),#16a34a);border:none;border-radius:var(--radius-sm);padding:0 15px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .clear-search{font-size:11.5px;color:var(--primary);cursor:pointer;margin-bottom:10px;display:inline-block;font-weight:600;}

  .tabs{display:flex;gap:5px;margin-bottom:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:5px;}
  .tab{flex:1;text-align:center;padding:9px 6px;border-radius:10px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.3s;}
  .tab:hover{color:var(--text);}
  .tab.active{background:linear-gradient(135deg,var(--primary),#16a34a);color:#fff;box-shadow:0 4px 12px var(--primary-glow);}

  .status-chips{display:flex;gap:6px;margin-bottom:14px;}
  .chip{padding:6px 12px;border-radius:16px;font-size:11.5px;font-weight:700;cursor:pointer;background:var(--surface);border:1.5px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;transition:all 0.3s;}
  .chip:hover{border-color:var(--border-hover);}
  .chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}

  .inv-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:15px;margin-bottom:10px;transition:all 0.3s;}
  .inv-card:hover{border-color:var(--border-hover);}
  .inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .inv-info p.name{font-size:13.5px;font-weight:700;color:var(--text-bright);}
  .inv-info p.time{font-size:11px;color:var(--muted);margin-top:2px;}
  .inv-tag{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(34,197,94,0.12);color:var(--primary);}
  .inv-tag.premium{background:rgba(245,158,11,0.12);color:var(--gold);}
  .inv-amount{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:800;text-align:right;color:var(--text-bright);}

  .inv-detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px;}
  .inv-detail{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:9px;padding:8px 6px;text-align:center;}
  .inv-detail p.k{font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;font-weight:600;}
  .inv-detail p.v{font-size:11.5px;font-weight:700;color:var(--text-bright);}

  .progress-track{background:var(--surface-2);border-radius:5px;height:6px;overflow:hidden;margin-bottom:10px;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--gold));border-radius:5px;}

  .inv-bottom{display:flex;justify-content:space-between;align-items:center;}
  .status-badge{font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;background:rgba(34,197,94,0.15);color:var(--success);}
  .status-badge.completed{background:rgba(156,163,160,0.15);color:var(--muted);}
  .mark-btn{background:var(--surface-2);border:1.5px solid var(--border);color:var(--muted);font-size:11px;padding:6px 11px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all 0.2s;}
  .mark-btn:hover{background:var(--surface-3);border-color:var(--primary);color:var(--primary);}
  .mark-btn:disabled{opacity:0.4;cursor:not-allowed;}

  .load-more-btn{width:100%;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--primary);font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:all 0.3s;}
  .load-more-btn:hover{background:var(--surface-2);border-color:var(--primary);}
  .load-more-btn:disabled{opacity:0.4;cursor:not-allowed;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty-state .empty-icon{font-size:36px;margin-bottom:10px;}
  .skeleton{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);height:150px;margin-bottom:10px;background-image:linear-gradient(90deg,var(--surface) 0%,var(--surface-2) 50%,var(--surface) 100%);background-size:200% 100%;animation:shimmer 1.4s infinite;}

  .toast-container{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:380px;}
  .toast{background:var(--surface-3);border:1px solid var(--border);padding:13px 15px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-lg);animation:slideIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);display:flex;align-items:center;gap:9px;}
  .toast.error{border-left:4px solid var(--error);}
  .toast.success{border-left:4px solid var(--success);}
  @keyframes slideIn{from{opacity:0;transform:translateX(80px);}to{opacity:1;transform:translateX(0);}}

  @media(max-width:480px){.container{padding:16px 12px 60px;}}
</style>
</head>
<body>

<div class="floating-orb orb-1"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="admin-dashboard.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg></a>
      <h1>Investments</h1>
    </div>
    <button class="icon-btn" id="refreshBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><p class="label">Total</p><p class="value" id="statCount"><span class="skeleton-line"></span></p></div>
    <div class="stat-card"><p class="label">Invested</p><p class="value" id="statTotal"><span class="skeleton-line"></span></p></div>
    <div class="stat-card"><p class="label">Active</p><p class="value" id="statActive"><span class="skeleton-line"></span></p></div>
    <div class="stat-card"><p class="label">Completed</p><p class="value" id="statCompleted"><span class="skeleton-line"></span></p></div>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search by username">
    <button id="searchBtn">Search</button>
  </div>
  <span class="clear-search" id="clearSearch" style="display:none;">✕ Clear</span>

  <div class="tabs">
    <div class="tab active" data-category="all">All</div>
    <div class="tab" data-category="company">Company</div>
    <div class="tab" data-category="premium">Premium</div>
  </div>
  <div class="status-chips">
    <div class="chip active" data-status="all">All Status</div>
    <div class="chip" data-status="active">Active</div>
    <div class="chip" data-status="completed">Completed</div>
  </div>

  <div id="listContainer"><div class="skeleton"></div><div class="skeleton"></div></div>
  <button class="load-more-btn" id="loadMoreBtn" style="display:none;">Load More</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, collection, query, where, orderBy, limit, startAfter, getDocs, getCountFromServer, getAggregateFromServer, sum, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI", authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0", storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094", appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const PAGE_SIZE = 50;
  let activeCategory = "all", activeStatus = "all", lastVisibleDoc = null, allLoaded = [], isSearchMode = false;

  function showToast(m, t = "info", d = 4000) {
    const c = document.getElementById("toastContainer");
    const el = document.createElement("div");
    el.className = `toast ${t}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    el.innerHTML = `<span>${icons[t]||icons.info}</span>${m}`;
    if (c.children.length >= 3) c.removeChild(c.firstChild);
    c.appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transform = "translateX(80px)"; el.style.transition = "all 0.3s"; setTimeout(() => { if (el.parentNode) el.remove(); }, 300); }, d);
  }

  function formatNaira(v) { return "₦" + (Number(v) || 0).toLocaleString("en-NG"); }
  function formatTime(ts) { if(!ts)return"—"; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString("en-NG",{day:"numeric",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit"}); }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ✅ AUTH
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "admin-login.html"; return; }
    try { const snap = await getDoc(doc(db, "users", user.uid)); if (!snap.exists()||snap.data().role!=="admin"){await signOut(auth);window.location.href="admin-login.html";return;} loadStats(); loadPage(true); }
    catch(e) { window.location.href = "admin-login.html"; }
  });

  async function loadStats() {
    try {
      const ref = collection(db, "investments");
      const [c, t, a, comp] = await Promise.all([getCountFromServer(ref), getAggregateFromServer(ref,{total:sum("amount")}), getCountFromServer(query(ref,where("status","==","active"))), getCountFromServer(query(ref,where("status","==","completed")))]);
      document.getElementById("statCount").textContent = c.data().count.toLocaleString("en-NG");
      document.getElementById("statTotal").textContent = formatNaira(t.data().total||0);
      document.getElementById("statActive").textContent = a.data().count.toLocaleString("en-NG");
      document.getElementById("statCompleted").textContent = comp.data().count.toLocaleString("en-NG");
    } catch(e) { showToast("Couldn't load stats.","error"); }
  }

  // ✅ TABS & CHIPS
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));t.classList.add("active");activeCategory=t.dataset.category;loadPage(true);}));
  document.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));c.classList.add("active");activeStatus=c.dataset.status;loadPage(true);}));

  // ✅ LOAD (no limits)
  async function loadPage(reset = true) {
    const container = document.getElementById("listContainer");
    if (reset) { container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>'; allLoaded = []; lastVisibleDoc = null; isSearchMode = false; document.getElementById("clearSearch").style.display = "none"; }
    try {
      const ref = collection(db, "investments"); let snap;
      if (activeCategory === "all" && activeStatus === "all") {
        const constraints = [orderBy("createdAt", "desc"), limit(PAGE_SIZE)]; if (lastVisibleDoc) constraints.push(startAfter(lastVisibleDoc));
        snap = await getDocs(query(ref, ...constraints));
      } else {
        const field = activeCategory !== "all" ? "planCategory" : "status", value = activeCategory !== "all" ? activeCategory : activeStatus;
        snap = await getDocs(query(ref, where(field, "==", value), limit(PAGE_SIZE)));
      }
      let items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (activeCategory !== "all" && activeStatus !== "all") items = items.filter(i => i.status === activeStatus);
      items.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      lastVisibleDoc = snap.docs[snap.docs.length - 1] || lastVisibleDoc;
      allLoaded = reset ? items : [...allLoaded, ...items]; renderList(allLoaded);
      document.getElementById("loadMoreBtn").style.display = (activeCategory === "all" && activeStatus === "all" && snap.docs.length === PAGE_SIZE) ? "block" : "none";
    } catch(e) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Couldn\'t load.</p></div>'; }
  }

  document.getElementById("loadMoreBtn").addEventListener("click", async () => { const btn = document.getElementById("loadMoreBtn"); btn.disabled = true; btn.textContent = "Loading…"; await loadPage(false); btn.disabled = false; btn.textContent = "Load More"; });

  // ✅ SEARCH
  async function searchUser(term) {
    const t = term.trim().toLowerCase(); if (!t) return;
    document.getElementById("listContainer").innerHTML = '<div class="skeleton"></div>';
    isSearchMode = true; document.getElementById("clearSearch").style.display = "inline-block"; document.getElementById("loadMoreBtn").style.display = "none";
    try {
      const uSnap = await getDoc(doc(db, "usernames", t)); if (!uSnap.exists()) { renderList([]); return; }
      const snap = await getDocs(query(collection(db, "investments"), where("uid", "==", uSnap.data().uid), limit(PAGE_SIZE)));
      let items = snap.docs.map(d => ({ id: d.id, ...d.data() })); items.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
      allLoaded = items; renderList(items);
    } catch(e) { document.getElementById("listContainer").innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Search failed.</p></div>'; }
  }
  document.getElementById("searchBtn").addEventListener("click", () => searchUser(document.getElementById("searchInput").value));
  document.getElementById("searchInput").addEventListener("keydown", e => { if (e.key === "Enter") searchUser(e.target.value); });
  document.getElementById("clearSearch").addEventListener("click", () => { document.getElementById("searchInput").value = ""; loadPage(true); });

  function renderList(items) {
    const container = document.getElementById("listContainer");
    if (!items.length) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No investments found.</p></div>'; return; }
    container.innerHTML = items.map(inv => {
      const isCo = inv.planCategory === "company", prog = isCo ? Math.min(100, Math.round(((inv.daysPaid||0)/inv.days)*100)) : (inv.creditedAt?100:33);
      return `<div class="inv-card">
        <div class="inv-top"><div class="inv-info"><p class="name">${escapeHtml(inv.username?"@"+inv.username:"UID:"+(inv.uid||"").slice(0,10)+"…")}</p><p class="time">${formatTime(inv.createdAt)}</p></div><div><div class="inv-amount">${formatNaira(inv.amount)}</div><span class="inv-tag ${isCo?'':'premium'}">${isCo?'Company':'VIP'+inv.vipTier}</span></div></div>
        <div class="inv-detail-grid"><div class="inv-detail"><p class="k">Daily/Total</p><p class="v">${isCo?formatNaira(inv.dailyROI)+'/d':formatNaira(inv.total)}</p></div><div class="inv-detail"><p class="k">Progress</p><p class="v">${isCo?(inv.daysPaid||0)+'/'+inv.days:(inv.creditedAt?'3/3':'Pending')}</p></div><div class="inv-detail"><p class="k">Duration</p><p class="v">${inv.days}${isCo?' wkdays':'d'}</p></div></div>
        <div class="progress-track"><div class="progress-fill" style="width:${prog}%;"></div></div>
        <div class="inv-bottom"><span class="status-badge ${inv.status==='completed'?'completed':''}">${inv.status==='completed'?'Completed':'Active'}</span>${inv.status!=='completed'?`<button class="mark-btn" data-id="${inv.id}">Mark Done</button>`:''}</div>
      </div>`;
    }).join("");
    container.querySelectorAll(".mark-btn").forEach(b => b.addEventListener("click", () => markDone(b.dataset.id, b)));
  }

  async function markDone(id, btn) { btn.disabled = true; btn.textContent = "…"; try { await updateDoc(doc(db, "investments", id), { status: "completed", manuallyClosedAt: serverTimestamp() }); const item = allLoaded.find(i => i.id === id); if (item) item.status = "completed"; renderList(allLoaded); showToast("Marked completed.", "success"); } catch(e) { showToast("Couldn't update.", "error"); btn.disabled = false; btn.textContent = "Mark Done"; } }

  document.getElementById("refreshBtn").addEventListener("click", async () => { const btn = document.getElementById("refreshBtn"); btn.classList.add("spinning"); await loadStats(); if (isSearchMode) await searchUser(document.getElementById("searchInput").value); else await loadPage(true); btn.classList.remove("spinning"); showToast("Updated", "success", 2000); });

  console.log("🚀 Veltrix Admin Investments - Ready");
</script>
</body>
</html>
