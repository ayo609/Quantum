<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0a0e27;
    --surface: #131837;
    --surface-2: #1a1f42;
    --surface-3: #1f2550;
    --cyan: #00d4ff;
    --cyan-dark: #0099cc;
    --violet: #7c3aed;
    --violet-light: #a78bfa;
    --text: #e8ecf7;
    --text-bright: #ffffff;
    --muted: #8892b0;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --border: rgba(232, 236, 247, 0.1);
    --border-hover: rgba(232, 236, 247, 0.2);
    --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.2);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    scroll-behavior: smooth;
  }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated Background */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.6;
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(800px circle at 20% 15%, rgba(0, 212, 255, 0.08), transparent 60%),
      radial-gradient(900px circle at 80% 85%, rgba(124, 58, 237, 0.1), transparent 60%),
      radial-gradient(400px circle at 50% 50%, rgba(0, 212, 255, 0.05), transparent 70%);
    animation: bgPulse 8s ease-in-out infinite;
  }

  @keyframes bgPulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.6; }
  }

  /* Main Container */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 24px 40px;
  }

  /* Animated Brand */
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
    animation: slideDown 0.6s ease;
  }

  .orbit {
    position: relative;
    width: 44px;
    height: 44px;
    flex: none;
  }

  .orbit-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(0, 212, 255, 0.3);
    animation: spin 3s linear infinite;
  }

  .orbit-ring.r2 {
    inset: 7px;
    border-color: rgba(124, 58, 237, 0.4);
    animation: spin 5s linear infinite reverse;
  }

  .orbit-ring.r3 {
    inset: 14px;
    border-color: rgba(0, 212, 255, 0.2);
    animation: spin 7s linear infinite;
  }

  .orbit-dot {
    position: absolute;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--cyan);
    top: -3.5px;
    left: 50%;
    margin-left: -3.5px;
    box-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan);
  }

  .orbit-ring.r2 .orbit-dot {
    background: var(--violet);
    box-shadow: 0 0 12px var(--violet), 0 0 24px var(--violet);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .orbit-ring, .bg-glow { animation: none !important; }
  }

  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--cyan), var(--violet-light), var(--cyan));
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientShift 3s ease infinite;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  /* Heading */
  .heading {
    margin-bottom: 32px;
    animation: slideDown 0.6s ease 0.1s both;
  }

  .heading h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 30px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
    color: var(--text-bright);
  }

  .heading p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
  }

  /* Form Elements */
  form {
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: slideDown 0.6s ease 0.2s both;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }

  .field:focus-within label {
    color: var(--cyan);
  }

  .input-shell {
    position: relative;
  }

  .input-shell input,
  .input-shell select {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .input-shell input::placeholder {
    color: #5c6488;
    opacity: 0.8;
  }

  .input-shell input:hover {
    border-color: var(--border-hover);
    background: var(--surface-2);
  }

  .input-shell input:focus,
  .input-shell select:focus {
    border-color: var(--cyan);
    background: var(--surface-2);
    box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
    transform: translateY(-2px);
  }

  .input-shell input.error-state {
    border-color: var(--error);
    box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
  }

  .input-shell input.success-state {
    border-color: var(--success);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
  }

  .input-shell.has-icon input {
    padding-right: 48px;
  }

  /* Icon Button */
  .icon-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 18px;
    transition: all 0.2s ease;
  }

  .icon-btn:hover {
    color: var(--text-bright);
    background: var(--surface-3);
  }

  .icon-btn:active {
    transform: translateY(-50%) scale(0.95);
  }

  /* Status Lines */
  .status-line {
    font-size: 12px;
    min-height: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.3s ease;
  }

  .status-line.ok {
    color: var(--success);
  }

  .status-line.bad {
    color: var(--error);
  }

  .status-line.checking {
    color: var(--warning);
    animation: pulse 1.5s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Phone Input */
  .phone-row {
    display: flex;
    gap: 10px;
  }

  .phone-prefix {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px;
    font-size: 15px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    flex: none;
    width: 70px;
    text-align: center;
    font-weight: 600;
    transition: all 0.3s ease;
  }

  /* Password Strength Meter */
  .strength-meter {
    display: flex;
    gap: 5px;
    margin-top: 4px;
  }

  .strength-meter span {
    flex: 1;
    height: 4px;
    border-radius: 3px;
    background: var(--surface-2);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    transform: scaleX(0);
    animation: strengthIn 0.3s ease forwards;
  }

  @keyframes strengthIn {
    to { transform: scaleX(1); }
  }

  .strength-meter span:nth-child(1) { animation-delay: 0.05s; }
  .strength-meter span:nth-child(2) { animation-delay: 0.1s; }
  .strength-meter span:nth-child(3) { animation-delay: 0.15s; }
  .strength-meter span:nth-child(4) { animation-delay: 0.2s; }

  /* Referral Input */
  .ref-input {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Terms Checkbox */
  .terms {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-top: 8px;
    padding: 12px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    transition: all 0.3s ease;
  }

  .terms:hover {
    border-color: var(--border-hover);
  }

  .terms input {
    margin-top: 2px;
    accent-color: var(--cyan);
    width: 18px;
    height: 18px;
    flex: none;
    cursor: pointer;
  }

  .terms label {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.6;
    cursor: pointer;
  }

  .terms a {
    color: var(--cyan);
    text-decoration: none;
    font-weight: 600;
    position: relative;
  }

  .terms a::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--cyan);
    transition: width 0.3s ease;
  }

  .terms a:hover::after {
    width: 100%;
  }

  /* Submit Button */
  .submit-btn {
    margin-top: 10px;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    color: #ffffff;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3);
  }

  .submit-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s ease;
  }

  .submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(0, 212, 255, 0.4);
  }

  .submit-btn:hover:not(:disabled)::before {
    left: 100%;
  }

  .submit-btn:active:not(:disabled) {
    transform: translateY(0) scale(0.98);
  }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2.5px solid rgba(255, 255, 255, 0.3);
    border-top-color: #ffffff;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .submit-btn.loading .spinner {
    display: inline-block;
  }

  .submit-btn.loading .btn-text {
    display: none;
  }

  .submit-btn.loading {
    pointer-events: none;
  }

  /* Footer Link */
  .footer-link {
    text-align: center;
    margin-top: 28px;
    font-size: 14.5px;
    color: var(--muted);
    animation: slideDown 0.6s ease 0.3s both;
  }

  .footer-link a {
    color: var(--cyan);
    text-decoration: none;
    font-weight: 600;
    position: relative;
  }

  .footer-link a::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--cyan);
    transition: width 0.3s ease;
  }

  .footer-link a:hover::after {
    width: 100%;
  }

  /* Toast Notifications */
  #toast-stack {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: calc(100% - 40px);
    max-width: 400px;
  }

  .toast {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-left: 4px solid var(--cyan);
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    box-shadow: var(--shadow-lg);
    animation: toastSlideIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    backdrop-filter: blur(10px);
  }

  .toast.error {
    border-left-color: var(--error);
    background: rgba(239, 68, 68, 0.1);
  }

  .toast.success {
    border-left-color: var(--success);
    background: rgba(16, 185, 129, 0.1);
  }

  .toast.warning {
    border-left-color: var(--warning);
    background: rgba(245, 158, 11, 0.1);
  }

  @keyframes toastSlideIn {
    from {
      opacity: 0;
      transform: translateX(100px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  /* Responsive Design */
  @media (max-width: 480px) {
    .wrap {
      padding: 20px 16px 32px;
    }

    .heading h1 {
      font-size: 26px;
    }

    .brand-name {
      font-size: 22px;
    }
  }

  @media (min-width: 768px) {
    .wrap {
      padding-top: 60px;
    }
  }

  /* Loading State Animation */
  .loading-shimmer {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="wrap">
  <!-- Animated Brand Logo -->
  <div class="brand">
    <div class="orbit">
      <div class="orbit-ring r1"><span class="orbit-dot"></span></div>
      <div class="orbit-ring r2"><span class="orbit-dot"></span></div>
      <div class="orbit-ring r3"></div>
    </div>
    <span class="brand-name">QUANTUM</span>
  </div>

  <!-- Header Section -->
  <div class="heading">
    <h1>Create your account</h1>
    <p>Join Quantum and start growing your portfolio today.</p>
  </div>

  <!-- Registration Form -->
  <form id="registerForm" novalidate>
    <!-- Full Name -->
    <div class="field">
      <label for="fullName">Full Name</label>
      <div class="input-shell">
        <input type="text" id="fullName" placeholder="e.g. Ade Johnson" autocomplete="name" required>
      </div>
      <div class="status-line" id="nameStatus"></div>
    </div>

    <!-- Username -->
    <div class="field">
      <label for="username">Username</label>
      <div class="input-shell">
        <input type="text" id="username" placeholder="e.g. adejohnson" autocomplete="off" required>
      </div>
      <div class="status-line" id="usernameStatus"></div>
    </div>

    <!-- Phone Number -->
    <div class="field">
      <label for="phone">Phone Number</label>
      <div class="phone-row">
        <span class="phone-prefix">+234</span>
        <div class="input-shell" style="flex:1;">
          <input type="tel" id="phone" placeholder="8012345678" inputmode="numeric" maxlength="10" autocomplete="tel" required>
        </div>
      </div>
      <div class="status-line" id="phoneStatus"></div>
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-shell">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="status-line" id="emailStatus"></div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-shell has-icon">
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
        <button type="button" class="icon-btn" data-toggle="password" aria-label="Show password">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="strength-meter" id="strengthMeter">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="status-line" id="passwordStatus"></div>
    </div>

    <!-- Confirm Password -->
    <div class="field">
      <label for="confirmPassword">Confirm Password</label>
      <div class="input-shell has-icon">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" required>
        <button type="button" class="icon-btn" data-toggle="confirmPassword" aria-label="Show password">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="status-line" id="confirmStatus"></div>
    </div>

    <!-- Referral Code -->
    <div class="field">
      <label for="referral">Referral Code <span style="text-transform:none; opacity:0.7; font-weight:400;">(optional)</span></label>
      <div class="input-shell">
        <input type="text" id="referral" class="ref-input" placeholder="e.g. QTM-4F2A9C" autocomplete="off">
      </div>
      <div class="status-line" id="referralStatus"></div>
    </div>

    <!-- Terms & Conditions -->
    <div class="terms">
      <input type="checkbox" id="terms" required>
      <label for="terms">I agree to Quantum's <a href="#" id="termsLink">Terms of Service</a> and <a href="#" id="privacyLink">Privacy Policy</a>.</label>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="btn-text">Create Account</span>
      <span class="spinner"></span>
    </button>
  </form>

  <!-- Login Link -->
  <div class="footer-link">
    Already have an account? <a href="login.html">Log in</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  // Initialize Firebase with error handling
  let app, auth, db;
  try {
    app = initializeApp(firebaseConfig);
    auth = getAuth(app);
    db = getFirestore(app);
  } catch (error) {
    console.error("Firebase initialization error:", error);
    showToast("Failed to initialize application. Please refresh.", "error");
  }

  /* ---------------- Enhanced Toast System ---------------- */
  function showToast(message, type = "info", duration = 4500) {
    const stack = document.getElementById("toast-stack");
    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    
    // Add icon based on type
    const icons = {
      success: '✓',
      error: '✕',
      warning: '⚠',
      info: 'ℹ'
    };
    
    toast.innerHTML = `<span style="margin-right:8px;font-weight:bold;">${icons[type] || icons.info}</span>${message}`;
    
    // Add to stack with limit
    if (stack.children.length >= 3) {
      stack.removeChild(stack.firstChild);
    }
    
    stack.appendChild(toast);
    
    // Auto remove with animation
    setTimeout(() => {
      toast.style.transition = "all 0.3s ease";
      toast.style.opacity = "0";
      toast.style.transform = "translateX(100px)";
      setTimeout(() => {
        if (toast.parentNode) {
          toast.remove();
        }
      }, 300);
    }, duration);
  }

  /* ---------------- Optimized Particle System (Reduced count for performance) ---------------- */
  (function initParticles() {
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let w, h, particles;
    let animationId;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    
    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    
    function createParticles() {
      // Reduced particle count for better performance
      const count = Math.min(35, Math.floor((w * h) / 35000));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.3,
        radius: Math.random() * 1.5 + 0.5,
        opacity: Math.random() * 0.5 + 0.3
      }));
    }
    
    function animate() {
      if (reduceMotion) {
        ctx.clearRect(0, 0, w, h);
        return;
      }
      
      ctx.clearRect(0, 0, w, h);
      
      // Update and draw particles
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        
        // Wrap around edges
        if (p.x < 0) p.x = w;
        if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h;
        if (p.y > h) p.y = 0;
      }
      
      // Draw connections (optimized - only check nearby particles)
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 150) {
            const opacity = 0.08 * (1 - dist / 150);
            ctx.strokeStyle = `rgba(0, 212, 255, ${opacity})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      
      // Draw particle dots
      for (const p of particles) {
        ctx.fillStyle = `rgba(124, 58, 237, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
      }
      
      animationId = requestAnimationFrame(animate);
    }
    
    // Initialize
    resize();
    createParticles();
    
    // Handle resize
    let resizeTimeout;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        resize();
        createParticles();
      }, 250);
    });
    
    // Start animation
    if (!reduceMotion) {
      animate();
    }
    
    // Cleanup on page unload
    window.addEventListener("beforeunload", () => {
      if (animationId) {
        cancelAnimationFrame(animationId);
      }
    });
  })();

  /* ---------------- Enhanced Password Visibility Toggle ---------------- */
  document.querySelectorAll(".icon-btn[data-toggle]").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      const input = document.getElementById(btn.dataset.toggle);
      const isPassword = input.type === "password";
      
      input.type = isPassword ? "text" : "password";
      
      // Update icon
      const svg = btn.querySelector("svg");
      if (svg) {
        if (isPassword) {
          // Show "eye-off" icon
          svg.innerHTML = `
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          `;
        } else {
          // Show "eye" icon
          svg.innerHTML = `
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          `;
        }
      }
    });
  });

  /* ---------------- Referral Code Pre-fill ---------------- */
  const urlParams = new URLSearchParams(window.location.search);
  const refFromUrl = urlParams.get("ref");
  if (refFromUrl) {
    const referralInput = document.getElementById("referral");
    referralInput.value = refFromUrl.toUpperCase();
    // Trigger validation if needed
    referralInput.classList.add("success-state");
  }

  /* ---------------- Form Elements Cache ---------------- */
  const elements = {
    fullName: document.getElementById("fullName"),
    username: document.getElementById("username"),
    phone: document.getElementById("phone"),
    email: document.getElementById("email"),
    password: document.getElementById("password"),
    confirmPassword: document.getElementById("confirmPassword"),
    referral: document.getElementById("referral"),
    terms: document.getElementById("terms"),
    submitBtn: document.getElementById("submitBtn"),
    statuses: {
      name: document.getElementById("nameStatus"),
      username: document.getElementById("usernameStatus"),
      phone: document.getElementById("phoneStatus"),
      email: document.getElementById("emailStatus"),
      password: document.getElementById("passwordStatus"),
      confirm: document.getElementById("confirmStatus"),
      referral: document.getElementById("referralStatus")
    }
  };

  /* ---------------- Status & Input Helpers ---------------- */
  function setFieldStatus(statusEl, message, type) {
    if (!statusEl) return;
    statusEl.textContent = message;
    statusEl.className = `status-line ${type || ''}`;
  }

  function setInputState(input, state) {
    if (!input) return;
    input.classList.remove("error-state", "success-state");
    if (state === "success") input.classList.add("success-state");
    if (state === "error") input.classList.add("error-state");
  }

  /* ---------------- Validation Patterns ---------------- */
  const patterns = {
    username: /^[a-z0-9_]{3,20}$/,
    email: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
    phone: /^\d{10}$/
  };

  /* ---------------- Validation Functions ---------------- */
  function validateFullName() {
    const value = elements.fullName.value.trim();
    const isValid = value.length >= 3;
    
    setFieldStatus(
      elements.statuses.name,
      isValid ? "✓ Looks good" : "Enter your full name (min. 3 characters)",
      isValid ? "ok" : "bad"
    );
    setInputState(elements.fullName, isValid ? "success" : "error");
    
    return isValid;
  }

  function validatePhone() {
    const value = elements.phone.value.trim();
    const isValid = patterns.phone.test(value) && value[0] !== "0";
    
    setFieldStatus(
      elements.statuses.phone,
      isValid ? "✓ Valid phone number" : "Enter 10 digits without leading 0",
      isValid ? "ok" : "bad"
    );
    setInputState(elements.phone, isValid ? "success" : "error");
    
    return isValid;
  }

  function validateEmail() {
    const value = elements.email.value.trim();
    const isValid = patterns.email.test(value);
    
    setFieldStatus(
      elements.statuses.email,
      isValid ? "✓ Valid email" : "Enter a valid email address",
      isValid ? "ok" : "bad"
    );
    setInputState(elements.email, isValid ? "success" : "error");
    
    return isValid;
  }

  function calculatePasswordStrength(password) {
    let score = 0;
    if (password.length >= 8) score++;
    if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score++;
    if (/\d/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;
    return score;
  }

  function updateStrengthMeter(score) {
    const bars = document.querySelectorAll("#strengthMeter span");
    const colors = ["#ef4444", "#f59e0b", "#eab308", "#10b981"];
    
    bars.forEach((bar, index) => {
      bar.style.background = index < score ? colors[Math.max(score - 1, 0)] : "var(--surface-2)";
      bar.style.boxShadow = index < score ? `0 0 8px ${colors[Math.max(score - 1, 0)]}` : "none";
    });
  }

  function validatePassword() {
    const value = elements.password.value;
    const score = calculatePasswordStrength(value);
    updateStrengthMeter(score);
    
    let message = "";
    let type = "";
    
    if (value.length === 0) {
      message = "";
    } else if (value.length < 8) {
      message = "Password must be at least 8 characters";
      type = "bad";
    } else if (score >= 3) {
      message = "✓ Strong password";
      type = "ok";
    } else {
      message = "Add numbers or symbols for a stronger password";
      type = "checking";
    }
    
    setFieldStatus(elements.statuses.password, message, type);
    setInputState(elements.password, type === "ok" ? "success" : type === "bad" ? "error" : "");
    
    return score >= 2 && value.length >= 8;
  }

  function validateConfirmPassword() {
    const value = elements.confirmPassword.value;
    
    if (value.length === 0) {
      setFieldStatus(elements.statuses.confirm, "", "");
      setInputState(elements.confirmPassword, "");
      return false;
    }
    
    const isValid = value === elements.password.value;
    
    setFieldStatus(
      elements.statuses.confirm,
      isValid ? "✓ Passwords match" : "Passwords do not match",
      isValid ? "ok" : "bad"
    );
    setInputState(elements.confirmPassword, isValid ? "success" : "error");
    
    return isValid;
  }

  /* ---------------- Event Listeners ---------------- */
  elements.fullName.addEventListener("blur", validateFullName);
  elements.fullName.addEventListener("input", () => {
    if (elements.fullName.classList.contains("error-state")) {
      validateFullName();
    }
  });

  elements.phone.addEventListener("input", (e) => {
    e.target.value = e.target.value.replace(/\D/g, "").slice(0, 10);
    if (elements.phone.classList.contains("error-state")) {
      validatePhone();
    }
  });
  elements.phone.addEventListener("blur", validatePhone);

  elements.email.addEventListener("blur", validateEmail);
  elements.email.addEventListener("input", () => {
    if (elements.email.classList.contains("error-state")) {
      validateEmail();
    }
  });

  elements.password.addEventListener("input", () => {
    validatePassword();
    // Re-validate confirm password if it has value
    if (elements.confirmPassword.value) {
      validateConfirmPassword();
    }
  });

  elements.confirmPassword.addEventListener("input", validateConfirmPassword);

  /* ---------------- Username Availability Check (Optimized with Caching) ---------------- */
  const usernameCache = new Map();
  let usernameCheckTimeout;
  let isUsernameAvailable = false;

  elements.username.addEventListener("input", (e) => {
    // Sanitize input
    e.target.value = e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, "");
    const value = e.target.value.trim();
    
    clearTimeout(usernameCheckTimeout);
    isUsernameAvailable = false;
    
    if (!patterns.username.test(value)) {
      setFieldStatus(
        elements.statuses.username,
        value.length > 0 ? "3-20 characters: letters, numbers, underscore" : "",
        value.length > 0 ? "bad" : ""
      );
      setInputState(elements.username, value.length > 0 ? "error" : "");
      return;
    }
    
    // Check cache first
    if (usernameCache.has(value)) {
      const isAvailable = usernameCache.get(value);
      applyUsernameResult(value, isAvailable);
      return;
    }
    
    // Debounced check
    setFieldStatus(elements.statuses.username, "Checking availability...", "checking");
    usernameCheckTimeout = setTimeout(() => checkUsernameAvailability(value), 600);
  });

  async function checkUsernameAvailability(username) {
    try {
      const snapshot = await getDoc(doc(db, "usernames", username));
      const isAvailable = !snapshot.exists();
      usernameCache.set(username, isAvailable);
      
      // Only apply if username hasn't changed
      if (elements.username.value.trim() === username) {
        applyUsernameResult(username, isAvailable);
      }
    } catch (error) {
      console.error("Username check error:", error);
      if (elements.username.value.trim() === username) {
        setFieldStatus(elements.statuses.username, "Unable to verify username", "bad");
        setInputState(elements.username, "error");
      }
    }
  }

  function applyUsernameResult(username, isAvailable) {
    if (elements.username.value.trim() !== username) return;
    
    if (isAvailable) {
      setFieldStatus(elements.statuses.username, "✓ Username available", "ok");
      setInputState(elements.username, "success");
      isUsernameAvailable = true;
    } else {
      setFieldStatus(elements.statuses.username, "Username already taken", "bad");
      setInputState(elements.username, "error");
      isUsernameAvailable = false;
    }
  }

  /* ---------------- Referral Code Validation ---------------- */
  async function validateReferralCode(code) {
    if (!code) {
      setFieldStatus(elements.statuses.referral, "", "");
      setInputState(elements.referral, "");
      return { valid: true, referrerUid: null };
    }
    
    try {
      const snapshot = await getDoc(doc(db, "referralCodes", code));
      const isValid = snapshot.exists();
      
      if (isValid) {
        setFieldStatus(elements.statuses.referral, "✓ Valid referral code", "ok");
        setInputState(elements.referral, "success");
        return { valid: true, referrerUid: snapshot.data().uid };
      } else {
        setFieldStatus(elements.statuses.referral, "Referral code not found", "bad");
        setInputState(elements.referral, "error");
        return { valid: false, referrerUid: null };
      }
    } catch (error) {
      console.error("Referral validation error:", error);
      setFieldStatus(elements.statuses.referral, "Unable to verify code", "bad");
      return { valid: false, referrerUid: null };
    }
  }

  /* ---------------- Unique Referral Code Generator ---------------- */
  function generateReferralCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "QTM-";
    for (let i = 0; i < 6; i++) {
      code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return code;
  }

  async function generateUniqueReferralCode() {
    for (let attempt = 0; attempt < 5; attempt++) {
      const code = generateReferralCode();
      const snapshot = await getDoc(doc(db, "referralCodes", code));
      if (!snapshot.exists()) {
        return code;
      }
    }
    // Fallback with timestamp
    return generateReferralCode() + Date.now().toString(36).slice(-2).toUpperCase();
  }

  /* ---------------- Form Submission ---------------- */
  const form = document.getElementById("registerForm");
  
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    
    // Validate all fields
    const validations = {
      name: validateFullName(),
      phone: validatePhone(),
      email: validateEmail(),
      password: validatePassword(),
      confirmPassword: validateConfirmPassword()
    };
    
    // Check if all validations pass
    const allValid = Object.values(validations).every(v => v === true);
    
    if (!allValid) {
      showToast("Please fix the highlighted fields before continuing", "error");
      return;
    }
    
    // Validate username
    if (!patterns.username.test(elements.username.value.trim())) {
      showToast("Please choose a valid username", "error");
      elements.username.focus();
      return;
    }
    
    if (!isUsernameAvailable) {
      showToast("Please choose an available username", "error");
      elements.username.focus();
      return;
    }
    
    // Validate terms
    if (!elements.terms.checked) {
      showToast("You must accept the Terms of Service", "error");
      elements.terms.focus();
      return;
    }
    
    // Disable button and show loading
    elements.submitBtn.disabled = true;
    elements.submitBtn.classList.add("loading");
    
    const username = elements.username.value.trim();
    const referralCodeInput = elements.referral.value.trim().toUpperCase();
    
    try {
      // Validate referral code if provided
      const referralResult = await validateReferralCode(referralCodeInput);
      if (!referralResult.valid) {
        showToast("Invalid referral code provided", "error");
        elements.submitBtn.disabled = false;
        elements.submitBtn.classList.remove("loading");
        return;
      }
      
      // Create user account
      const userCredential = await createUserWithEmailAndPassword(
        auth,
        elements.email.value.trim(),
        elements.password.value
      );
      
      const uid = userCredential.user.uid;
      const myReferralCode = await generateUniqueReferralCode();
      
      // Prepare user data
      const userData = {
        name: elements.fullName.value.trim(),
        username,
        phone: "0" + elements.phone.value.trim(),
        email: elements.email.value.trim(),
        referralCode: myReferralCode,
        referredBy: referralResult.referrerUid || null,
        balance: 0,
        createdAt: serverTimestamp()
      };
      
      // Save user data and references
      await Promise.all([
        setDoc(doc(db, "users", uid), userData),
        setDoc(doc(db, "usernames", username), { uid }),
        setDoc(doc(db, "referralCodes", myReferralCode), { uid })
      ]);
      
      // Cache user data for session
      sessionStorage.setItem("quantum_user_cache", JSON.stringify({
        uid,
        name: userData.name,
        username: userData.username,
        referralCode: myReferralCode
      }));
      
      sessionStorage.setItem("quantum_show_welcome", "1");
      
      // Success feedback
      showToast("Account created successfully! Redirecting...", "success");
      
      // Redirect after delay
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);
      
    } catch (error) {
      console.error("Registration error:", error);
      
      let errorMessage = "Registration failed. Please try again.";
      
      // Handle specific Firebase errors
      switch (error.code) {
        case "auth/email-already-in-use":
          errorMessage = "This email is already registered. Please log in instead.";
          break;
        case "auth/invalid-email":
          errorMessage = "Please enter a valid email address.";
          break;
        case "auth/weak-password":
          errorMessage = "Password is too weak. Please choose a stronger password.";
          break;
        case "auth/network-request-failed":
          errorMessage = "Network error. Please check your connection.";
          break;
        case "auth/too-many-requests":
          errorMessage = "Too many attempts. Please try again later.";
          break;
      }
      
      showToast(errorMessage, "error");
      
      // Reset button state
      elements.submitBtn.disabled = false;
      elements.submitBtn.classList.remove("loading");
    }
  });

  /* ---------------- Terms & Privacy Links ---------------- */
  document.getElementById("termsLink")?.addEventListener("click", (e) => {
    e.preventDefault();
    showToast("Terms of Service page coming soon", "info");
  });
  
  document.getElementById("privacyLink")?.addEventListener("click", (e) => {
    e.preventDefault();
    showToast("Privacy Policy page coming soon", "info");
  });

  /* ---------------- Performance Optimization: Debounced Resize Handler ---------------- */
  let resizeDebounce;
  window.addEventListener("resize", () => {
    clearTimeout(resizeDebounce);
    resizeDebounce = setTimeout(() => {
      // Recalculate any dynamic elements if needed
    }, 150);
  });

  console.log("🚀 Quantum Registration - Ready");
</script>
