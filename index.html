<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#060818;
    --surface:#0d1226;
    --surface-2:#121834;
    --cyan:#00e5ff;
    --violet:#a855f7;
    --text:#e8ecf7;
    --muted:#8b93b8;
    --success:#22e6a3;
    --error:#ff5470;
    --border:rgba(232,236,247,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--void);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  #particles{
    position:fixed; inset:0; z-index:0; opacity:0.5;
  }
  .bg-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(600px circle at 15% 10%, rgba(0,229,255,0.10), transparent 60%),
      radial-gradient(700px circle at 85% 90%, rgba(168,85,247,0.12), transparent 60%);
  }
  .wrap{
    position:relative; z-index:1;
    max-width:460px; margin:0 auto;
    min-height:100vh;
    display:flex; flex-direction:column;
    padding:28px 20px 40px;
  }
  .brand{
    display:flex; align-items:center; gap:12px;
    margin-bottom:28px;
  }
  .orbit{
    position:relative; width:38px; height:38px; flex:none;
  }
  .orbit-ring{
    position:absolute; inset:0; border-radius:50%;
    border:1.5px solid rgba(0,229,255,0.35);
  }
  .orbit-ring.r2{ inset:6px; border-color:rgba(168,85,247,0.4); animation:spin 6s linear infinite reverse;}
  .orbit-ring.r1{ animation:spin 4s linear infinite; }
  .orbit-dot{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background:var(--cyan); top:-3px; left:50%; margin-left:-3px;
    box-shadow:0 0 8px var(--cyan);
  }
  .orbit-ring.r2 .orbit-dot{ background:var(--violet); box-shadow:0 0 8px var(--violet); }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  @media (prefers-reduced-motion: reduce){
    .orbit-ring{ animation:none !important; }
  }
  .brand-name{
    font-family:'Space Grotesk', sans-serif;
    font-size:22px; font-weight:700; letter-spacing:0.5px;
    background:linear-gradient(120deg, var(--cyan), var(--violet));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .heading{ margin-bottom:26px; }
  .heading h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:26px; font-weight:700; line-height:1.25;
    margin-bottom:6px;
  }
  .heading p{ color:var(--muted); font-size:14.5px; }
  form{ display:flex; flex-direction:column; gap:16px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{
    font-size:12.5px; font-weight:600; color:var(--muted);
    letter-spacing:0.3px; text-transform:uppercase;
  }
  .input-shell{ position:relative; }
  .input-shell input, .input-shell select{
    width:100%;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:13px 14px;
    color:var(--text);
    font-size:15px;
    font-family:'Inter', sans-serif;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .input-shell input::placeholder{ color:#5c6488; }
  .input-shell input:focus, .input-shell select:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(0,229,255,0.12);
  }
  .input-shell input.error-state{ border-color:var(--error); }
  .input-shell input.success-state{ border-color:var(--success); }
  .input-shell.has-icon input{ padding-right:44px; }
  .icon-btn{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--muted); cursor:pointer;
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    border-radius:6px;
  }
  .icon-btn:hover{ color:var(--text); }
  .status-line{
    font-size:12px; min-height:16px; display:flex; align-items:center; gap:5px;
  }
  .status-line.ok{ color:var(--success); }
  .status-line.bad{ color:var(--error); }
  .status-line.checking{ color:var(--muted); }
  .phone-row{ display:flex; gap:8px; }
  .phone-prefix{
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:13px 12px; font-size:15px; color:var(--muted); font-family:'JetBrains Mono', monospace;
    flex:none; width:64px; text-align:center;
  }
  .strength-meter{
    display:flex; gap:4px; margin-top:2px;
  }
  .strength-meter span{
    flex:1; height:4px; border-radius:2px; background:var(--surface-2);
    transition:background .2s ease;
  }
  .ref-input{
    font-family:'JetBrains Mono', monospace; letter-spacing:1px;
    text-transform:uppercase;
  }
  .terms{
    display:flex; align-items:flex-start; gap:10px; margin-top:4px;
  }
  .terms input{ margin-top:3px; accent-color:var(--cyan); width:16px; height:16px; flex:none; }
  .terms label{ font-size:13px; color:var(--muted); line-height:1.5; }
  .terms a{ color:var(--cyan); text-decoration:none; }
  .submit-btn{
    margin-top:6px;
    background:linear-gradient(120deg, var(--cyan), var(--violet));
    border:none; border-radius:12px;
    padding:15px; font-size:15.5px; font-weight:600; color:#040613;
    font-family:'Space Grotesk', sans-serif;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:opacity .15s ease, transform .1s ease;
  }
  .submit-btn:active{ transform:scale(0.98); }
  .submit-btn:disabled{ opacity:0.55; cursor:not-allowed; }
  .spinner{
    width:16px; height:16px; border-radius:50%;
    border:2px solid rgba(4,6,19,0.3); border-top-color:#040613;
    animation:spin .7s linear infinite; display:none;
  }
  .submit-btn.loading .spinner{ display:inline-block; }
  .submit-btn.loading .btn-text{ display:none; }
  .footer-link{
    text-align:center; margin-top:22px; font-size:14px; color:var(--muted);
  }
  .footer-link a{ color:var(--cyan); text-decoration:none; font-weight:600; }
  .footer-link a:hover{ text-decoration:underline; }

  #toast-stack{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:50; display:flex; flex-direction:column; gap:8px;
    width:calc(100% - 32px); max-width:420px;
  }
  .toast{
    background:var(--surface-2); border:1px solid var(--border);
    border-left:3px solid var(--cyan);
    padding:12px 14px; border-radius:10px; font-size:13.5px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:slideDown .25s ease;
  }
  .toast.error{ border-left-color:var(--error); }
  .toast.success{ border-left-color:var(--success); }
  @keyframes slideDown{
    from{ opacity:0; transform:translateY(-10px);}
    to{ opacity:1; transform:translateY(0);}
  }
  @media (min-width:480px){
    .wrap{ padding-top:48px; }
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="wrap">
  <div class="brand">
    <div class="orbit">
      <div class="orbit-ring r1"><span class="orbit-dot"></span></div>
      <div class="orbit-ring r2"><span class="orbit-dot"></span></div>
    </div>
    <span class="brand-name">QUANTUM</span>
  </div>

  <div class="heading">
    <h1>Create your account</h1>
    <p>Join Quantum and start growing your portfolio today.</p>
  </div>

  <form id="registerForm" novalidate>
    <div class="field">
      <label for="fullName">Full Name</label>
      <div class="input-shell">
        <input type="text" id="fullName" placeholder="e.g. Ade Johnson" autocomplete="name" required>
      </div>
      <div class="status-line" id="nameStatus"></div>
    </div>

    <div class="field">
      <label for="username">Username</label>
      <div class="input-shell">
        <input type="text" id="username" placeholder="e.g. adejohnson" autocomplete="off" required>
      </div>
      <div class="status-line" id="usernameStatus"></div>
    </div>

    <div class="field">
      <label for="phone">Phone Number</label>
      <div class="phone-row">
        <span class="phone-prefix">+234</span>
        <div class="input-shell" style="flex:1;">
          <input type="tel" id="phone" placeholder="8012345678" inputmode="numeric" maxlength="10" autocomplete="tel" required>
        </div>
      </div>
      <div class="status-line" id="phoneStatus"></div>
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-shell">
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="status-line" id="emailStatus"></div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-shell has-icon">
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
        <button type="button" class="icon-btn" data-toggle="password" aria-label="Show password">👁</button>
      </div>
      <div class="strength-meter" id="strengthMeter">
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="status-line" id="passwordStatus"></div>
    </div>

    <div class="field">
      <label for="confirmPassword">Confirm Password</label>
      <div class="input-shell has-icon">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" required>
        <button type="button" class="icon-btn" data-toggle="confirmPassword" aria-label="Show password">👁</button>
      </div>
      <div class="status-line" id="confirmStatus"></div>
    </div>

    <div class="field">
      <label for="referral">Referral Code <span style="text-transform:none; opacity:0.7;">(optional)</span></label>
      <div class="input-shell">
        <input type="text" id="referral" class="ref-input" placeholder="e.g. QTM-4F2A9C" autocomplete="off">
      </div>
      <div class="status-line" id="referralStatus"></div>
    </div>

    <div class="terms">
      <input type="checkbox" id="terms" required>
      <label for="terms">I agree to Quantum's <a href="#" id="termsLink">Terms of Service</a> and <a href="#" id="privacyLink">Privacy Policy</a>.</label>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="btn-text">Create Account</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div class="footer-link">
    Already have an account? <a href="login.html">Log in</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  /* ---------------- Toast system ---------------- */
  function toast(message, type = "info", duration = 4200) {
    const stack = document.getElementById("toast-stack");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = message;
    stack.appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity .25s ease";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 250);
    }, duration);
  }

  /* ---------------- Particle background (signature element) ---------------- */
  (function initParticles() {
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let w, h, particles;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    function makeParticles() {
      const count = Math.min(45, Math.floor((w * h) / 28000));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.25,
        r: Math.random() * 1.4 + 0.6
      }));
    }
    function step() {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
      }
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 130) {
            ctx.strokeStyle = `rgba(0,229,255,${0.09 * (1 - dist / 130)})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }
      for (const p of particles) {
        ctx.fillStyle = "rgba(168,85,247,0.55)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      if (!reduceMotion) requestAnimationFrame(step);
    }
    resize();
    makeParticles();
    window.addEventListener("resize", () => { resize(); makeParticles(); });
    step();
  })();

  /* ---------------- Password visibility toggles ---------------- */
  document.querySelectorAll(".icon-btn[data-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.toggle);
      const showing = input.type === "text";
      input.type = showing ? "password" : "text";
      btn.textContent = showing ? "👁" : "🙈";
    });
  });

  /* ---------------- Prefill referral code from URL ---------------- */
  const urlParams = new URLSearchParams(window.location.search);
  const refFromUrl = urlParams.get("ref");
  if (refFromUrl) {
    document.getElementById("referral").value = refFromUrl.toUpperCase();
  }

  /* ---------------- Field elements ---------------- */
  const fullNameEl = document.getElementById("fullName");
  const usernameEl = document.getElementById("username");
  const phoneEl = document.getElementById("phone");
  const emailEl = document.getElementById("email");
  const passwordEl = document.getElementById("password");
  const confirmEl = document.getElementById("confirmPassword");
  const referralEl = document.getElementById("referral");
  const termsEl = document.getElementById("terms");
  const submitBtn = document.getElementById("submitBtn");

  const nameStatus = document.getElementById("nameStatus");
  const usernameStatus = document.getElementById("usernameStatus");
  const phoneStatus = document.getElementById("phoneStatus");
  const emailStatus = document.getElementById("emailStatus");
  const passwordStatus = document.getElementById("passwordStatus");
  const confirmStatus = document.getElementById("confirmStatus");
  const referralStatus = document.getElementById("referralStatus");

  function setStatus(el, msg, kind) {
    el.textContent = msg;
    el.className = "status-line" + (kind ? " " + kind : "");
  }
  function markInput(input, kind) {
    input.classList.remove("error-state", "success-state");
    if (kind === "ok") input.classList.add("success-state");
    if (kind === "bad") input.classList.add("error-state");
  }

  /* ---------------- Validation helpers ---------------- */
  const usernamePattern = /^[a-z0-9_]{3,20}$/;
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function validateName() {
    const v = fullNameEl.value.trim();
    if (v.length < 3) { setStatus(nameStatus, "Enter your full name", "bad"); markInput(fullNameEl, "bad"); return false; }
    setStatus(nameStatus, "", ""); markInput(fullNameEl, "ok");
    return true;
  }

  function validatePhone() {
    const v = phoneEl.value.trim();
    if (!/^\d{10}$/.test(v) || v[0] === "0") {
      setStatus(phoneStatus, "Enter 10 digits without the leading 0", "bad");
      markInput(phoneEl, "bad");
      return false;
    }
    setStatus(phoneStatus, "", ""); markInput(phoneEl, "ok");
    return true;
  }
  phoneEl.addEventListener("input", () => {
    phoneEl.value = phoneEl.value.replace(/\D/g, "").slice(0, 10);
  });

  function validateEmail() {
    const v = emailEl.value.trim();
    if (!emailPattern.test(v)) { setStatus(emailStatus, "Enter a valid email address", "bad"); markInput(emailEl, "bad"); return false; }
    setStatus(emailStatus, "", ""); markInput(emailEl, "ok");
    return true;
  }

  function passwordScore(v) {
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
    if (/\d/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    return score;
  }
  function renderStrength(score) {
    const bars = document.querySelectorAll("#strengthMeter span");
    const colors = ["#ff5470", "#ff9f43", "#ffd93d", "#22e6a3"];
    bars.forEach((bar, i) => {
      bar.style.background = i < score ? colors[Math.max(score - 1, 0)] : "var(--surface-2)";
    });
  }
  function validatePassword() {
    const v = passwordEl.value;
    const score = passwordScore(v);
    renderStrength(score);
    if (v.length < 8) { setStatus(passwordStatus, "Minimum 8 characters", "bad"); markInput(passwordEl, "bad"); return false; }
    setStatus(passwordStatus, score >= 3 ? "Strong password" : "Consider adding numbers or symbols", score >= 3 ? "ok" : "checking");
    markInput(passwordEl, "ok");
    return true;
  }
  function validateConfirm() {
    if (confirmEl.value.length === 0) { setStatus(confirmStatus, "", ""); markInput(confirmEl, ""); return false; }
    if (confirmEl.value !== passwordEl.value) { setStatus(confirmStatus, "Passwords do not match", "bad"); markInput(confirmEl, "bad"); return false; }
    setStatus(confirmStatus, "Passwords match", "ok"); markInput(confirmEl, "ok");
    return true;
  }

  fullNameEl.addEventListener("blur", validateName);
  phoneEl.addEventListener("blur", validatePhone);
  emailEl.addEventListener("blur", validateEmail);
  passwordEl.addEventListener("input", validatePassword);
  confirmEl.addEventListener("input", validateConfirm);

  /* ---------------- Username availability check (debounced + cached) ---------------- */
  const usernameCache = {}; // session-level cache to avoid repeat Firestore reads
  let usernameDebounce;
  let usernameIsAvailable = false;

  usernameEl.addEventListener("input", () => {
    usernameEl.value = usernameEl.value.toLowerCase().replace(/[^a-z0-9_]/g, "");
    clearTimeout(usernameDebounce);
    const v = usernameEl.value.trim();
    usernameIsAvailable = false;

    if (!usernamePattern.test(v)) {
      setStatus(usernameStatus, "3-20 chars: letters, numbers, underscore", "bad");
      markInput(usernameEl, "bad");
      return;
    }

    if (usernameCache[v] !== undefined) {
      applyUsernameResult(v, usernameCache[v]);
      return;
    }

    setStatus(usernameStatus, "Checking availability…", "checking");
    usernameDebounce = setTimeout(() => checkUsername(v), 650);
  });

  async function checkUsername(v) {
    try {
      const snap = await getDoc(doc(db, "usernames", v));
      const available = !snap.exists();
      usernameCache[v] = available;
      applyUsernameResult(v, available);
    } catch (e) {
      setStatus(usernameStatus, "Couldn't verify username, try again", "bad");
    }
  }
  function applyUsernameResult(v, available) {
    if (usernameEl.value.trim() !== v) return; // stale response, user kept typing
    if (available) {
      setStatus(usernameStatus, "Username available", "ok");
      markInput(usernameEl, "ok");
      usernameIsAvailable = true;
    } else {
      setStatus(usernameStatus, "Username already taken", "bad");
      markInput(usernameEl, "bad");
      usernameIsAvailable = false;
    }
  }

  /* ---------------- Referral code: validated once, on submit ---------------- */
  async function resolveReferrer(code) {
    if (!code) return { ok: true, uid: null };
    try {
      const snap = await getDoc(doc(db, "referralCodes", code));
      if (!snap.exists()) {
        setStatus(referralStatus, "Referral code not found", "bad");
        markInput(referralEl, "bad");
        return { ok: false };
      }
      setStatus(referralStatus, "Referral code applied", "ok");
      markInput(referralEl, "ok");
      return { ok: true, uid: snap.data().uid };
    } catch (e) {
      setStatus(referralStatus, "Couldn't verify referral code", "bad");
      return { ok: false };
    }
  }

  /* ---------------- Unique referral code generator for the new user ---------------- */
  function generateCode() {
    const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let code = "QTM-";
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
  }
  async function generateUniqueReferralCode() {
    for (let i = 0; i < 4; i++) {
      const code = generateCode();
      const snap = await getDoc(doc(db, "referralCodes", code));
      if (!snap.exists()) return code;
    }
    return generateCode() + Date.now().toString(36).slice(-2).toUpperCase();
  }

  /* ---------------- Form submit ---------------- */
  const form = document.getElementById("registerForm");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const validName = validateName();
    const validPhone = validatePhone();
    const validEmail = validateEmail();
    const validPassword = validatePassword();
    const validConfirm = validateConfirm();

    if (!validName || !validPhone || !validEmail || !validPassword || !validConfirm) {
      toast("Please fix the highlighted fields", "error");
      return;
    }
    if (!usernamePattern.test(usernameEl.value.trim())) {
      toast("Please choose a valid username", "error");
      return;
    }
    if (!usernameIsAvailable) {
      toast("Please choose an available username", "error");
      return;
    }
    if (!termsEl.checked) {
      toast("You must accept the Terms of Service to continue", "error");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.classList.add("loading");

    const username = usernameEl.value.trim();
    const referralCodeInput = referralEl.value.trim().toUpperCase();

    try {
      const refResult = await resolveReferrer(referralCodeInput);
      if (!refResult.ok) {
        toast("Invalid referral code", "error");
        submitBtn.disabled = false;
        submitBtn.classList.remove("loading");
        return;
      }

      const cred = await createUserWithEmailAndPassword(auth, emailEl.value.trim(), passwordEl.value);
      const uid = cred.user.uid;

      const myReferralCode = await generateUniqueReferralCode();

      await setDoc(doc(db, "users", uid), {
        name: fullNameEl.value.trim(),
        username,
        phone: "0" + phoneEl.value.trim(),
        email: emailEl.value.trim(),
        referralCode: myReferralCode,
        referredBy: refResult.uid || null,
        balance: 0,
        createdAt: serverTimestamp()
      });

      await setDoc(doc(db, "usernames", username), { uid });
      await setDoc(doc(db, "referralCodes", myReferralCode), { uid });

      sessionStorage.setItem("quantum_user_cache", JSON.stringify({
        uid, name: fullNameEl.value.trim(), username, referralCode: myReferralCode
      }));

      sessionStorage.setItem("quantum_show_welcome", "1");
      toast("Account created successfully! Redirecting…", "success");
      setTimeout(() => { window.location.href = "login.html"; }, 1400);

    } catch (err) {
      let message = "Something went wrong. Please try again.";
      if (err.code === "auth/email-already-in-use") message = "This email is already registered";
      else if (err.code === "auth/invalid-email") message = "Please enter a valid email address";
      else if (err.code === "auth/weak-password") message = "Password is too weak";
      toast(message, "error");
      submitBtn.disabled = false;
      submitBtn.classList.remove("loading");
    }
  });
</script>
</body>
</html>
