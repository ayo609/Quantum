<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>VELTRIX — Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090b; --surface: #18181b; --surface-2: #27272a; --surface-3: #3f3f46;
    --primary: #6366f1; --primary-dark: #4f46e5; --primary-glow: rgba(99,102,241,0.3);
    --accent: #06b6d4; --accent-glow: rgba(6,182,212,0.3);
    --text: #fafafa; --text-bright: #ffffff; --muted: #a1a1aa;
    --success: #10b981; --warning: #f59e0b; --error: #ef4444;
    --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.15);
    --shadow-lg: 0 25px 50px rgba(0,0,0,0.5); --shadow-md: 0 10px 30px rgba(0,0,0,0.3);
    --radius: 16px; --radius-sm: 12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;scroll-behavior:smooth;}
  body{
    background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
    min-height:100vh;overflow-x:hidden;position:relative;
  }
  #particles{position:fixed;inset:0;z-index:0;opacity:0.4;}
  .bg-glow{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(800px circle at 20% 15%,rgba(99,102,241,0.08),transparent 60%),
      radial-gradient(700px circle at 80% 85%,rgba(6,182,212,0.1),transparent 60%);
    animation:bgPulse 8s ease-in-out infinite;
  }
  @keyframes bgPulse{0%,100%{opacity:0.8;}50%{opacity:0.5;}}
  .wrap{
    position:relative;z-index:1;max-width:460px;margin:0 auto;
    min-height:100vh;display:flex;flex-direction:column;padding:40px 24px 40px;
  }
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:36px;animation:slideDown 0.6s ease;}
  .brand-icon{
    width:44px;height:44px;border-radius:14px;flex:none;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 25px var(--primary-glow);
    position:relative;overflow:hidden;
  }
  .brand-icon::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,transparent,rgba(255,255,255,0.2));
  }
  .brand-icon svg{width:22px;height:22px;color:#fff;position:relative;z-index:1;}
  .brand-name{
    font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;
    letter-spacing:-0.5px;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  @keyframes slideDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
  @media(prefers-reduced-motion:reduce){.bg-glow{animation:none!important;}}
  .heading{margin-bottom:32px;animation:slideDown 0.6s ease 0.1s both;}
  .heading h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;line-height:1.3;margin-bottom:6px;color:var(--text-bright);letter-spacing:-0.5px;}
  .heading p{color:var(--muted);font-size:14.5px;line-height:1.5;}
  form{display:flex;flex-direction:column;gap:18px;animation:slideDown 0.6s ease 0.2s both;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12.5px;font-weight:600;color:var(--muted);letter-spacing:0.4px;text-transform:uppercase;transition:color 0.2s ease;}
  .field:focus-within label{color:var(--primary);}
  .input-shell{position:relative;}
  .input-shell input{
    width:100%;background:var(--surface);border:2px solid var(--border);
    border-radius:var(--radius-sm);padding:13px 16px;color:var(--text);
    font-size:14.5px;font-family:'Inter',sans-serif;outline:none;
    transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .input-shell input::placeholder{color:#52525b;}
  .input-shell input:hover{border-color:var(--border-hover);background:var(--surface-2);}
  .input-shell input:focus{border-color:var(--primary);background:var(--surface-2);box-shadow:0 0 0 4px var(--primary-glow);transform:translateY(-1px);}
  .input-shell input.error-state{border-color:var(--error);box-shadow:0 0 0 4px rgba(239,68,68,0.15);}
  .input-shell input.success-state{border-color:var(--success);box-shadow:0 0 0 4px rgba(16,185,129,0.15);}
  .input-shell.has-icon input{padding-right:48px;}
  .icon-btn{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    background:transparent;border:none;color:var(--muted);cursor:pointer;
    width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    border-radius:8px;font-size:18px;transition:all 0.2s;
  }
  .icon-btn:hover{color:var(--text-bright);background:var(--surface-2);}
  .status-line{font-size:11.5px;min-height:16px;display:flex;align-items:center;gap:5px;}
  .status-line.ok{color:var(--success);}
  .status-line.bad{color:var(--error);}
  .status-line.checking{color:var(--warning);}
  .phone-row{display:flex;gap:8px;}
  .phone-prefix{
    background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);
    padding:13px 14px;font-size:14.5px;color:var(--muted);
    font-family:'JetBrains Mono',monospace;flex:none;width:68px;text-align:center;font-weight:600;
  }
  .strength-meter{display:flex;gap:4px;margin-top:3px;}
  .strength-meter span{flex:1;height:3px;border-radius:2px;background:var(--surface-2);transition:all 0.3s;}
  .ref-input{font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;}
  .terms{
    display:flex;align-items:flex-start;gap:10px;margin-top:6px;
    padding:14px;background:var(--surface);border-radius:var(--radius-sm);
    border:1px solid var(--border);transition:border-color 0.2s;
  }
  .terms:hover{border-color:var(--border-hover);}
  .terms input{margin-top:2px;accent-color:var(--primary);width:18px;height:18px;flex:none;cursor:pointer;}
  .terms label{font-size:13px;color:var(--muted);line-height:1.5;cursor:pointer;}
  .terms a{color:var(--accent);text-decoration:none;font-weight:600;}
  .terms a:hover{text-decoration:underline;}
  .submit-btn{
    margin-top:8px;background:linear-gradient(135deg,var(--primary),var(--accent));
    border:none;border-radius:var(--radius);padding:15px;
    font-size:15.5px;font-weight:700;color:#fff;
    font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    box-shadow:0 8px 30px var(--primary-glow);position:relative;overflow:hidden;
  }
  .submit-btn::before{
    content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
    transition:left 0.5s ease;
  }
  .submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 35px var(--primary-glow);}
  .submit-btn:hover:not(:disabled)::before{left:100%;}
  .submit-btn:active:not(:disabled){transform:scale(0.98);}
  .submit-btn:disabled{opacity:0.55;cursor:not-allowed;}
  .spinner{width:20px;height:20px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:spin 0.7s linear infinite;display:none;}
  .submit-btn.loading .spinner{display:inline-block;}
  .submit-btn.loading .btn-text{display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .footer-link{text-align:center;margin-top:26px;font-size:14px;color:var(--muted);animation:slideDown 0.6s ease 0.3s both;}
  .footer-link a{color:var(--accent);text-decoration:none;font-weight:600;}
  .footer-link a:hover{text-decoration:underline;}
  #toast-stack{position:fixed;top:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px;width:calc(100% - 40px);max-width:400px;}
  .toast{
    background:var(--surface-2);border:1px solid var(--border);border-left:4px solid var(--primary);
    padding:13px 16px;border-radius:var(--radius-sm);font-size:13.5px;
    box-shadow:var(--shadow-lg);animation:toastSlideIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);
    backdrop-filter:blur(10px);
  }
  .toast.error{border-left-color:var(--error);}
  .toast.success{border-left-color:var(--success);}
  @keyframes toastSlideIn{from{opacity:0;transform:translateX(100px);}to{opacity:1;transform:translateX(0);}}
  @media(max-width:480px){.wrap{padding:24px 16px 32px;}.heading h1{font-size:24px;}}
  @media(min-width:768px){.wrap{padding-top:56px;}}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="wrap">
  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
        <line x1="12" y1="22" x2="12" y2="15.5"/>
        <polyline points="22,8.5 12,15.5 2,8.5"/>
      </svg>
    </div>
    <span class="brand-name">VELTRIX</span>
  </div>

  <!-- Heading -->
  <div class="heading">
    <h1>Create your account</h1>
    <p>Join Veltrix and start growing your portfolio today.</p>
  </div>

  <!-- Form -->
  <form id="registerForm" novalidate>
    <div class="field">
      <label for="fullName">Full Name</label>
      <div class="input-shell"><input type="text" id="fullName" placeholder="e.g. Ade Johnson" autocomplete="name" required></div>
      <div class="status-line" id="nameStatus"></div>
    </div>

    <div class="field">
      <label for="username">Username</label>
      <div class="input-shell"><input type="text" id="username" placeholder="e.g. adejohnson" autocomplete="off" required></div>
      <div class="status-line" id="usernameStatus"></div>
    </div>

    <div class="field">
      <label for="phone">Phone Number</label>
      <div class="phone-row">
        <span class="phone-prefix">+234</span>
        <div class="input-shell" style="flex:1;"><input type="tel" id="phone" placeholder="8012345678" inputmode="numeric" maxlength="10" autocomplete="tel" required></div>
      </div>
      <div class="status-line" id="phoneStatus"></div>
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <div class="input-shell"><input type="email" id="email" placeholder="you@example.com" autocomplete="email" required></div>
      <div class="status-line" id="emailStatus"></div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-shell has-icon">
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" required>
        <button type="button" class="icon-btn" data-toggle="password" aria-label="Toggle password">👁</button>
      </div>
      <div class="strength-meter" id="strengthMeter"><span></span><span></span><span></span><span></span></div>
      <div class="status-line" id="passwordStatus"></div>
    </div>

    <div class="field">
      <label for="confirmPassword">Confirm Password</label>
      <div class="input-shell has-icon">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" required>
        <button type="button" class="icon-btn" data-toggle="confirmPassword" aria-label="Toggle password">👁</button>
      </div>
      <div class="status-line" id="confirmStatus"></div>
    </div>

    <div class="field">
      <label for="referral">Referral Code <span style="text-transform:none;opacity:0.7;font-weight:400;">(optional)</span></label>
      <div class="input-shell"><input type="text" id="referral" class="ref-input" placeholder="e.g. VLX-4F2A9C" autocomplete="off"></div>
      <div class="status-line" id="referralStatus"></div>
    </div>

    <div class="terms">
      <input type="checkbox" id="terms" required>
      <label for="terms">I agree to Veltrix's <a href="#" id="termsLink">Terms of Service</a> and <a href="#" id="privacyLink">Privacy Policy</a>.</label>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">
      <span class="btn-text">Create Account</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div class="footer-link">
    Already have an account? <a href="login.html">Log in</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function showToast(m, t = "info", d = 4000) {
    const s = document.getElementById("toast-stack");
    const el = document.createElement("div");
    el.className = `toast ${t}`;
    const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
    el.innerHTML = `<span style="margin-right:8px;font-weight:bold;">${icons[t]||icons.info}</span>${m}`;
    if (s.children.length >= 3) s.removeChild(s.firstChild);
    s.appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transform = "translateX(100px)"; el.style.transition = "all 0.3s"; setTimeout(() => { if (el.parentNode) el.remove(); }, 300); }, d);
  }

  // Optimized particles
  (function(){
    const c=document.getElementById("particles"),ctx=c.getContext("2d");
    let w,h,pts,aid;
    const reduceMotion=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    function rs(){w=c.width=innerWidth;h=c.height=innerHeight;}
    function cp(){const n=Math.min(20,Math.floor((w*h)/50000));pts=Array.from({length:n},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.15,vy:(Math.random()-0.5)*0.15,r:Math.random()*1.2+0.4}));}
    function an(){
      if(reduceMotion){ctx.clearRect(0,0,w,h);return;}
      ctx.clearRect(0,0,w,h);
      for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;}
      for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<120){ctx.strokeStyle=`rgba(99,102,241,${0.04*(1-d/120)})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke();}}}
      for(const p of pts){ctx.fillStyle=`rgba(6,182,212,0.45)`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
      aid=requestAnimationFrame(an);
    }
    rs();cp();if(!reduceMotion)an();
    let rt;window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(()=>{rs();cp();},250);});
    window.addEventListener("beforeunload",()=>{if(aid)cancelAnimationFrame(aid);});
  })();

  // Password toggle
  document.querySelectorAll(".icon-btn[data-toggle]").forEach(b=>b.addEventListener("click",()=>{
    const inp=document.getElementById(b.dataset.toggle);
    inp.type=inp.type==="password"?"text":"password";
    b.textContent=inp.type==="password"?"👁":"🙈";
  }));

  // Prefill referral from URL
  const urlParams=new URLSearchParams(window.location.search);
  const refFromUrl=urlParams.get("ref");
  if(refFromUrl)document.getElementById("referral").value=refFromUrl.toUpperCase();

  const els={
    fullName:document.getElementById("fullName"),username:document.getElementById("username"),
    phone:document.getElementById("phone"),email:document.getElementById("email"),
    password:document.getElementById("password"),confirmPassword:document.getElementById("confirmPassword"),
    referral:document.getElementById("referral"),terms:document.getElementById("terms"),
    submitBtn:document.getElementById("submitBtn")
  };

  function setStatus(id,msg,type){const el=document.getElementById(id);if(el){el.textContent=msg;el.className="status-line"+(type?" "+type:"");}}
  function markInput(el,ok){if(el){el.classList.remove("error-state","success-state");if(ok==="ok")el.classList.add("success-state");if(ok==="bad")el.classList.add("error-state");}}

  const patterns={username:/^[a-z0-9_]{3,20}$/,email:/^[^\s@]+@[^\s@]+\.[^\s@]+$/,phone:/^\d{10}$/};

  function validateName(){const v=els.fullName.value.trim();const ok=v.length>=3;setStatus("nameStatus",ok?"✓":"Enter full name",ok?"ok":"bad");markInput(els.fullName,ok?"ok":"bad");return ok;}
  function validatePhone(){const v=els.phone.value.trim();const ok=patterns.phone.test(v)&&v[0]!=="0";setStatus("phoneStatus",ok?"✓":"10 digits, no leading 0",ok?"ok":"bad");markInput(els.phone,ok?"ok":"bad");return ok;}
  function validateEmail(){const v=els.email.value.trim();const ok=patterns.email.test(v);setStatus("emailStatus",ok?"✓":"Invalid email",ok?"ok":"bad");markInput(els.email,ok?"ok":"bad");return ok;}
  function pScore(v){let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v)&&/[a-z]/.test(v))s++;if(/\d/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;return s;}
  function updateStrength(s){const bars=document.querySelectorAll("#strengthMeter span");const cols=["#ef4444","#f59e0b","#eab308","#10b981"];bars.forEach((b,i)=>{b.style.background=i<s?cols[Math.max(s-1,0)]:"var(--surface-2)";});}
  function validatePassword(){const v=els.password.value;const s=pScore(v);updateStrength(s);let m="",t="";if(v.length===0){}else if(v.length<8){m="Min 8 chars";t="bad";}else if(s>=3){m="✓ Strong";t="ok";}else{m="Add numbers/symbols";t="checking";}setStatus("passwordStatus",m,t);markInput(els.password,t==="ok"?"ok":t==="bad"?"bad":"");return s>=2&&v.length>=8;}
  function validateConfirm(){const v=els.confirmPassword.value;if(v.length===0){setStatus("confirmStatus","");return false;}const ok=v===els.password.value;setStatus("confirmStatus",ok?"✓ Match":"No match",ok?"ok":"bad");markInput(els.confirmPassword,ok?"ok":"bad");return ok;}

  els.fullName.addEventListener("blur",validateName);
  els.phone.addEventListener("input",(e)=>{e.target.value=e.target.value.replace(/\D/g,"").slice(0,10);});
  els.phone.addEventListener("blur",validatePhone);
  els.email.addEventListener("blur",validateEmail);
  els.password.addEventListener("input",()=>{validatePassword();if(els.confirmPassword.value)validateConfirm();});
  els.confirmPassword.addEventListener("input",validateConfirm);

  // Username check
  const uCache={};let uTimeout,uAvail=false;
  els.username.addEventListener("input",(e)=>{
    e.target.value=e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,"");
    const v=e.target.value.trim();clearTimeout(uTimeout);uAvail=false;
    if(!patterns.username.test(v)){setStatus("usernameStatus",v.length>0?"3-20 chars":"");markInput(els.username,v.length>0?"bad":"");return;}
    if(uCache[v]!==undefined){applyU(v,uCache[v]);return;}
    setStatus("usernameStatus","Checking…","checking");
    uTimeout=setTimeout(async()=>{const snap=await getDoc(doc(db,"usernames",v));uCache[v]=!snap.exists();if(els.username.value.trim()===v)applyU(v,uCache[v]);},600);
  });
  function applyU(v,avail){if(els.username.value.trim()!==v)return;if(avail){setStatus("usernameStatus","✓ Available","ok");markInput(els.username,"ok");uAvail=true;}else{setStatus("usernameStatus","Taken","bad");markInput(els.username,"bad");uAvail=false;}}

  function genCode(){const ch="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let c="VLX-";for(let i=0;i<6;i++)c+=ch[Math.floor(Math.random()*ch.length)];return c;}
  async function genUnique(){for(let i=0;i<5;i++){const c=genCode();if(!(await getDoc(doc(db,"referralCodes",c))).exists())return c;}return genCode()+Date.now().toString(36).slice(-2).toUpperCase();}

  // SUBMIT
  document.getElementById("registerForm").addEventListener("submit",async(e)=>{
    e.preventDefault();
    if(!validateName()||!validatePhone()||!validateEmail()||!validatePassword()||!validateConfirm()){showToast("Fix errors","error");return;}
    if(!patterns.username.test(els.username.value.trim())){showToast("Invalid username","error");return;}
    if(!uAvail){showToast("Username unavailable","error");return;}
    if(!els.terms.checked){showToast("Accept terms","error");return;}

    els.submitBtn.disabled=true;els.submitBtn.classList.add("loading");
    const username=els.username.value.trim();
    const refCode=els.referral.value.trim().toUpperCase();

    try{
      let referrerUid=null;
      if(refCode){
        const refSnap=await getDoc(doc(db,"referralCodes",refCode));
        if(refSnap.exists()){referrerUid=refSnap.data().uid;}
      }

      const cred=await createUserWithEmailAndPassword(auth,els.email.value.trim(),els.password.value);
      const uid=cred.user.uid;
      const myCode=await genUnique();

      const userData={
        name:els.fullName.value.trim(),username,phone:"0"+els.phone.value.trim(),
        email:els.email.value.trim(),referralCode:myCode,referredBy:referrerUid,
        balance:0,totalDeposit:0,totalInvested:0,totalEarnings:0,referralEarnings:0,
        firstPurchaseDone:false,unlockedVipTier:0,hasPremiumPlan:false,createdAt:serverTimestamp()
      };

      await Promise.all([
        setDoc(doc(db,"users",uid),userData),
        setDoc(doc(db,"usernames",username),{uid,referralCode:myCode}),
        setDoc(doc(db,"referralCodes",myCode),{uid,username})
      ]);

      sessionStorage.setItem("veltrix_user_cache",JSON.stringify({uid,name:userData.name,username,referralCode:myCode}));
      sessionStorage.setItem("veltrix_show_welcome","1");
      showToast("Account created! Redirecting...","success");
      setTimeout(()=>{window.location.href="login.html";},1500);
    }catch(err){
      let msg="Failed. Try again.";
      if(err.code==="auth/email-already-in-use")msg="Email already registered.";
      showToast(msg,"error");
      els.submitBtn.disabled=false;els.submitBtn.classList.remove("loading");
    }
  });

  console.log("🚀 Veltrix Registration - Ready");
</script>
</body>
</html>
