<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Log In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#060818;
    --surface:#0d1226;
    --surface-2:#121834;
    --cyan:#00e5ff;
    --violet:#a855f7;
    --text:#e8ecf7;
    --muted:#8b93b8;
    --success:#22e6a3;
    --error:#ff5470;
    --border:rgba(232,236,247,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--void);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  #particles{ position:fixed; inset:0; z-index:0; opacity:0.5; }
  .bg-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(600px circle at 15% 10%, rgba(0,229,255,0.10), transparent 60%),
      radial-gradient(700px circle at 85% 90%, rgba(168,85,247,0.12), transparent 60%);
  }
  .wrap{
    position:relative; z-index:1;
    max-width:440px; margin:0 auto;
    min-height:100vh;
    display:flex; flex-direction:column;
    justify-content:center;
    padding:28px 20px 40px;
  }
  .brand{ display:flex; align-items:center; gap:12px; margin-bottom:36px; justify-content:center; }
  .orbit{ position:relative; width:38px; height:38px; flex:none; }
  .orbit-ring{ position:absolute; inset:0; border-radius:50%; border:1.5px solid rgba(0,229,255,0.35); }
  .orbit-ring.r2{ inset:6px; border-color:rgba(168,85,247,0.4); animation:spin 6s linear infinite reverse; }
  .orbit-ring.r1{ animation:spin 4s linear infinite; }
  .orbit-dot{
    position:absolute; width:6px; height:6px; border-radius:50%;
    background:var(--cyan); top:-3px; left:50%; margin-left:-3px;
    box-shadow:0 0 8px var(--cyan);
  }
  .orbit-ring.r2 .orbit-dot{ background:var(--violet); box-shadow:0 0 8px var(--violet); }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  @media (prefers-reduced-motion: reduce){ .orbit-ring{ animation:none !important; } }
  .brand-name{
    font-family:'Space Grotesk', sans-serif;
    font-size:22px; font-weight:700; letter-spacing:0.5px;
    background:linear-gradient(120deg, var(--cyan), var(--violet));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    padding:30px 26px;
  }
  .heading{ margin-bottom:24px; text-align:center; }
  .heading h1{ font-family:'Space Grotesk', sans-serif; font-size:24px; font-weight:700; margin-bottom:6px; }
  .heading p{ color:var(--muted); font-size:14px; }
  form{ display:flex; flex-direction:column; gap:16px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{
    font-size:12.5px; font-weight:600; color:var(--muted);
    letter-spacing:0.3px; text-transform:uppercase;
  }
  .input-shell{ position:relative; }
  .input-shell input{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:13px 14px;
    color:var(--text);
    font-size:15px;
    font-family:'Inter', sans-serif;
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .input-shell input::placeholder{ color:#5c6488; }
  .input-shell input:focus{ border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,229,255,0.12); }
  .input-shell input.error-state{ border-color:var(--error); }
  .input-shell.has-icon input{ padding-right:44px; }
  .icon-btn{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:none; border:none; color:var(--muted); cursor:pointer;
    width:28px; height:28px; display:flex; align-items:center; justify-content:center;
    border-radius:6px;
  }
  .icon-btn:hover{ color:var(--text); }
  .status-line{ font-size:12px; min-height:16px; color:var(--error); }
  .row-between{
    display:flex; align-items:center; justify-content:space-between;
    font-size:13px; margin-top:-4px;
  }
  .remember{ display:flex; align-items:center; gap:7px; color:var(--muted); }
  .remember input{ accent-color:var(--cyan); width:15px; height:15px; }
  .forgot-link{ color:var(--cyan); text-decoration:none; font-weight:500; background:none; border:none; font-size:13px; cursor:pointer; font-family:'Inter', sans-serif; }
  .forgot-link:hover{ text-decoration:underline; }
  .submit-btn{
    margin-top:6px;
    background:linear-gradient(120deg, var(--cyan), var(--violet));
    border:none; border-radius:12px;
    padding:15px; font-size:15.5px; font-weight:600; color:#040613;
    font-family:'Space Grotesk', sans-serif;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:opacity .15s ease, transform .1s ease;
  }
  .submit-btn:active{ transform:scale(0.98); }
  .submit-btn:disabled{ opacity:0.55; cursor:not-allowed; }
  .spinner{
    width:16px; height:16px; border-radius:50%;
    border:2px solid rgba(4,6,19,0.3); border-top-color:#040613;
    animation:spin .7s linear infinite; display:none;
  }
  .submit-btn.loading .spinner{ display:inline-block; }
  .submit-btn.loading .btn-text{ display:none; }
  .divider{
    display:flex; align-items:center; gap:12px; color:var(--muted);
    font-size:12px; margin:2px 0;
  }
  .divider::before, .divider::after{ content:""; flex:1; height:1px; background:var(--border); }
  .footer-link{ text-align:center; margin-top:22px; font-size:14px; color:var(--muted); }
  .footer-link a{ color:var(--cyan); text-decoration:none; font-weight:600; }
  .footer-link a:hover{ text-decoration:underline; }

  #toast-stack{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:50; display:flex; flex-direction:column; gap:8px;
    width:calc(100% - 32px); max-width:420px;
  }
  .toast{
    background:var(--surface-2); border:1px solid var(--border);
    border-left:3px solid var(--cyan);
    padding:12px 14px; border-radius:10px; font-size:13.5px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:slideDown .25s ease;
  }
  .toast.error{ border-left-color:var(--error); }
  .toast.success{ border-left-color:var(--success); }
  @keyframes slideDown{ from{ opacity:0; transform:translateY(-10px);} to{ opacity:1; transform:translateY(0);} }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(2,3,10,0.7);
    display:none; align-items:center; justify-content:center;
    z-index:60; padding:20px; backdrop-filter:blur(2px);
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:26px; max-width:380px; width:100%;
  }
  .modal h2{ font-family:'Space Grotesk', sans-serif; font-size:19px; margin-bottom:8px; }
  .modal p{ color:var(--muted); font-size:13.5px; margin-bottom:16px; line-height:1.5; }
  .modal .field{ margin-bottom:16px; }
  .modal-actions{ display:flex; gap:10px; }
  .modal-actions button{
    flex:1; padding:12px; border-radius:10px; border:none;
    font-family:'Space Grotesk', sans-serif; font-weight:600; cursor:pointer; font-size:14px;
  }
  .modal-actions .cancel{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
  .modal-actions .confirm{ background:linear-gradient(120deg, var(--cyan), var(--violet)); color:#040613; }
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="wrap">
  <div class="brand">
    <div class="orbit">
      <div class="orbit-ring r1"><span class="orbit-dot"></span></div>
      <div class="orbit-ring r2"><span class="orbit-dot"></span></div>
    </div>
    <span class="brand-name">QUANTUM</span>
  </div>

  <div class="card">
    <div class="heading">
      <h1>Welcome back</h1>
      <p>Log in to continue growing your portfolio.</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="identifier">Email or Username</label>
        <div class="input-shell">
          <input type="text" id="identifier" placeholder="you@example.com or username" autocomplete="username" required>
        </div>
        <div class="status-line" id="identifierStatus"></div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-shell has-icon">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="icon-btn" id="togglePassword" aria-label="Show password">👁</button>
        </div>
        <div class="status-line" id="passwordStatus"></div>
      </div>

      <div class="row-between">
        <label class="remember">
          <input type="checkbox" id="rememberMe" checked>
          Remember me
        </label>
        <button type="button" class="forgot-link" id="forgotBtn">Forgot password?</button>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Log In</span>
        <span class="spinner"></span>
      </button>
    </form>
  </div>

  <div class="footer-link">
    Don't have an account? <a href="index.html">Create one</a>
  </div>
</div>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h2>Reset your password</h2>
    <p>Enter the email linked to your account and we'll send you a reset link.</p>
    <div class="field">
      <div class="input-shell">
        <input type="email" id="resetEmail" placeholder="you@example.com">
      </div>
      <div class="status-line" id="resetStatus"></div>
    </div>
    <div class="modal-actions">
      <button class="cancel" id="resetCancel" type="button">Cancel</button>
      <button class="confirm" id="resetConfirm" type="button">Send Link</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, signInWithEmailAndPassword, sendPasswordResetEmail,
    setPersistence, browserLocalPersistence, browserSessionPersistence
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  /* ---------------- Toast system ---------------- */
  function toast(message, type = "info", duration = 4200) {
    const stack = document.getElementById("toast-stack");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = message;
    stack.appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity .25s ease";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 250);
    }, duration);
  }

  /* ---------------- Particle background (matches registration page) ---------------- */
  (function initParticles() {
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let w, h, particles;
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    function makeParticles() {
      const count = Math.min(45, Math.floor((w * h) / 28000));
      particles = Array.from({ length: count }, () => ({
        x: Math.random() * w, y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
        r: Math.random() * 1.4 + 0.6
      }));
    }
    function step() {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
      }
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 130) {
            ctx.strokeStyle = `rgba(0,229,255,${0.09 * (1 - dist / 130)})`;
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          }
        }
      }
      for (const p of particles) {
        ctx.fillStyle = "rgba(168,85,247,0.55)";
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      }
      if (!reduceMotion) requestAnimationFrame(step);
    }
    resize(); makeParticles();
    window.addEventListener("resize", () => { resize(); makeParticles(); });
    step();
  })();

  /* ---------------- Password visibility toggle ---------------- */
  const passwordEl = document.getElementById("password");
  document.getElementById("togglePassword").addEventListener("click", (e) => {
    const showing = passwordEl.type === "text";
    passwordEl.type = showing ? "password" : "text";
    e.currentTarget.textContent = showing ? "👁" : "🙈";
  });

  /* ---------------- Elements ---------------- */
  const identifierEl = document.getElementById("identifier");
  const identifierStatus = document.getElementById("identifierStatus");
  const passwordStatus = document.getElementById("passwordStatus");
  const rememberEl = document.getElementById("rememberMe");
  const submitBtn = document.getElementById("submitBtn");
  const form = document.getElementById("loginForm");

  function setStatus(el, msg) { el.textContent = msg; }
  function markInput(input, kind) {
    input.classList.remove("error-state");
    if (kind === "bad") input.classList.add("error-state");
  }

  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  /* ---------------- Resolve username -> email (only when needed) ---------------- */
  async function resolveEmail(identifier) {
    if (emailPattern.test(identifier)) return identifier;

    // Not an email: treat as username. Two lean reads: usernames/{u} -> uid, users/{uid} -> email
    const uname = identifier.trim().toLowerCase();
    const unameSnap = await getDoc(doc(db, "usernames", uname));
    if (!unameSnap.exists()) return null;
    const uid = unameSnap.data().uid;
    const userSnap = await getDoc(doc(db, "users", uid));
    if (!userSnap.exists()) return null;
    return userSnap.data().email || null;
  }

  /* ---------------- Submit ---------------- */
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    setStatus(identifierStatus, ""); setStatus(passwordStatus, "");
    markInput(identifierEl, ""); markInput(passwordEl, "");

    const identifier = identifierEl.value.trim();
    const password = passwordEl.value;

    if (!identifier) {
      setStatus(identifierStatus, "Enter your email or username"); markInput(identifierEl, "bad");
      return;
    }
    if (!password) {
      setStatus(passwordStatus, "Enter your password"); markInput(passwordEl, "bad");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.classList.add("loading");

    try {
      await setPersistence(auth, rememberEl.checked ? browserLocalPersistence : browserSessionPersistence);

      const email = await resolveEmail(identifier);
      if (!email) {
        toast("We couldn't find an account with that email or username", "error");
        markInput(identifierEl, "bad");
        submitBtn.disabled = false;
        submitBtn.classList.remove("loading");
        return;
      }

      const cred = await signInWithEmailAndPassword(auth, email, password);

      // Account status check: blocks sign-in if the account was deleted or is currently suspended.
      const statusSnap = await getDoc(doc(db, "users", cred.user.uid));
      if (!statusSnap.exists()) {
        await auth.signOut();
        toast("This account no longer exists.", "error");
        submitBtn.disabled = false;
        submitBtn.classList.remove("loading");
        return;
      }
      const statusData = statusSnap.data();
      const suspendedUntilMs = statusData.suspendedUntil
        ? (statusData.suspendedUntil.toMillis ? statusData.suspendedUntil.toMillis() : new Date(statusData.suspendedUntil).getTime())
        : 0;
      if (suspendedUntilMs > Date.now()) {
        await auth.signOut();
        const untilDate = new Date(suspendedUntilMs).toLocaleString("en-NG", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
        toast(`Your account is suspended until ${untilDate}.${statusData.suspensionReason ? " Reason: " + statusData.suspensionReason : ""}`, "error", 6000);
        submitBtn.disabled = false;
        submitBtn.classList.remove("loading");
        return;
      }

      sessionStorage.setItem("quantum_show_welcome", "1");
      toast("Welcome back! Redirecting…", "success");
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);

    } catch (err) {
      let message = "Something went wrong. Please try again.";
      if (["auth/invalid-credential", "auth/wrong-password", "auth/user-not-found"].includes(err.code)) {
        message = "Incorrect email/username or password";
      } else if (err.code === "auth/too-many-requests") {
        message = "Too many attempts. Please wait a moment and try again";
      } else if (err.code === "auth/invalid-email") {
        message = "Please enter a valid email address";
      }
      toast(message, "error");
      submitBtn.disabled = false;
      submitBtn.classList.remove("loading");
    }
  });

  /* ---------------- Forgot password modal ---------------- */
  const resetModal = document.getElementById("resetModal");
  const resetEmailEl = document.getElementById("resetEmail");
  const resetStatus = document.getElementById("resetStatus");

  document.getElementById("forgotBtn").addEventListener("click", () => {
    resetEmailEl.value = emailPattern.test(identifierEl.value.trim()) ? identifierEl.value.trim() : "";
    setStatus(resetStatus, "");
    resetModal.classList.add("open");
  });
  document.getElementById("resetCancel").addEventListener("click", () => {
    resetModal.classList.remove("open");
  });
  resetModal.addEventListener("click", (e) => {
    if (e.target === resetModal) resetModal.classList.remove("open");
  });

  document.getElementById("resetConfirm").addEventListener("click", async () => {
    const email = resetEmailEl.value.trim();
    if (!emailPattern.test(email)) {
      setStatus(resetStatus, "Enter a valid email address");
      return;
    }
    const btn = document.getElementById("resetConfirm");
    btn.disabled = true;
    btn.textContent = "Sending…";
    try {
      await sendPasswordResetEmail(auth, email);
      toast("Password reset link sent — check your inbox", "success");
      resetModal.classList.remove("open");
    } catch (err) {
      setStatus(resetStatus, "Couldn't send reset link. Check the email and try again.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Send Link";
    }
  });
</script>
</body>
</html>
