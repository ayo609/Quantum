<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Admin Referrals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#060818; --surface:#0d1226; --surface-2:#121834;
    --cyan:#00e5ff; --violet:#a855f7; --text:#e8ecf7; --muted:#8b93b8;
    --success:#22e6a3; --error:#ff5470; --border:rgba(232,236,247,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{ background:var(--void); color:var(--text); font-family:'Inter', sans-serif; min-height:100vh; position:relative; padding-bottom:40px; }
  a{ text-decoration:none; color:inherit; }
  .bg-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(600px circle at 15% 0%, rgba(168,85,247,0.10), transparent 55%),
      radial-gradient(700px circle at 90% 40%, rgba(0,229,255,0.09), transparent 55%);
  }
  .container{ position:relative; z-index:1; max-width:560px; margin:0 auto; padding:20px 18px; }

  .topbar{ display:flex; align-items:center; gap:14px; margin-bottom:16px; justify-content:space-between; }
  .topbar-left{ display:flex; align-items:center; gap:14px; }
  .back-btn, .icon-btn-round{
    width:38px; height:38px; border-radius:50%; flex:none;
    background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer;
  }
  .icon-btn-round.spinning{ animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .topbar h1{ font-family:'Space Grotesk', sans-serif; font-size:18px; font-weight:600; }

  .search-row{ display:flex; gap:8px; margin-bottom:6px; }
  .search-row input{
    flex:1; background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:12px 14px; color:var(--text); font-size:14px; font-family:'Inter', sans-serif; outline:none;
  }
  .search-row input:focus{ border-color:var(--cyan); }
  .search-row button{
    background:linear-gradient(120deg, var(--cyan), var(--violet)); border:none; border-radius:12px;
    padding:0 16px; color:#040613; font-weight:600; font-size:13.5px; cursor:pointer; font-family:'Space Grotesk', sans-serif;
  }
  .hint{ font-size:12px; color:var(--muted); margin-bottom:18px; }

  .profile-card{
    background:linear-gradient(135deg, #0f1730, #161033); border:1px solid var(--border); border-radius:16px;
    padding:16px; margin-bottom:16px; display:none;
  }
  .profile-card.show{ display:block; }
  .profile-top{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .p-avatar{
    width:44px; height:44px; border-radius:50%; flex:none;
    background:linear-gradient(135deg, var(--cyan), var(--violet));
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif; font-weight:700; color:#040613; font-size:17px;
  }
  .profile-top p.name{ font-size:15px; font-weight:600; }
  .profile-top p.username{ font-size:12px; color:var(--muted); font-family:'JetBrains Mono', monospace; }
  .profile-stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .profile-stats .cell{ background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:8px 6px; text-align:center; }
  .profile-stats .cell p.k{ font-size:9px; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .profile-stats .cell p.v{ font-family:'Space Grotesk', sans-serif; font-size:12.5px; font-weight:700; }

  .tabs{ display:flex; gap:8px; margin-bottom:14px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:5px; }
  .tab{ flex:1; text-align:center; padding:9px 6px; border-radius:10px; font-size:12.5px; font-weight:600; color:var(--muted); cursor:pointer; }
  .tab.active{ background:linear-gradient(120deg, var(--cyan), var(--violet)); color:#040613; }

  .level-summary{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
  .level-card{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px; text-align:center; }
  .level-card p.k{ font-size:10px; color:var(--muted); margin-bottom:4px; }
  .level-card p.v{ font-family:'Space Grotesk', sans-serif; font-size:14px; font-weight:700; }

  .ref-item{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; }
  .ref-top{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .ref-avatar{
    width:36px; height:36px; border-radius:50%; flex:none;
    background:linear-gradient(135deg, var(--cyan), var(--violet));
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif; font-weight:700; color:#040613; font-size:14px;
  }
  .ref-name{ flex:1; min-width:0; }
  .ref-name p.n{ font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ref-name p.t{ font-size:11px; color:var(--muted); margin-top:2px; }
  .level-badge{ font-size:10px; font-weight:700; padding:3px 8px; border-radius:7px; background:rgba(0,229,255,0.12); color:var(--cyan); flex:none; }
  .level-badge.l2{ background:rgba(168,85,247,0.14); color:var(--violet); }
  .level-badge.l3{ background:rgba(34,230,163,0.14); color:var(--success); }
  .ref-detail-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .ref-detail{ background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:8px 10px; }
  .ref-detail p.k{ font-size:9.5px; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .ref-detail p.v{ font-family:'JetBrains Mono', monospace; font-size:12.5px; font-weight:600; }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--muted); }
  .empty-state .emoji{ font-size:38px; margin-bottom:10px; }
  .skeleton{
    background:var(--surface); border:1px solid var(--border); border-radius:14px; height:110px;
    background-image:linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
    background-size:200% 100%; animation:shimmer 1.4s infinite; margin-bottom:10px;
  }
  @keyframes shimmer{ from{ background-position:200% 0;} to{ background-position:-200% 0;} }

  #toast-stack{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:100; display:flex; flex-direction:column; gap:8px;
    width:calc(100% - 32px); max-width:420px;
  }
  .toast{
    background:var(--surface-2); border:1px solid var(--border); border-left:3px solid var(--cyan);
    padding:12px 14px; border-radius:10px; font-size:13.5px; box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:slideDown .25s ease;
  }
  .toast.error{ border-left-color:var(--error); }
  .toast.success{ border-left-color:var(--success); }
  @keyframes slideDown{ from{ opacity:0; transform:translateY(-10px);} to{ opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="admin-dashboard.html" class="back-btn">←</a>
      <h1>Referrals</h1>
    </div>
    <div class="icon-btn-round" id="refreshBtn" title="Refresh" style="display:none;">⟳</div>
  </div>

  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search by username, email or phone">
    <button id="searchBtn">Search</button>
  </div>
  <p class="hint">Look up any user to see their full 3-level downline tree.</p>

  <div class="profile-card" id="profileCard">
    <div class="profile-top">
      <div class="p-avatar" id="pAvatar">Q</div>
      <div>
        <p class="name" id="pName">—</p>
        <p class="username" id="pUsername">@—</p>
      </div>
    </div>
    <div class="profile-stats">
      <div class="cell"><p class="k">Total Refs</p><p class="v" id="pTotalRefs">0</p></div>
      <div class="cell"><p class="k">Bonus Paid</p><p class="v" id="pBonus">₦0</p></div>
      <div class="cell"><p class="k">Level 1</p><p class="v" id="pL1">0</p></div>
      <div class="cell"><p class="k">L2 / L3</p><p class="v" id="pL23">0/0</p></div>
    </div>
  </div>

  <div id="resultsArea" style="display:none;">
    <div class="tabs">
      <div class="tab active" data-level="all">All</div>
      <div class="tab" data-level="1">Level 1</div>
      <div class="tab" data-level="2">Level 2</div>
      <div class="tab" data-level="3">Level 3</div>
    </div>
    <div id="listContainer"></div>
  </div>

  <div id="idleState" class="empty-state">
    <div class="emoji">🔍</div>
    <p>Search for a user above to view their referral downline.</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentDownline = [];
  let currentUid = null;
  let activeLevel = "all";

  function toast(message, type = "info", duration = 4000) {
    const stack = document.getElementById("toast-stack");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = message;
    stack.appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity .25s ease";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 250);
    }, duration);
  }
  function formatNaira(v) { return "₦" + (Number(v) || 0).toLocaleString("en-NG"); }
  function formatTime(ts) {
    if (!ts) return "Join time unavailable";
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    return date.toLocaleDateString("en-NG", { day: "numeric", month: "short", year: "numeric" }) +
      " · " + date.toLocaleTimeString("en-NG", { hour: "2-digit", minute: "2-digit" });
  }
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
  }

  /* ---------------- Auth + role guard ---------------- */
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "admin-login.html"; return; }
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      const role = snap.exists() ? snap.data().role : null;
      if (role !== "admin") { await signOut(auth); window.location.href = "admin-login.html"; return; }
    } catch (e) { window.location.href = "admin-login.html"; }
  });

  /* =========================================================
     SEARCH FOR A USER (username -> email -> phone)
     ========================================================= */
  async function findUser(term) {
    const trimmed = term.trim();
    const unameSnap = await getDoc(doc(db, "usernames", trimmed.toLowerCase()));
    if (unameSnap.exists()) {
      const userSnap = await getDoc(doc(db, "users", unameSnap.data().uid));
      if (userSnap.exists()) return { id: userSnap.id, ...userSnap.data() };
    }
    const emailSnap = await getDocs(query(collection(db, "users"), where("email", "==", trimmed)));
    if (!emailSnap.empty) return { id: emailSnap.docs[0].id, ...emailSnap.docs[0].data() };

    const phoneSnap = await getDocs(query(collection(db, "users"), where("phone", "==", trimmed)));
    if (!phoneSnap.empty) return { id: phoneSnap.docs[0].id, ...phoneSnap.docs[0].data() };

    return null;
  }

  document.getElementById("searchBtn").addEventListener("click", () => runSearch());
  document.getElementById("searchInput").addEventListener("keydown", (e) => { if (e.key === "Enter") runSearch(); });

  async function runSearch() {
    const term = document.getElementById("searchInput").value;
    if (!term.trim()) return;

    document.getElementById("idleState").innerHTML = `<div class="skeleton"></div><div class="skeleton"></div>`;
    document.getElementById("idleState").style.display = "block";
    document.getElementById("profileCard").classList.remove("show");
    document.getElementById("resultsArea").style.display = "none";
    document.getElementById("refreshBtn").style.display = "none";

    try {
      const user = await findUser(term);
      if (!user) {
        document.getElementById("idleState").innerHTML = `<div class="emoji">🚫</div><p>No user found matching "${escapeHtml(term)}".</p>`;
        return;
      }
      currentUid = user.id;
      renderProfile(user);
      await loadDownline(user.id);
      document.getElementById("idleState").style.display = "none";
      document.getElementById("resultsArea").style.display = "block";
      document.getElementById("refreshBtn").style.display = "flex";
    } catch (e) {
      document.getElementById("idleState").innerHTML = `<div class="emoji">⚠️</div><p>Search failed. Please try again.</p>`;
    }
  }

  function renderProfile(user) {
    document.getElementById("pAvatar").textContent = (user.name || "Q").trim().charAt(0).toUpperCase();
    document.getElementById("pName").textContent = user.name || "Unnamed";
    document.getElementById("pUsername").textContent = "@" + (user.username || "—");
    document.getElementById("pBonus").textContent = formatNaira(user.referralEarnings);
    document.getElementById("profileCard").classList.add("show");
  }

  /* =========================================================
     CHAIN-WALK DOWNLINE (L1 -> L2 -> L3)
     ========================================================= */
  async function loadDownline(uid) {
    const usersRef = collection(db, "users");

    const l1Snap = await getDocs(query(usersRef, where("referredBy", "==", uid)));
    const l1 = l1Snap.docs.map(d => ({ id: d.id, level: 1, ...d.data() }));

    let l2 = [];
    if (l1.length) {
      const l2Results = await Promise.all(l1.map(u => getDocs(query(usersRef, where("referredBy", "==", u.id)))));
      l2Results.forEach(snap => snap.docs.forEach(d => l2.push({ id: d.id, level: 2, ...d.data() })));
    }

    let l3 = [];
    if (l2.length) {
      const l3Results = await Promise.all(l2.map(u => getDocs(query(usersRef, where("referredBy", "==", u.id)))));
      l3Results.forEach(snap => snap.docs.forEach(d => l3.push({ id: d.id, level: 3, ...d.data() })));
    }

    currentDownline = [...l1, ...l2, ...l3];
    document.getElementById("pTotalRefs").textContent = currentDownline.length;
    document.getElementById("pL1").textContent = l1.length;
    document.getElementById("pL23").textContent = `${l2.length}/${l3.length}`;
    renderList();
  }

  /* ---------------- Tabs ---------------- */
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeLevel = tab.dataset.level;
      renderList();
    });
  });

  function renderList() {
    const container = document.getElementById("listContainer");
    const filtered = activeLevel === "all" ? currentDownline : currentDownline.filter(u => String(u.level) === activeLevel);

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="emoji">🌱</div><p>No referrals ${activeLevel === "all" ? "" : "at this level "}for this user yet.</p></div>`;
      return;
    }

    container.innerHTML = filtered.map(u => `
      <div class="ref-item">
        <div class="ref-top">
          <div class="ref-avatar">${(u.name || "Q").trim().charAt(0).toUpperCase()}</div>
          <div class="ref-name">
            <p class="n">${escapeHtml(u.name || u.username || "Unnamed")} · @${escapeHtml(u.username || "—")}</p>
            <p class="t">${formatTime(u.createdAt)}</p>
          </div>
          <span class="level-badge ${u.level === 2 ? "l2" : u.level === 3 ? "l3" : ""}">L${u.level}</span>
        </div>
        <div class="ref-detail-grid">
          <div class="ref-detail"><p class="k">Total Deposit</p><p class="v">${formatNaira(u.totalDeposit)}</p></div>
          <div class="ref-detail"><p class="k">Total Invested</p><p class="v">${formatNaira(u.totalInvested)}</p></div>
        </div>
      </div>
    `).join("");
  }

  /* ---------------- Refresh ---------------- */
  document.getElementById("refreshBtn").addEventListener("click", async () => {
    if (!currentUid) return;
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");
    const userSnap = await getDoc(doc(db, "users", currentUid));
    if (userSnap.exists()) renderProfile({ id: userSnap.id, ...userSnap.data() });
    await loadDownline(currentUid);
    btn.classList.remove("spinning");
    toast("Referral data updated", "success", 1800);
  });
</script>
</body>
</html>
