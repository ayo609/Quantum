<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>VELTRIX — Admin Activity Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f0c; --surface: #111915; --surface-2: #1a241e; --surface-3: #243028;
    --primary: #22c55e; --primary-dark: #16a34a; --primary-glow: rgba(34,197,94,0.25);
    --gold: #f59e0b; --text: #f0fdf4; --text-bright: #ffffff; --muted: #9ca3a0;
    --success: #22c55e; --warning: #f59e0b; --error: #ef4444;
    --border: rgba(255,255,255,0.06); --border-hover: rgba(255,255,255,0.12);
    --shadow-lg: 0 30px 60px rgba(0,0,0,0.6); --shadow-md: 0 15px 35px rgba(0,0,0,0.4);
    --radius: 18px; --radius-sm: 13px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;position:relative;padding-bottom:40px;background-image:radial-gradient(ellipse at 50% 0%,rgba(34,197,94,0.04) 0%,transparent 50%);}
  a{text-decoration:none;color:inherit;-webkit-tap-highlight-color:transparent;}

  .floating-orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);opacity:0.18;}
  .floating-orb.orb-1{width:240px;height:240px;background:rgba(245,158,11,0.06);bottom:-60px;right:-50px;animation:float1 15s ease-in-out infinite;}
  @keyframes float1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-20px,-15px) scale(1.05);}}

  .container{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:20px 18px 60px;animation:fadeUp 0.5s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;justify-content:space-between;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .back-btn,.icon-btn{width:38px;height:38px;border-radius:11px;flex:none;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all 0.25s;}
  .back-btn:hover,.icon-btn:hover{background:var(--surface-2);border-color:var(--border-hover);color:var(--text-bright);}
  .back-btn svg,.icon-btn svg{width:17px;height:17px;}
  .icon-btn.spinning{animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .topbar h1{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:var(--text-bright);}

  .section-title{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;}

  .promote-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;}
  .search-row{display:flex;gap:8px;margin-bottom:10px;}
  .search-row input{flex:1;background:var(--surface-2);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13.5px;font-family:'Inter',sans-serif;outline:none;transition:all 0.3s;}
  .search-row input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow);}
  .search-row button{background:linear-gradient(135deg,var(--primary),#16a34a);border:none;border-radius:10px;padding:0 15px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .found-user{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;display:none;}
  .found-user.show{display:flex;}
  .fu-avatar{width:40px;height:40px;border-radius:50%;flex:none;background:linear-gradient(135deg,var(--primary),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:700;color:#fff;font-size:15px;}
  .fu-info{flex:1;min-width:0;}
  .fu-info p.name{font-size:13.5px;font-weight:700;color:var(--text-bright);}
  .fu-info p.username{font-size:11px;color:var(--muted);}
  .role-badge{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(156,163,160,0.15);color:var(--muted);margin-top:3px;display:inline-block;}
  .role-badge.admin{background:rgba(245,158,11,0.15);color:var(--gold);}
  .role-toggle-btn{flex:none;padding:9px 14px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:12px;transition:all 0.2s;}
  .role-toggle-btn.promote{background:linear-gradient(135deg,var(--primary),#16a34a);color:#fff;}
  .role-toggle-btn.demote{background:var(--surface-3);border:1.5px solid rgba(239,68,68,0.25);color:var(--error);}
  .role-toggle-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .no-result{font-size:12px;color:var(--muted);padding:6px 2px;}

  .log-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:all 0.3s;}
  .log-item:hover{border-color:var(--border-hover);}
  .log-icon{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .log-icon.success{background:rgba(34,197,94,0.12);color:var(--success);}
  .log-icon.danger{background:rgba(239,68,68,0.1);color:var(--error);}
  .log-icon.warn{background:rgba(245,158,11,0.12);color:var(--gold);}
  .log-icon.info{background:rgba(34,197,94,0.1);color:var(--primary);}
  .log-body{flex:1;min-width:0;}
  .log-body p.desc{font-size:12.5px;font-weight:500;line-height:1.4;color:var(--text-bright);}
  .log-body p.meta{font-size:10.5px;color:var(--muted);margin-top:2px;}

  .load-more-btn{width:100%;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);color:var(--primary);font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:all 0.3s;}
  .load-more-btn:hover{background:var(--surface-2);border-color:var(--primary);}
  .load-more-btn:disabled{opacity:0.4;cursor:not-allowed;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty-state .empty-icon{font-size:36px;margin-bottom:10px;}
  .skeleton{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);height:64px;margin-bottom:8px;background-image:linear-gradient(90deg,var(--surface) 0%,var(--surface-2) 50%,var(--surface) 100%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
  @keyframes shimmer{from{background-position:200% 0;}to{background-position:-200% 0;}}

  .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.82);display:none;align-items:center;justify-content:center;z-index:90;padding:20px;}
  .confirm-overlay.show{display:flex;}
  .confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 20px;max-width:380px;width:100%;box-shadow:var(--shadow-lg);animation:popIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);}
  @keyframes popIn{from{opacity:0;transform:scale(0.88) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .confirm-box p{font-size:13.5px;line-height:1.5;margin-bottom:16px;color:var(--text);}
  .confirm-actions{display:flex;gap:8px;}
  .confirm-actions button{flex:1;padding:11px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;transition:all 0.2s;}
  .confirm-actions .cancel{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
  .confirm-actions .confirm-btn{background:linear-gradient(135deg,var(--primary),#16a34a);color:#fff;}

  .toast-container{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:380px;}
  .toast{background:var(--surface-3);border:1px solid var(--border);padding:13px 15px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-lg);animation:slideIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);display:flex;align-items:center;gap:9px;}
  .toast.error{border-left:4px solid var(--error);}
  .toast.success{border-left:4px solid var(--success);}
  @keyframes slideIn{from{opacity:0;transform:translateX(80px);}to{opacity:1;transform:translateX(0);}}

  @media(max-width:480px){.container{padding:16px 12px 60px;}}
</style>
</head>
<body>

<div class="floating-orb orb-1"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="admin-dashboard.html" class="back-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg></a>
      <h1>Activity Log</h1>
    </div>
    <button class="icon-btn" id="refreshBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
  </div>

  <div class="promote-card">
    <div class="section-title">👑 Promote / Demote Admin</div>
    <div class="search-row"><input type="text" id="searchInput" placeholder="Search by username"><button id="searchBtn">Search</button></div>
    <div class="found-user" id="foundUser">
      <div class="fu-avatar" id="fuAvatar">V</div>
      <div class="fu-info"><p class="name" id="fuName">—</p><p class="username" id="fuUsername">@—</p><span class="role-badge" id="fuRoleBadge">Member</span></div>
      <button class="role-toggle-btn" id="roleToggleBtn">Promote</button>
    </div>
    <div class="no-result" id="noResult" style="display:none;">No user found.</div>
  </div>

  <div class="section-title">📜 All Admin Actions</div>
  <div id="listContainer"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  <button class="load-more-btn" id="loadMoreBtn" style="display:none;">Load More</button>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmText">Are you sure?</p>
    <div class="confirm-actions"><button class="cancel" id="confirmCancel">Cancel</button><button class="confirm-btn" id="confirmYes">Confirm</button></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, collection, query, orderBy, limit, startAfter, getDocs, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI", authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0", storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094", appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const PAGE_SIZE = 50;
  let adminUid = null, lastVisibleDoc = null, allLogs = [], foundUserData = null;

  function showToast(m, t = "info", d = 4000) {
    const c = document.getElementById("toastContainer");
    const el = document.createElement("div");
    el.className = `toast ${t}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
    el.innerHTML = `<span>${icons[t]||icons.info}</span>${m}`;
    if (c.children.length >= 3) c.removeChild(c.firstChild);
    c.appendChild(el);
    setTimeout(() => { el.style.opacity = "0"; el.style.transform = "translateX(80px)"; el.style.transition = "all 0.3s"; setTimeout(() => { if (el.parentNode) el.remove(); }, 300); }, d);
  }

  function formatNaira(v) { return "₦" + (Number(v) || 0).toLocaleString("en-NG"); }
  function formatTime(ts) { if(!ts)return"—"; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString("en-NG",{day:"numeric",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit"}); }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ✅ AUTH
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "admin-login.html"; return; }
    try { const snap = await getDoc(doc(db, "users", user.uid)); if (!snap.exists()||snap.data().role!=="admin"){await signOut(auth);window.location.href="admin-login.html";return;} adminUid = user.uid; loadLogs(true); }
    catch(e) { window.location.href = "admin-login.html"; }
  });

  // ✅ PROMOTE/DEMOTE
  document.getElementById("searchBtn").addEventListener("click", searchPromo);
  document.getElementById("searchInput").addEventListener("keydown", e => { if (e.key === "Enter") searchPromo(); });

  async function searchPromo() {
    const term = document.getElementById("searchInput").value.trim().toLowerCase();
    document.getElementById("foundUser").classList.remove("show"); document.getElementById("noResult").style.display = "none";
    if (!term) return;
    try {
      const uSnap = await getDoc(doc(db, "usernames", term)); if (!uSnap.exists()) { document.getElementById("noResult").style.display = "block"; return; }
      const s = await getDoc(doc(db, "users", uSnap.data().uid)); if (!s.exists()) { document.getElementById("noResult").style.display = "block"; return; }
      foundUserData = { id: s.id, ...s.data() }; renderFoundUser();
    } catch(e) { showToast("Search failed.", "error"); }
  }

  function renderFoundUser() {
    const isAdmin = foundUserData.role === "admin";
    document.getElementById("fuAvatar").textContent = (foundUserData.name||"V").trim().charAt(0).toUpperCase();
    document.getElementById("fuName").textContent = foundUserData.name||"Unnamed";
    document.getElementById("fuUsername").textContent = "@"+(foundUserData.username||"—");
    const badge = document.getElementById("fuRoleBadge"); badge.textContent = isAdmin ? "Admin" : "Member"; badge.className = "role-badge" + (isAdmin ? " admin" : "");
    const btn = document.getElementById("roleToggleBtn"); const isSelf = foundUserData.id === adminUid;
    btn.textContent = isAdmin ? "Demote" : "Promote"; btn.className = "role-toggle-btn " + (isAdmin ? "demote" : "promote");
    btn.disabled = isSelf && isAdmin; btn.title = isSelf && isAdmin ? "Can't demote yourself" : "";
    document.getElementById("foundUser").classList.add("show");
  }

  document.getElementById("roleToggleBtn").addEventListener("click", () => {
    if (!foundUserData) return;
    const isAdmin = foundUserData.role === "admin";
    document.getElementById("confirmText").textContent = isAdmin ? `Remove admin from @${foundUserData.username}?` : `Grant admin to @${foundUserData.username}?`;
    document.getElementById("confirmOverlay").classList.add("show");
    pendingConfirm = () => toggleRole(isAdmin);
  });

  async function toggleRole(currentlyAdmin) {
    const btn = document.getElementById("roleToggleBtn"); btn.disabled = true; btn.textContent = "…";
    try {
      await updateDoc(doc(db, "users", foundUserData.id), { role: currentlyAdmin ? null : "admin" });
      await setDoc(doc(collection(db, "adminActions")), { adminUid, targetUid: foundUserData.id, targetUsername: foundUserData.username||null, action: currentlyAdmin ? "demote_admin" : "promote_admin", createdAt: serverTimestamp() });
      foundUserData.role = currentlyAdmin ? null : "admin"; renderFoundUser();
      showToast(`@${foundUserData.username} ${currentlyAdmin?"demoted":"promoted"}.`, "success"); loadLogs(true);
    } catch(e) { showToast("Couldn't update role.", "error"); btn.disabled = false; }
  }

  const confirmOverlay = document.getElementById("confirmOverlay"); let pendingConfirm = null;
  document.getElementById("confirmCancel").addEventListener("click", () => confirmOverlay.classList.remove("show"));
  confirmOverlay.addEventListener("click", e => { if (e.target === confirmOverlay) confirmOverlay.classList.remove("show"); });
  document.getElementById("confirmYes").addEventListener("click", () => { confirmOverlay.classList.remove("show"); if (pendingConfirm) pendingConfirm(); pendingConfirm = null; });

  // ✅ LOGS (no limit)
  async function loadLogs(reset = true) {
    const container = document.getElementById("listContainer");
    if (reset) { container.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>'; allLogs = []; lastVisibleDoc = null; }
    try {
      const constraints = [orderBy("createdAt", "desc"), limit(PAGE_SIZE)]; if (lastVisibleDoc) constraints.push(startAfter(lastVisibleDoc));
      const snap = await getDocs(query(collection(db, "adminActions"), ...constraints));
      const newLogs = snap.docs.map(d => ({ id: d.id, ...d.data() })); lastVisibleDoc = snap.docs[snap.docs.length - 1] || lastVisibleDoc;
      allLogs = reset ? newLogs : [...allLogs, ...newLogs]; renderLogs(allLogs);
      document.getElementById("loadMoreBtn").style.display = newLogs.length === PAGE_SIZE ? "block" : "none";
    } catch(e) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Couldn\'t load.</p></div>'; }
  }

  document.getElementById("loadMoreBtn").addEventListener("click", async () => { const btn = document.getElementById("loadMoreBtn"); btn.disabled = true; btn.textContent = "Loading…"; await loadLogs(false); btn.disabled = false; btn.textContent = "Load More"; });

  const ACTION_META = {
    approve_deposit: { icon:"✅", cls:"success", label: l => `Approved deposit of ${formatNaira(l.amount)}` },
    reject_deposit: { icon:"❌", cls:"danger", label: () => `Rejected deposit` },
    approve_withdrawal: { icon:"✅", cls:"success", label: () => `Approved withdrawal` },
    reject_withdrawal: { icon:"❌", cls:"danger", label: l => `Rejected withdrawal of ${formatNaira(l.amount)} (refunded)` },
    credit_funds: { icon:"➕", cls:"success", label: l => `Added ${formatNaira(l.amount)} to @${l.targetUsername||"user"}` },
    debit_funds: { icon:"➖", cls:"warn", label: l => `Deducted ${formatNaira(l.amount)} from @${l.targetUsername||"user"}` },
    suspend: { icon:"⏸", cls:"warn", label: l => `Suspended @${l.targetUsername||"user"} for ${l.durationHours}h` },
    unsuspend: { icon:"▶", cls:"success", label: l => `Unsuspended @${l.targetUsername||"user"}` },
    delete_account: { icon:"🗑", cls:"danger", label: l => `Deleted @${l.targetUsername||"user"}` },
    promote_admin: { icon:"👑", cls:"success", label: l => `Promoted @${l.targetUsername||"user"} to admin` },
    demote_admin: { icon:"⬇️", cls:"danger", label: l => `Demoted @${l.targetUsername||"user"}` },
    update_settings: { icon:"⚙️", cls:"info", label: () => `Updated settings` }
  };

  function renderLogs(logs) {
    const container = document.getElementById("listContainer");
    if (!logs.length) { container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>No activity yet.</p></div>'; return; }
    container.innerHTML = logs.map(log => {
      const meta = ACTION_META[log.action] || { icon:"📌", cls:"info", label: () => log.action };
      let desc; try { desc = meta.label(log); } catch(e) { desc = log.action; }
      if (log.reason) desc += ` — ${log.reason}`;
      return `<div class="log-item"><div class="log-icon ${meta.cls}">${meta.icon}</div><div class="log-body"><p class="desc">${escapeHtml(desc)}</p><p class="meta">${formatTime(log.createdAt)}</p></div></div>`;
    }).join("");
  }

  document.getElementById("refreshBtn").addEventListener("click", async () => { const btn = document.getElementById("refreshBtn"); btn.classList.add("spinning"); await loadLogs(true); btn.classList.remove("spinning"); showToast("Updated", "success", 2000); });

  console.log("🚀 Veltrix Admin Activity - Ready");
</script>
</body>
</html>
