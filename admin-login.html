<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Admin Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#060818; --surface:#0d1226; --surface-2:#121834;
    --cyan:#00e5ff; --violet:#a855f7; --text:#e8ecf7; --muted:#8b93b8;
    --success:#22e6a3; --error:#ff5470; --border:rgba(232,236,247,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{ background:var(--void); color:var(--text); font-family:'Inter', sans-serif; min-height:100vh; position:relative; }
  .bg-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(600px circle at 15% 0%, rgba(168,85,247,0.12), transparent 55%),
      radial-gradient(700px circle at 90% 90%, rgba(0,229,255,0.10), transparent 55%);
  }
  .wrap{ position:relative; z-index:1; max-width:420px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:28px 20px; }
  .brand{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; }
  .brand-name{
    font-family:'Space Grotesk', sans-serif; font-size:21px; font-weight:700; letter-spacing:0.5px;
    background:linear-gradient(120deg, var(--cyan), var(--violet)); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .admin-tag{
    font-size:10.5px; font-weight:700; letter-spacing:0.6px; color:var(--violet);
    border:1px solid rgba(168,85,247,0.4); padding:3px 8px; border-radius:7px; text-transform:uppercase;
  }
  .subhead{ text-align:center; color:var(--muted); font-size:13.5px; margin-bottom:30px; }
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:26px 22px; }
  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
  .field label{ font-size:12px; font-weight:600; color:var(--muted); letter-spacing:0.3px; text-transform:uppercase; }
  .input-shell input{
    width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px;
    padding:13px 14px; color:var(--text); font-size:15px; font-family:'Inter', sans-serif; outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .input-shell input:focus{ border-color:var(--violet); box-shadow:0 0 0 3px rgba(168,85,247,0.15); }
  .input-shell input.error-state{ border-color:var(--error); }
  .status-line{ font-size:12px; min-height:14px; color:var(--error); }
  .submit-btn{
    width:100%; margin-top:6px;
    background:linear-gradient(120deg, var(--violet), var(--cyan));
    border:none; border-radius:12px; padding:15px; font-size:15px; font-weight:600; color:#040613;
    font-family:'Space Grotesk', sans-serif; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .submit-btn:disabled{ opacity:0.55; cursor:not-allowed; }
  .spinner{
    width:16px; height:16px; border-radius:50%; border:2px solid rgba(4,6,19,0.3); border-top-color:#040613;
    animation:spin .7s linear infinite; display:none;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .submit-btn.loading .spinner{ display:inline-block; }
  .submit-btn.loading .btn-text{ display:none; }
  .footer-note{ text-align:center; margin-top:18px; font-size:12px; color:var(--muted); }

  #toast-stack{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:60; display:flex; flex-direction:column; gap:8px;
    width:calc(100% - 32px); max-width:420px;
  }
  .toast{
    background:var(--surface-2); border:1px solid var(--border); border-left:3px solid var(--violet);
    padding:12px 14px; border-radius:10px; font-size:13.5px; box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:slideDown .25s ease;
  }
  .toast.error{ border-left-color:var(--error); }
  .toast.success{ border-left-color:var(--success); }
  @keyframes slideDown{ from{ opacity:0; transform:translateY(-10px);} to{ opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="wrap">
  <div class="brand">
    <span class="brand-name">QUANTUM</span>
    <span class="admin-tag">Admin</span>
  </div>
  <p class="subhead">Restricted access — administrators only</p>

  <div class="card">
    <form id="adminLoginForm" novalidate>
      <div class="field">
        <label for="email">Admin Email</label>
        <div class="input-shell"><input type="email" id="email" placeholder="admin@example.com" autocomplete="username" required></div>
        <div class="status-line" id="emailStatus"></div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-shell"><input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required></div>
        <div class="status-line" id="passwordStatus"></div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Access Admin Panel</span><span class="spinner"></span>
      </button>
    </form>
  </div>
  <p class="footer-note">Unauthorized access attempts are logged.</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  function toast(message, type = "info", duration = 4200) {
    const stack = document.getElementById("toast-stack");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = message;
    stack.appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity .25s ease";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 250);
    }, duration);
  }
  function setStatus(id, msg) { document.getElementById(id).textContent = msg; }

  const form = document.getElementById("adminLoginForm");
  const submitBtn = document.getElementById("submitBtn");
  const emailEl = document.getElementById("email");
  const passwordEl = document.getElementById("password");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    setStatus("emailStatus", ""); setStatus("passwordStatus", "");

    if (!emailEl.value.trim()) { setStatus("emailStatus", "Enter your admin email"); return; }
    if (!passwordEl.value) { setStatus("passwordStatus", "Enter your password"); return; }

    submitBtn.disabled = true;
    submitBtn.classList.add("loading");

    try {
      const cred = await signInWithEmailAndPassword(auth, emailEl.value.trim(), passwordEl.value);
      const uid = cred.user.uid;

      // Role gate: only a Firestore user doc with role === "admin" may proceed.
      const snap = await getDoc(doc(db, "users", uid));
      const role = snap.exists() ? snap.data().role : null;

      if (role !== "admin") {
        await signOut(auth);
        toast("This account does not have admin access.", "error");
        submitBtn.disabled = false;
        submitBtn.classList.remove("loading");
        return;
      }

      sessionStorage.setItem("quantum_admin_verified", "1");
      toast("Access granted. Redirecting…", "success");
      setTimeout(() => { window.location.href = "admin-dashboard.html"; }, 1000);

    } catch (err) {
      let message = "Couldn't sign in. Please try again.";
      if (["auth/invalid-credential", "auth/wrong-password", "auth/user-not-found"].includes(err.code)) {
        message = "Incorrect email or password";
      } else if (err.code === "auth/too-many-requests") {
        message = "Too many attempts. Please wait a moment and try again";
      }
      toast(message, "error");
      submitBtn.disabled = false;
      submitBtn.classList.remove("loading");
    }
  });
</script>
</body>
</html>
