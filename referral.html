<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Referrals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#060818;
    --surface:#0d1226;
    --surface-2:#121834;
    --cyan:#00e5ff;
    --violet:#a855f7;
    --text:#e8ecf7;
    --muted:#8b93b8;
    --success:#22e6a3;
    --error:#ff5470;
    --border:rgba(232,236,247,0.08);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--void); color:var(--text); font-family:'Inter', sans-serif;
    min-height:100vh; position:relative; padding-bottom:90px;
  }
  a{ text-decoration:none; color:inherit; }
  .bg-glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(600px circle at 15% 0%, rgba(0,229,255,0.09), transparent 55%),
      radial-gradient(700px circle at 90% 40%, rgba(168,85,247,0.10), transparent 55%);
  }
  .container{ position:relative; z-index:1; max-width:480px; margin:0 auto; padding:20px 18px; }

  .topbar{ display:flex; align-items:center; gap:14px; margin-bottom:20px; justify-content:space-between; }
  .topbar-left{ display:flex; align-items:center; gap:14px; }
  .back-btn, .icon-btn-round{
    width:38px; height:38px; border-radius:50%; flex:none;
    background:var(--surface); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer;
  }
  .topbar h1{ font-family:'Space Grotesk', sans-serif; font-size:19px; font-weight:600; }
  .icon-btn-round.spinning{ animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* Referral link card */
  .link-card{
    background:linear-gradient(135deg, #0f1730, #161033);
    border:1px solid var(--border); border-radius:16px;
    padding:18px; margin-bottom:16px; position:relative; overflow:hidden;
  }
  .link-card::after{
    content:""; position:absolute; width:160px; height:160px; border-radius:50%;
    background:radial-gradient(circle, rgba(0,229,255,0.14), transparent 70%);
    top:-50px; right:-50px;
  }
  .link-card p.label{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; }
  .code-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:rgba(255,255,255,0.05); border:1px solid var(--border);
    border-radius:10px; padding:12px 14px; margin-bottom:12px;
  }
  .code-row span{ font-family:'JetBrains Mono', monospace; font-size:16px; letter-spacing:1px; color:var(--cyan); }
  .code-row button{
    background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer;
  }
  .share-row{ display:flex; gap:10px; }
  .share-row button{
    flex:1; padding:11px; border-radius:10px; border:none; cursor:pointer;
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:13px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-copy{ background:var(--surface-2); color:var(--text); border:1px solid var(--border) !important; }
  .btn-share{ background:linear-gradient(120deg, var(--cyan), var(--violet)); color:#040613; }

  /* Stats overview */
  .stats-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-bottom:18px; }
  .stat-card{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:14px 10px; text-align:center;
  }
  .stat-card p.label{ font-size:10.5px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:0.3px; }
  .stat-card p.value{ font-family:'Space Grotesk', sans-serif; font-size:16px; font-weight:700; }

  /* Level tabs */
  .tabs{ display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; }
  .tab{
    flex:none; padding:9px 16px; border-radius:20px; font-size:13px; font-weight:600;
    background:var(--surface); border:1px solid var(--border); color:var(--muted); cursor:pointer;
    white-space:nowrap;
  }
  .tab.active{
    background:linear-gradient(120deg, rgba(0,229,255,0.18), rgba(168,85,247,0.18));
    border-color:var(--cyan); color:var(--cyan);
  }

  .section-title{ font-family:'Space Grotesk', sans-serif; font-size:14.5px; font-weight:600; margin-bottom:10px; }

  /* Referral list */
  .ref-list{ display:flex; flex-direction:column; gap:10px; }
  .ref-item{
    background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px;
  }
  .ref-item-top{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .ref-avatar{
    width:38px; height:38px; border-radius:50%; flex:none;
    background:linear-gradient(135deg, var(--cyan), var(--violet));
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk', sans-serif; font-weight:700; color:#040613; font-size:15px;
  }
  .ref-name-wrap{ flex:1; min-width:0; }
  .ref-name-wrap p.name{ font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ref-name-wrap p.time{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .level-badge{
    flex:none; font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:8px;
    background:rgba(0,229,255,0.12); color:var(--cyan);
  }
  .level-badge.l2{ background:rgba(168,85,247,0.14); color:var(--violet); }
  .level-badge.l3{ background:rgba(34,230,163,0.14); color:var(--success); }
  .ref-detail-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; }
  .ref-detail{
    background:rgba(255,255,255,0.03); border:1px solid var(--border);
    border-radius:10px; padding:8px 6px; text-align:center;
  }
  .ref-detail p.k{ font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.2px; margin-bottom:3px; }
  .ref-detail p.v{ font-family:'JetBrains Mono', monospace; font-size:12.5px; font-weight:600; }
  .status-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; }
  .status-dot.active{ background:var(--success); }
  .status-dot.pending{ background:var(--muted); }
  .ref-status{ font-size:11px; color:var(--muted); margin-top:10px; display:flex; align-items:center; }

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--muted);
  }
  .empty-state .emoji{ font-size:38px; margin-bottom:12px; }
  .empty-state p{ font-size:13.5px; line-height:1.6; }
  .skeleton{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    height:98px; margin-bottom:10px;
    background-image:linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
    background-size:200% 100%;
    animation:shimmer 1.4s infinite;
  }
  @keyframes shimmer{ from{ background-position:200% 0;} to{ background-position:-200% 0;} }

  /* Bottom nav (consistent with dashboard) */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    background:rgba(13,18,38,0.92); backdrop-filter:blur(10px);
    border-top:1px solid var(--border);
    display:flex; justify-content:space-around; align-items:center;
    padding:10px 6px calc(10px + env(safe-area-inset-bottom));
  }
  .nav-item{ display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; color:var(--muted); flex:1; padding:4px 0; }
  .nav-item .nav-icon{ font-size:19px; }
  .nav-item.active{ color:var(--cyan); }

  #toast-stack{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:60; display:flex; flex-direction:column; gap:8px;
    width:calc(100% - 32px); max-width:420px;
  }
  .toast{
    background:var(--surface-2); border:1px solid var(--border); border-left:3px solid var(--cyan);
    padding:12px 14px; border-radius:10px; font-size:13.5px; box-shadow:0 10px 30px rgba(0,0,0,0.4);
    animation:slideDown .25s ease;
  }
  .toast.error{ border-left-color:var(--error); }
  .toast.success{ border-left-color:var(--success); }
  @keyframes slideDown{ from{ opacity:0; transform:translateY(-10px);} to{ opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-btn">←</a>
      <h1>My Referrals</h1>
    </div>
    <div class="icon-btn-round" id="refreshBtn" title="Refresh">⟳</div>
  </div>

  <div class="link-card">
    <p class="label">Your Referral Code</p>
    <div class="code-row">
      <span id="referralCodeText">—</span>
      <button id="copyCodeBtn" title="Copy code">📋</button>
    </div>
    <div class="share-row">
      <button class="btn-copy" id="copyLinkBtn">🔗 Copy Link</button>
      <button class="btn-share" id="shareBtn">💬 Share on WhatsApp</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <p class="label">Total Referrals</p>
      <p class="value" id="totalReferrals">0</p>
    </div>
    <div class="stat-card">
      <p class="label">Referral Bonus</p>
      <p class="value" id="referralBonus">₦0</p>
    </div>
    <div class="stat-card">
      <p class="label">Active Investors</p>
      <p class="value" id="activeCount">0</p>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-level="all">All</div>
    <div class="tab" data-level="1">Level 1</div>
    <div class="tab" data-level="2">Level 2</div>
    <div class="tab" data-level="3">Level 3</div>
  </div>

  <div class="section-title">Downline</div>
  <div id="listContainer">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<div class="bottom-nav">
  <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Home</a>
  <a href="plans.html" class="nav-item"><span class="nav-icon">📈</span> Plans</a>
  <a href="history.html" class="nav-item"><span class="nav-icon">🧾</span> History</a>
  <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span> Profile</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const DASHBOARD_CACHE_KEY = "quantum_dashboard_cache";
  const REFERRAL_CACHE_KEY = "quantum_referral_cache";
  let currentUser = null;
  let allReferrals = []; // flattened list with level tags
  let activeLevel = "all";

  /* ---------------- Toast ---------------- */
  function toast(message, type = "info", duration = 3800) {
    const stack = document.getElementById("toast-stack");
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = message;
    stack.appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity .25s ease";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 250);
    }, duration);
  }

  function formatNaira(v) { return "₦" + (Number(v) || 0).toLocaleString("en-NG"); }

  function formatTime(ts) {
    if (!ts) return "Join date unavailable";
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    return "Joined " + date.toLocaleDateString("en-NG", { day: "numeric", month: "short", year: "numeric" }) +
      " · " + date.toLocaleTimeString("en-NG", { hour: "2-digit", minute: "2-digit" });
  }

  /* ---------------- Referral code + link ---------------- */
  function myReferralLink(code) {
    return `${window.location.origin}${window.location.pathname.replace("referral.html", "index.html")}?ref=${code}`;
  }

  document.getElementById("copyCodeBtn").addEventListener("click", async () => {
    const code = document.getElementById("referralCodeText").textContent;
    if (code === "—") return;
    try { await navigator.clipboard.writeText(code); toast("Referral code copied", "success", 1800); }
    catch (e) { toast("Couldn't copy — your code is " + code, "error"); }
  });
  document.getElementById("copyLinkBtn").addEventListener("click", async () => {
    const code = document.getElementById("referralCodeText").textContent;
    if (code === "—") return;
    try { await navigator.clipboard.writeText(myReferralLink(code)); toast("Referral link copied", "success", 1800); }
    catch (e) { toast("Couldn't copy the link", "error"); }
  });
  document.getElementById("shareBtn").addEventListener("click", () => {
    const code = document.getElementById("referralCodeText").textContent;
    if (code === "—") return;
    const text = encodeURIComponent(`Join me on QUANTUM and start growing your money! Use my referral code ${code} or sign up here: ${myReferralLink(code)}`);
    window.open(`https://wa.me/?text=${text}`, "_blank");
  });

  /* ---------------- Level tabs ---------------- */
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeLevel = tab.dataset.level;
      renderList();
    });
  });

  /* ---------------- Render ---------------- */
  function renderList() {
    const container = document.getElementById("listContainer");
    const filtered = activeLevel === "all" ? allReferrals : allReferrals.filter(r => String(r.level) === activeLevel);

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🌱</div>
          <p>No referrals ${activeLevel === "all" ? "yet" : "at this level yet"}.<br>Share your code above to start earning bonuses!</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(r => `
      <div class="ref-item">
        <div class="ref-item-top">
          <div class="ref-avatar">${(r.name || "Q").charAt(0).toUpperCase()}</div>
          <div class="ref-name-wrap">
            <p class="name">${escapeHtml(r.name || r.username || "Quantum User")}</p>
            <p class="time">${formatTime(r.createdAt)}</p>
          </div>
          <div class="level-badge ${r.level === 2 ? "l2" : r.level === 3 ? "l3" : ""}">L${r.level}</div>
        </div>
        <div class="ref-detail-grid">
          <div class="ref-detail">
            <p class="k">Admin Funds</p>
            <p class="v">${formatNaira(r.adminFunded)}</p>
          </div>
          <div class="ref-detail">
            <p class="k">Deposit</p>
            <p class="v">${formatNaira(r.totalDeposit)}</p>
          </div>
          <div class="ref-detail">
            <p class="k">Invested</p>
            <p class="v">${formatNaira(r.totalInvested)}</p>
          </div>
        </div>
        <p class="ref-status">
          <span class="status-dot ${r.totalInvested > 0 ? "active" : "pending"}"></span>
          ${r.totalInvested > 0 ? "Active investor" : "Registered, not yet invested"}
        </p>
      </div>
    `).join("");
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[s]));
  }

  /* ---------------- Chain-walk downline fetch (L1 -> L2 -> L3), cached per session ---------------- */
  async function fetchDownline(uid) {
    const usersRef = collection(db, "users");

    const l1Snap = await getDocs(query(usersRef, where("referredBy", "==", uid)));
    const l1 = l1Snap.docs.map(d => ({ id: d.id, level: 1, ...d.data() }));

    let l2 = [];
    if (l1.length) {
      const l2Results = await Promise.all(
        l1.map(u => getDocs(query(usersRef, where("referredBy", "==", u.id))))
      );
      l2Results.forEach(snap => {
        snap.docs.forEach(d => l2.push({ id: d.id, level: 2, ...d.data() }));
      });
    }

    let l3 = [];
    if (l2.length) {
      const l3Results = await Promise.all(
        l2.map(u => getDocs(query(usersRef, where("referredBy", "==", u.id))))
      );
      l3Results.forEach(snap => {
        snap.docs.forEach(d => l3.push({ id: d.id, level: 3, ...d.data() }));
      });
    }

    return [...l1, ...l2, ...l3].map(u => ({
      name: u.name,
      username: u.username,
      level: u.level,
      createdAt: u.createdAt,
      totalDeposit: u.totalDeposit || 0,
      totalInvested: u.totalInvested || 0,
      adminFunded: u.adminFunded || u.totalDeposit || 0
    }));
  }

  async function loadReferralData(uid, forceRefresh = false) {
    if (!forceRefresh) {
      const cached = sessionStorage.getItem(REFERRAL_CACHE_KEY);
      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          if (parsed.uid === uid) {
            allReferrals = parsed.referrals;
            renderSummary(parsed.myReferralCode, parsed.referralBonus);
            renderList();
            return;
          }
        } catch (e) { /* ignore corrupt cache */ }
      }
    }

    // My own doc: needed for referral code + total referral bonus (single read)
    const myCached = sessionStorage.getItem(DASHBOARD_CACHE_KEY);
    let myData = null;
    if (!forceRefresh && myCached) {
      try {
        const parsed = JSON.parse(myCached);
        if (parsed.uid === uid) myData = parsed.data;
      } catch (e) { /* ignore */ }
    }
    if (!myData) {
      const mySnap = await getDoc(doc(db, "users", uid));
      myData = mySnap.exists() ? mySnap.data() : {};
    }

    allReferrals = await fetchDownline(uid);

    sessionStorage.setItem(REFERRAL_CACHE_KEY, JSON.stringify({
      uid, referrals: allReferrals,
      myReferralCode: myData.referralCode || "—",
      referralBonus: myData.referralEarnings || 0
    }));

    renderSummary(myData.referralCode || "—", myData.referralEarnings || 0);
    renderList();
  }

  function renderSummary(code, bonus) {
    document.getElementById("referralCodeText").textContent = code;
    document.getElementById("totalReferrals").textContent = allReferrals.length;
    document.getElementById("referralBonus").textContent = formatNaira(bonus);
    document.getElementById("activeCount").textContent = allReferrals.filter(r => r.totalInvested > 0).length;
  }

  /* ---------------- Auth guard ---------------- */
  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUser = user;
    loadReferralData(user.uid).catch(() => {
      toast("Couldn't load referral data. Please try again.", "error");
      document.getElementById("listContainer").innerHTML = `
        <div class="empty-state"><div class="emoji">⚠️</div><p>Something went wrong loading your referrals.</p></div>`;
    });
  });

  /* ---------------- Manual refresh ---------------- */
  document.getElementById("refreshBtn").addEventListener("click", async () => {
    if (!currentUser) return;
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");
    try {
      await loadReferralData(currentUser.uid, true);
      toast("Referral data updated", "success", 2000);
    } catch (e) {
      toast("Couldn't refresh right now", "error");
    } finally {
      btn.classList.remove("spinning");
    }
  });
</script>
</body>
</html>
