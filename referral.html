<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QUANTUM — Referrals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0a0e27;
    --surface: #131837;
    --surface-2: #1a1f42;
    --surface-3: #1f2550;
    --cyan: #00d4ff;
    --cyan-dark: #0099cc;
    --violet: #7c3aed;
    --violet-light: #a78bfa;
    --text: #e8ecf7;
    --text-bright: #ffffff;
    --muted: #8892b0;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --border: rgba(232, 236, 247, 0.1);
    --border-hover: rgba(232, 236, 247, 0.2);
    --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.2);
    --nav-height: 72px;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    scroll-behavior: smooth;
  }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    position: relative;
    padding-bottom: calc(var(--nav-height) + 20px);
    overflow-x: hidden;
  }

  a {
    text-decoration: none;
    color: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  /* Background Effects */
  .bg-glow {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(600px circle at 20% 10%, rgba(0, 212, 255, 0.08), transparent 55%),
      radial-gradient(700px circle at 80% 50%, rgba(124, 58, 237, 0.09), transparent 55%);
    animation: bgPulse 8s ease-in-out infinite;
  }

  @keyframes bgPulse {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 0.6; }
  }

  /* Main Container */
  .container {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto;
    padding: 24px 20px 8px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Top Bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    justify-content: space-between;
    animation: slideDown 0.5s ease;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .back-btn {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    flex: none;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s ease;
  }

  .back-btn:hover {
    background: var(--surface-2);
    border-color: var(--border-hover);
    color: var(--text-bright);
  }

  .back-btn svg {
    width: 20px;
    height: 20px;
  }

  .icon-btn-round {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    flex: none;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s ease;
  }

  .icon-btn-round:hover {
    background: var(--surface-2);
    border-color: var(--border-hover);
    color: var(--text-bright);
  }

  .icon-btn-round.spinning {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .topbar h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-bright);
  }

  /* Referral Link Card */
  .link-card {
    background: linear-gradient(135deg, #0f1a3a, #1a1140);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-md);
    animation: slideUp 0.5s ease 0.1s both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .link-card::before {
    content: "";
    position: absolute;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0, 212, 255, 0.12), transparent 70%);
    top: -70px;
    right: -70px;
  }

  .link-card p.label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }

  .code-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }

  .code-row span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--cyan);
  }

  .code-row button {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 14px;
  }

  .code-row button:hover {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text-bright);
    border-color: var(--border-hover);
  }

  .share-row {
    display: flex;
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  .share-row button {
    flex: 1;
    padding: 13px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .btn-copy {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border) !important;
  }

  .btn-copy:hover {
    background: var(--surface-3);
    border-color: var(--border-hover) !important;
    transform: translateY(-2px);
  }

  .btn-share {
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    color: #ffffff;
    box-shadow: 0 8px 25px rgba(0, 212, 255, 0.2);
  }

  .btn-share:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(0, 212, 255, 0.3);
  }

  .btn-share:active {
    transform: translateY(0) scale(0.98);
  }

  .btn-copy.copied {
    background: var(--success);
    color: #ffffff;
    border-color: var(--success) !important;
  }

  /* Stats Overview */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
    animation: slideUp 0.5s ease 0.2s both;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 12px;
    text-align: center;
    transition: all 0.3s ease;
  }

  .stat-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  .stat-card .stat-icon {
    font-size: 22px;
    margin-bottom: 8px;
  }

  .stat-card p.label {
    font-size: 10.5px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-weight: 600;
  }

  .stat-card p.value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text-bright);
  }

  /* Level Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding: 2px;
    animation: slideUp 0.5s ease 0.3s both;
  }

  .tabs::-webkit-scrollbar {
    display: none;
  }

  .tab {
    flex: none;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 13.5px;
    font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: 'Space Grotesk', sans-serif;
  }

  .tab:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .tab.active {
    background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(124, 58, 237, 0.2));
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.15);
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--text-bright);
    animation: slideUp 0.5s ease 0.4s both;
  }

  /* Referral List */
  .ref-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: slideUp 0.5s ease 0.5s both;
  }

  .ref-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    transition: all 0.3s ease;
  }

  .ref-item:hover {
    border-color: var(--border-hover);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .ref-item-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .ref-avatar {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    flex: none;
    background: linear-gradient(135deg, var(--cyan), var(--violet));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: #ffffff;
    font-size: 16px;
    box-shadow: 0 4px 12px rgba(0, 212, 255, 0.2);
  }

  .ref-name-wrap {
    flex: 1;
    min-width: 0;
  }

  .ref-name-wrap p.name {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-bright);
  }

  .ref-name-wrap p.time {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  .level-badge {
    flex: none;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(0, 212, 255, 0.15);
    color: var(--cyan);
    font-family: 'Space Grotesk', sans-serif;
    letter-spacing: 0.3px;
  }

  .level-badge.l2 {
    background: rgba(124, 58, 237, 0.15);
    color: var(--violet-light);
  }

  .level-badge.l3 {
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
  }

  .ref-detail-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }

  .ref-detail {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    transition: all 0.2s ease;
  }

  .ref-detail:hover {
    background: rgba(255, 255, 255, 0.05);
  }

  .ref-detail p.k {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .ref-detail p.v {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-bright);
  }

  .ref-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    padding: 8px 12px;
    background: rgba(255, 255, 255, 0.02);
    border-radius: 10px;
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex: none;
  }

  .status-dot.active {
    background: var(--success);
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
  }

  .status-dot.pending {
    background: var(--warning);
    box-shadow: 0 0 8px rgba(245, 158, 11, 0.3);
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    animation: fadeIn 0.5s ease;
  }

  .empty-state .empty-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 16px;
    background: rgba(0, 212, 255, 0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.6;
    max-width: 280px;
    margin: 0 auto;
  }

  /* Skeleton Loading */
  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    height: 110px;
    margin-bottom: 12px;
    background-image: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Bottom Navigation */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 50;
    background: rgba(13, 18, 39, 0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    height: var(--nav-height);
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--muted);
    flex: 1;
    padding: 6px 4px;
    border-radius: 14px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    cursor: pointer;
  }

  .nav-item svg {
    width: 22px;
    height: 22px;
    transition: all 0.3s ease;
  }

  .nav-item span {
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .nav-item.active {
    color: var(--cyan);
  }

  .nav-item.active::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 3px;
    background: var(--cyan);
    border-radius: 0 0 3px 3px;
  }

  .nav-item:active {
    transform: scale(0.95);
  }

  .nav-item .nav-indicator {
    position: absolute;
    bottom: -2px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--cyan);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .nav-item.active .nav-indicator {
    opacity: 1;
  }

  /* Toast Notifications */
  #toast-stack {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: calc(100% - 40px);
    max-width: 400px;
  }

  .toast {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-left: 4px solid var(--cyan);
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 14px;
    box-shadow: var(--shadow-lg);
    animation: toastSlideIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    backdrop-filter: blur(10px);
  }

  .toast.error {
    border-left-color: var(--error);
    background: rgba(239, 68, 68, 0.1);
  }

  .toast.success {
    border-left-color: var(--success);
    background: rgba(16, 185, 129, 0.1);
  }

  @keyframes toastSlideIn {
    from {
      opacity: 0;
      transform: translateX(100px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .container {
      padding: 16px 14px 8px;
    }

    .stat-card p.value {
      font-size: 17px;
    }

    .code-row span {
      font-size: 15px;
    }
  }

  @media (min-width: 768px) {
    .container {
      padding: 32px 24px 8px;
    }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>
<div id="toast-stack"></div>

<div class="container">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="dashboard.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12,19 5,12 12,5"/>
        </svg>
      </a>
      <h1>My Referrals</h1>
    </div>
    <button class="icon-btn-round" id="refreshBtn" title="Refresh referrals">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23,4 23,10 17,10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>

  <!-- Referral Link Card -->
  <div class="link-card">
    <p class="label">Your Referral Code</p>
    <div class="code-row">
      <span id="referralCodeText">—</span>
      <button id="copyCodeBtn" title="Copy code">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>
    <div class="share-row">
      <button class="btn-copy" id="copyLinkBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        Copy Link
      </button>
      <button class="btn-share" id="shareBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/>
        </svg>
        Share on WhatsApp
      </button>
    </div>
  </div>

  <!-- Stats Overview -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon">👥</div>
      <p class="label">Total Referrals</p>
      <p class="value" id="totalReferrals">0</p>
    </div>
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <p class="label">Referral Bonus</p>
      <p class="value" id="referralBonus">₦0</p>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📊</div>
      <p class="label">Active Investors</p>
      <p class="value" id="activeCount">0</p>
    </div>
  </div>

  <!-- Level Tabs -->
  <div class="tabs">
    <div class="tab active" data-level="all">All Levels</div>
    <div class="tab" data-level="1">Level 1</div>
    <div class="tab" data-level="2">Level 2</div>
    <div class="tab" data-level="3">Level 3</div>
  </div>

  <!-- Referral List -->
  <div class="section-title">Your Downline</div>
  <div id="listContainer">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<!-- Bottom Navigation -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDs5w4DtbEOE1mthVxvSW-DZKKhfAORdxI",
    authDomain: "affiliate-93bc0.firebaseapp.com",
    projectId: "affiliate-93bc0",
    storageBucket: "affiliate-93bc0.firebasestorage.app",
    messagingSenderId: "205243273094",
    appId: "1:205243273094:web:d45f306bdc10a69062a607"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const DASHBOARD_CACHE_KEY = "quantum_dashboard_cache";
  const REFERRAL_CACHE_KEY = "quantum_referral_cache";
  let currentUser = null;
  let allReferrals = [];
  let activeLevel = "all";

  /* ---------------- Enhanced Toast System ---------------- */
  function showToast(message, type = "info", duration = 4000) {
    const stack = document.getElementById("toast-stack");
    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    
    const icons = {
      success: '✓',
      error: '✕',
      warning: '⚠',
      info: 'ℹ'
    };
    
    toast.innerHTML = `<span style="margin-right:8px;font-weight:bold;">${icons[type] || icons.info}</span>${message}`;
    
    if (stack.children.length >= 3) {
      stack.removeChild(stack.firstChild);
    }
    
    stack.appendChild(toast);
    
    setTimeout(() => {
      toast.style.transition = "all 0.3s ease";
      toast.style.opacity = "0";
      toast.style.transform = "translateX(100px)";
      setTimeout(() => {
        if (toast.parentNode) toast.remove();
      }, 300);
    }, duration);
  }

  /* ---------------- Utility Functions ---------------- */
  function formatNaira(v) {
    return "₦" + (Number(v) || 0).toLocaleString("en-NG");
  }

  function formatTime(ts) {
    if (!ts) return "Recently joined";
    const date = ts.toDate ? ts.toDate() : new Date(ts);
    const now = new Date();
    const diffMs = now - date;
    const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    
    if (diffDays === 0) return "Joined today";
    if (diffDays === 1) return "Joined yesterday";
    if (diffDays < 7) return `Joined ${diffDays} days ago`;
    
    return "Joined " + date.toLocaleDateString("en-NG", {
      day: "numeric",
      month: "short",
      year: "numeric"
    });
  }

  function escapeHtml(str) {
    const map = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    };
    return String(str).replace(/[&<>"']/g, s => map[s]);
  }

  /* ---------------- Referral Link Generator ---------------- */
  function myReferralLink(code) {
    const base = window.location.origin + window.location.pathname.replace("referral.html", "index.html");
    return `${base}?ref=${code}`;
  }

  /* ---------------- Copy Handlers ---------------- */
  document.getElementById("copyCodeBtn").addEventListener("click", async () => {
    const code = document.getElementById("referralCodeText").textContent;
    if (code === "—") return;
    try {
      await navigator.clipboard.writeText(code);
      showToast("Referral code copied!", "success", 2000);
    } catch (e) {
      showToast("Your code: " + code, "info");
    }
  });

  document.getElementById("copyLinkBtn").addEventListener("click", async () => {
    const code = document.getElementById("referralCodeText").textContent;
    if (code === "—") return;
    const link = myReferralLink(code);
    try {
      await navigator.clipboard.writeText(link);
      const btn = document.getElementById("copyLinkBtn");
      btn.classList.add("copied");
      btn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20,6 9,17 4,12"/>
        </svg>
        Copied!
      `;
      showToast("Referral link copied to clipboard!", "success", 2500);
      
      setTimeout(() => {
        btn.classList.remove("copied");
        btn.innerHTML = `
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          Copy Link
        `;
      }, 2000);
    } catch (e) {
      showToast("Couldn't copy the link", "error");
    }
  });

  document.getElementById("shareBtn").addEventListener("click", () => {
    const code = document.getElementById("referralCodeText").textContent;
    if (code === "—") return;
    const text = encodeURIComponent(
      `🚀 Join me on QUANTUM and start growing your money!\n\n` +
      `Use my referral code: ${code}\n` +
      `Or sign up here: ${myReferralLink(code)}\n\n` +
      `💰 Earn bonuses on every referral!`
    );
    window.open(`https://wa.me/?text=${text}`, "_blank", "noopener,noreferrer");
  });

  /* ---------------- Level Tabs ---------------- */
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeLevel = tab.dataset.level;
      renderList();
    });
  });

  /* ---------------- Render Referral List ---------------- */
  function renderList() {
    const container = document.getElementById("listContainer");
    const filtered = activeLevel === "all"
      ? allReferrals
      : allReferrals.filter(r => String(r.level) === activeLevel);

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🌱</div>
          <p>No referrals ${activeLevel === "all" ? "yet" : "at this level"}.</p>
          <p style="margin-top:8px;">Share your referral link above to start earning bonuses when your friends invest!</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(r => `
      <div class="ref-item">
        <div class="ref-item-top">
          <div class="ref-avatar">${(r.name || "U").charAt(0).toUpperCase()}</div>
          <div class="ref-name-wrap">
            <p class="name">${escapeHtml(r.name || r.username || "Quantum User")}</p>
            <p class="time">${formatTime(r.createdAt)}</p>
          </div>
          <div class="level-badge ${r.level === 2 ? "l2" : r.level === 3 ? "l3" : ""}">
            Level ${r.level}
          </div>
        </div>
        <div class="ref-detail-grid">
          <div class="ref-detail">
            <p class="k">Total Deposits</p>
            <p class="v">${formatNaira(r.totalDeposit || 0)}</p>
          </div>
          <div class="ref-detail">
            <p class="k">Invested</p>
            <p class="v">${formatNaira(r.totalInvested || 0)}</p>
          </div>
          <div class="ref-detail">
            <p class="k">Admin Funded</p>
            <p class="v">${formatNaira(r.adminFunded || r.totalDeposit || 0)}</p>
          </div>
        </div>
        <div class="ref-status">
          <span class="status-dot ${r.totalInvested > 0 ? "active" : "pending"}"></span>
          ${r.totalInvested > 0 ? "Active Investor" : "Registered — awaiting first investment"}
        </div>
      </div>
    `).join("");
  }

  /* ---------------- Fetch Downline (Chain: L1 → L2 → L3) ---------------- */
  async function fetchDownline(uid) {
    const usersRef = collection(db, "users");

    // Level 1 — direct referrals
    const l1Snap = await getDocs(query(usersRef, where("referredBy", "==", uid)));
    const l1 = l1Snap.docs.map(d => ({ id: d.id, level: 1, ...d.data() }));

    // Level 2 — referrals of referrals
    let l2 = [];
    if (l1.length) {
      const l2Results = await Promise.all(
        l1.map(u => getDocs(query(usersRef, where("referredBy", "==", u.id))))
      );
      l2Results.forEach(snap => {
        snap.docs.forEach(d => l2.push({ id: d.id, level: 2, ...d.data() }));
      });
    }

    // Level 3
    let l3 = [];
    if (l2.length) {
      const l3Results = await Promise.all(
        l2.map(u => getDocs(query(usersRef, where("referredBy", "==", u.id))))
      );
      l3Results.forEach(snap => {
        snap.docs.forEach(d => l3.push({ id: d.id, level: 3, ...d.data() }));
      });
    }

    return [...l1, ...l2, ...l3].map(u => ({
      name: u.name,
      username: u.username,
      level: u.level,
      createdAt: u.createdAt,
      totalDeposit: u.totalDeposit || 0,
      totalInvested: u.totalInvested || 0,
      adminFunded: u.adminFunded || u.totalDeposit || 0
    }));
  }

  /* ---------------- Load Referral Data (Cache-First) ---------------- */
  async function loadReferralData(uid, forceRefresh = false) {
    // Check cache
    if (!forceRefresh) {
      const cached = sessionStorage.getItem(REFERRAL_CACHE_KEY);
      if (cached) {
        try {
          const parsed = JSON.parse(cached);
          if (parsed.uid === uid) {
            allReferrals = parsed.referrals;
            renderSummary(parsed.myReferralCode, parsed.referralBonus);
            renderList();
            return;
          }
        } catch (e) {
          console.warn("Cache parse error:", e);
        }
      }
    }

    // Get my own data for referral code and bonus
    let myData = null;
    if (!forceRefresh) {
      const myCached = sessionStorage.getItem(DASHBOARD_CACHE_KEY);
      if (myCached) {
        try {
          const parsed = JSON.parse(myCached);
          if (parsed.uid === uid) myData = parsed.data;
        } catch (e) { /* ignore */ }
      }
    }

    if (!myData) {
      const mySnap = await getDoc(doc(db, "users", uid));
      myData = mySnap.exists() ? mySnap.data() : {};
    }

    // Fetch downline
    allReferrals = await fetchDownline(uid);

    // Cache results
    const cacheData = {
      uid,
      referrals: allReferrals,
      myReferralCode: myData.referralCode || "—",
      referralBonus: myData.referralEarnings || 0
    };

    sessionStorage.setItem(REFERRAL_CACHE_KEY, JSON.stringify(cacheData));

    renderSummary(myData.referralCode || "—", myData.referralEarnings || 0);
    renderList();
  }

  function renderSummary(code, bonus) {
    document.getElementById("referralCodeText").textContent = code;
    document.getElementById("totalReferrals").textContent = allReferrals.length;
    document.getElementById("referralBonus").textContent = formatNaira(bonus);
    document.getElementById("activeCount").textContent = allReferrals.filter(r => r.totalInvested > 0).length;
  }

  /* ---------------- Auth Guard ---------------- */
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }
    currentUser = user;
    loadReferralData(user.uid).catch((error) => {
      console.error("Load referral error:", error);
      showToast("Couldn't load referral data. Please try again.", "error");
      document.getElementById("listContainer").innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <p>Something went wrong loading your referrals.</p>
          <p style="margin-top:8px;">Pull to refresh or try again later.</p>
        </div>`;
    });
  });

  /* ---------------- Manual Refresh ---------------- */
  document.getElementById("refreshBtn").addEventListener("click", async () => {
    if (!currentUser) return;
    
    const btn = document.getElementById("refreshBtn");
    btn.classList.add("spinning");
    
    try {
      await loadReferralData(currentUser.uid, true);
      showToast("Referral data updated", "success", 2500);
    } catch (e) {
      showToast("Couldn't refresh right now", "error");
    } finally {
      setTimeout(() => {
        btn.classList.remove("spinning");
      }, 600);
    }
  });

  console.log("🚀 Quantum Referrals - Ready");
</script>

</body>
